<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핀로그 금융 챗봇 · FinLog Bot</title>
<style>
  :root{--navy:#0a1f44;--navy2:#0d2b5e;--blue:#1f4e9b;--gold:#c9a24b;--gold2:#e3c878;
    --bg:#eef1f8;--card:#fff;--ink:#16233a;--mut:#5b6b85;--line:#e3e8f2;--bot:#f3f6fc;--user:#1f4e9b;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','Segoe UI','Apple SD Gothic Neo',system-ui,sans-serif;background:var(--bg);color:var(--ink);height:100vh;height:100dvh;display:flex;flex-direction:column}
  .app{max-width:760px;width:100%;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);box-shadow:0 0 40px rgba(10,31,68,.1)}
  header{background:linear-gradient(135deg,var(--navy2),var(--navy));color:#fff;padding:16px 20px;display:flex;align-items:center;gap:13px;flex-shrink:0}
  header .av{width:46px;height:46px;border-radius:50%;background:linear-gradient(145deg,var(--gold2),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:800;color:#3a2a06;flex-shrink:0}
  header h1{font-size:1.12rem;font-weight:800}
  header p{font-size:.78rem;color:#b9c8e6}
  header .kbn{margin-left:auto;font-size:.72rem;background:rgba(255,255,255,.13);padding:5px 10px;border-radius:20px;color:#dfe7f6;text-align:right;line-height:1.5}
  .chat{flex:1;overflow-y:auto;padding:20px 16px 8px;display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;gap:10px;max-width:92%;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg .b{padding:12px 15px;border-radius:16px;font-size:.93rem;line-height:1.6}
  .msg.bot{align-self:flex-start}
  .msg.bot .ic{width:34px;height:34px;border-radius:50%;background:var(--navy);color:var(--gold2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.95rem;font-weight:800}
  .msg.bot .b{background:var(--card);border:1px solid var(--line);border-top-left-radius:4px;box-shadow:0 2px 8px rgba(20,35,58,.05)}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg.user .b{background:var(--user);color:#fff;border-top-right-radius:4px}
  .ans .term{font-weight:800;color:var(--navy);font-size:1.04rem}
  .ans .cat{display:inline-block;font-size:.66rem;font-weight:800;color:var(--gold);background:#fbf6ea;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}
  .ans .wk{display:inline-block;font-size:.66rem;font-weight:800;color:#2b5db0;background:#e8f0fc;padding:2px 8px;border-radius:20px;margin-left:5px;vertical-align:middle}
  .ans .short{margin:7px 0;font-weight:600;color:var(--navy2)}
  .ans .detail{color:#33445f;font-size:.9rem;margin-bottom:4px}
  .ans .iss{margin:8px 0 2px;padding-left:0;list-style:none}
  .ans .iss li{font-size:.86rem;color:#34465f;margin:4px 0;padding-left:14px;position:relative}
  .ans .iss li::before{content:"·";position:absolute;left:3px;color:var(--blue);font-weight:800}
  .ans .ex{margin-top:8px;padding:9px 12px;background:#f7faf8;border-left:3px solid var(--gold);border-radius:8px;font-size:.86rem;color:#2c4636}
  .ex b{color:var(--blue)}
  .box{margin-top:9px;padding:10px 13px;border-radius:10px;font-size:.88rem;line-height:1.55}
  .box .h{font-weight:800;display:block;margin-bottom:3px}
  .concl{background:#fbf6ea;border:1px solid #ecdcb0;color:#5a4516}
  .concl .h{color:#9a7b22}
  .tip{background:#eef4fc;border:1px solid #d3e2f6;color:#22406e}
  .tip .h{color:var(--blue)}
  .hl{background:#fff3c4;border-radius:3px;padding:0 1px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .chip{font-size:.8rem;font-weight:600;background:#eaf0fb;color:var(--blue);border:1px solid #d6e1f5;padding:6px 12px;border-radius:20px;cursor:pointer;transition:.15s}
  .chip:hover{background:var(--blue);color:#fff}
  .chip.cat{background:var(--navy);color:#fff;border-color:var(--navy)}
  .chip.cat:hover{background:var(--gold);color:var(--navy)}
  .chip.faq{background:#f3f6fc;color:#33507e;border-color:#dde6f4}
  .chip.faq:hover{background:#33507e;color:#fff}
  .composer{flex-shrink:0;padding:12px 14px;background:var(--card);border-top:1px solid var(--line);display:flex;gap:9px;align-items:center}
  .composer input{flex:1;padding:13px 16px;border:2px solid var(--line);border-radius:26px;font:inherit;font-size:.95rem}
  .composer input:focus{outline:none;border-color:var(--blue)}
  .composer button{width:48px;height:48px;border-radius:50%;border:0;background:var(--navy);color:var(--gold2);font-size:1.2rem;cursor:pointer;flex-shrink:0;transition:.15s}
  .composer button:hover{background:var(--blue);color:#fff}
  .quick{padding:9px 14px 10px;background:var(--card);display:flex;gap:7px;flex-wrap:wrap;border-top:1px solid var(--line)}
  .quick .chip{font-size:.76rem}
  .hint{font-size:.78rem;color:var(--mut);margin-top:8px;margin-bottom:2px;font-weight:600}

  header .av{overflow:hidden;background:#fff;padding:0}
  header .av img{width:100%;height:100%;object-fit:cover}
  .msg.bot .ic{background:#fff;overflow:hidden;padding:0;border:1.5px solid #d9e2f2}
  .msg.bot .ic img{width:100%;height:100%;object-fit:cover}

  .welgreet{font-size:.94rem;font-weight:800;color:var(--navy);margin-top:4px}
  .welsub{font-size:.82rem;color:var(--mut);margin-top:11px;line-height:1.6}
  .welcount{color:#8595b5;font-weight:600}
  .welstat{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  
  .welstat span{font-size:.74rem;font-weight:700;color:var(--blue);background:#eaf0fb;border:1px solid #d6e1f5;padding:4px 11px;border-radius:20px}
  .mascots{display:flex;gap:14px;align-items:flex-end;margin:2px 0 10px}
  .mascots .mc{display:flex;flex-direction:column;align-items:center;gap:3px}
  .mascots img{height:96px;width:auto;filter:drop-shadow(0 4px 8px rgba(10,31,68,.18))}
  .mascots .nm{font-size:.72rem;font-weight:800;color:var(--navy2)}
  .mascots .nm.o{color:#c2342f}.mascots .nm.g{color:#1f4e9b}
  .iss li .mi{width:22px;height:22px;border-radius:50%;vertical-align:-6px;margin-right:5px;border:1px solid #e0e6f0}
  .typing{display:flex;gap:4px;padding:4px 2px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#b6c2d8;animation:tp 1s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes tp{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
  @media(max-width:480px){.msg{max-width:97%}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="av" id="hdav"></div>
    <div>
      <h1>핀로그 금융 챗봇</h1>
      <p>금융용어 · 시사쟁점 · 면접까지 물어보세요</p>
    </div>
    <div class="kbn" id="kbn"></div>
  </header>
  <div class="chat" id="chat"></div>
  <div class="quick" id="quick"></div>
  <div class="composer">
    <input id="inp" placeholder="용어·질문을 입력하세요 (예: 공매도가 뭐야?)" autocomplete="off">
    <button id="send" title="보내기">➤</button>
  </div>
</div>
<script>
const KB = [{"id": "kospi", "term": "코스피(KOSPI)", "category": "시장/지수", "keywords": ["코스피", "kospi", "종합주가지수", "유가증권시장"], "short": "유가증권시장에 상장된 종목 전체의 시가총액을 지수화한 한국 대표 주가지수.", "detail": "1980년 1월 4일을 기준(100)으로 삼아, 상장기업들의 시가총액 합계가 그 시점 대비 얼마나 커졌는지를 보여주는 지수다. 시장 전체의 분위기와 한국 경제의 체온을 한눈에 보여주는 대표 지표로 쓰인다. 지수가 오르면 상장기업 전반의 가치가 올랐다는 뜻이다.", "example": "코스피는 2025년 한 해 75.6% 오른 데 이어 2026년 6월 18일 사상 처음으로 9,000선을 돌파했다. 흔히 폭락을 떠올리기 쉽지만 2026년 상반기는 반도체·삼성전자가 이끈 강한 상승장이었다."}, {"id": "kosdaq", "term": "코스닥(KOSDAQ)", "category": "시장/지수", "keywords": ["코스닥", "kosdaq", "벤처", "기술주"], "short": "중소·벤처기업과 기술주 중심으로 거래되는 한국의 성장형 주식시장.", "detail": "코스피가 대기업 중심이라면, 코스닥은 IT·바이오·게임 등 성장 잠재력은 크지만 규모가 작은 기업이 자금을 조달하는 시장이다. 미국의 나스닥을 본떠 만들어졌으며, 성장성이 높은 만큼 주가 변동성도 큰 편이다.", "example": "기술특례상장으로 코스닥에 입성하는 바이오·반도체 기업이 많으며, 파두처럼 상장 후 실적 논란이 생기는 사례도 코스닥에서 자주 다뤄진다."}, {"id": "index-fund", "term": "지수(인덱스)", "category": "시장/지수", "keywords": ["지수", "인덱스", "index", "벤치마크"], "short": "여러 종목의 가격을 묶어 시장 전체의 움직임을 하나의 숫자로 보여주는 지표.", "detail": "개별 종목을 다 들여다보지 않아도 시장 전체가 오르는지 내리는지 가늠하게 해 준다. 코스피200, 나스닥, S&P500 등이 대표적이며, 이 지수를 그대로 따라가도록 만든 인덱스펀드·ETF의 기준(벤치마크)이 된다.", "example": "코스피200은 유가증권시장 대표 200종목으로 구성된 지수로, KRX의 코스피200 선물·옵션 같은 파생상품의 기초자산으로 쓰인다."}, {"id": "wgbi", "term": "세계국채지수(WGBI)", "category": "시장/지수", "keywords": ["wgbi", "세계국채지수", "국채지수", "ftse"], "short": "전 세계 주요 선진국 국채를 담은 글로벌 채권지수로, 편입되면 외국인 자금이 유입된다.", "detail": "FTSE 러셀이 산출하는 대표적 국채지수로, 글로벌 연기금·펀드가 이 지수를 따라 채권을 사들인다. 한 나라 국채가 여기에 편입되면 지수를 추종하는 막대한 패시브 자금이 그 나라 국채를 의무적으로 매수하게 되어, 채권 수요가 늘고 국채 값이 떠받쳐진다.", "example": "한국 국채는 2026년 WGBI에 순차 편입돼 11월에 마무리될 예정이다. 최종 비중은 약 2.08%, 외국인 자금 약 560억 달러 유입이 기대된다. 같은 시기 주식의 MSCI 선진국지수 편입은 또 불발됐다."}, {"id": "msci", "term": "MSCI 선진국지수 편입", "category": "시장/지수", "keywords": ["msci", "엠에스씨아이", "선진국지수", "지수편입"], "short": "글로벌 주식 벤치마크인 MSCI에서 한국이 신흥국이 아닌 선진국으로 분류되는지의 문제.", "detail": "MSCI 지수는 전 세계 펀드가 추종하는 대표 주식지수다. 한국은 경제 규모로는 선진국이지만 외환시장 접근성·공매도 제약 등을 이유로 여전히 신흥국(EM)으로 분류돼 있다. 선진국으로 승격되면 안정적인 선진국 자금이 들어올 수 있어 오랜 숙원으로 꼽힌다.", "example": "2026년에도 한국은 MSCI 선진국 편입에 실패해 다음 기회가 2027년 6월로 미뤄졌다. 채권(WGBI)에선 인정받았지만 주식에선 아직 문턱을 넘지 못한 셈이다."}, {"id": "nxt-ats", "term": "대체거래소(ATS)·넥스트레이드(NXT)", "category": "시장/지수", "keywords": ["nxt", "넥스트레이드", "대체거래소", "ats", "복수거래소"], "short": "한국거래소(KRX) 외에 주식을 사고팔 수 있게 만든 두 번째 거래 시장.", "detail": "그동안 한국 주식은 KRX에서만 거래됐지만, 넥스트레이드(NXT)가 출범하며 복수거래소 시대가 열렸다. 거래소 간 경쟁으로 수수료가 낮아지고 거래 시간이 늘어나는 장점이 있지만, 유동성이 두 곳으로 갈리는 파편화 문제가 생긴다. 이를 보완하려고 가장 유리한 가격을 자동으로 찾아 주문하는 최선주문집행(SOR) 제도가 도입됐다.", "example": "NXT의 누적 거래비중은 약 28.8%까지 올라왔다. 복수거래소 체제에서 한국거래소가 시장감시와 정보 인프라 역할을 어떻게 수행할지가 2026년 주요 논점이다."}, {"id": "base-rate", "term": "기준금리", "category": "거시경제", "keywords": ["기준금리", "정책금리", "한국은행", "금통위", "금리"], "short": "한국은행이 정하는, 나라 안 모든 금리의 출발점이 되는 이자율.", "detail": "은행끼리 아주 짧게 돈을 빌려줄 때 적용하는 기준 이자다. 이 숫자가 오르면 예금·대출 금리가 줄줄이 따라 움직인다. 한국은행은 물가가 너무 오르면 금리를 올려 돈을 묶고, 경기가 식으면 금리를 내려 돈을 풀어 경기를 데운다. 샤워기 메인 꼭지에 비유할 수 있다.", "example": "2026년 상반기 한국은행 기준금리는 연 2.50%로 8회 연속 동결됐다. 경기를 띄우려면 내리고 싶지만 3%대 물가와 1,530원대 환율이 발목을 잡는, 이러지도 저러지도 못하는 교착 상태였다."}, {"id": "inflation", "term": "인플레이션", "category": "거시경제", "keywords": ["인플레이션", "물가", "소비자물가", "cpi", "구매력"], "short": "물가가 전반적으로 꾸준히 오르는 현상.", "detail": "작년에 5,000원이던 김밥이 올해 6,000원이 되면, 같은 돈으로 살 수 있는 게 줄어든다. 즉 돈의 힘(구매력)이 약해지는 것이다. 적당한 인플레이션은 경제가 도는 자연스러운 신호지만, 너무 빠르면 월급이 물가를 못 따라가 살림이 팍팍해진다. 풍선에 바람을 넣어 공기 한 모금의 비중이 작아지는 것에 비유된다.", "example": "2026년 5월 소비자물가는 1년 전보다 3.1% 올라, 한국은행 목표인 2%대를 웃돌았다. 이것이 금리를 쉽게 내리지 못한 핵심 이유 중 하나였다."}, {"id": "gdp", "term": "GDP(국내총생산)", "category": "거시경제", "keywords": ["gdp", "국내총생산", "성장률", "경제성장"], "short": "한 나라가 일정 기간 만들어낸 모든 상품과 서비스의 값을 합친 것.", "detail": "나라 경제의 몸집이자 1년 치 성적표다. 공장에서 찍어낸 자동차, 미용실에서 자른 머리, 배달 음식까지 새로 만들어진 가치는 다 더해진다. 작년보다 늘면 성장, 줄면 역성장이라 부른다. GDP가 늘면 일자리와 월급이 늘 가능성이 커진다.", "example": "2026년 한국 경제는 수출이 끌고 갔다. 5월 수출이 1년 전보다 53.2% 뛰고 1~5월 무역흑자가 1,019억 달러에 달했지만, 청년 취업자는 25.5만 명 줄어 성장의 온기가 청년층까지 닿지 못했다."}, {"id": "exchange-rate", "term": "환율", "category": "거시경제", "keywords": ["환율", "원달러", "원화", "달러", "외환"], "short": "우리 돈과 외국 돈을 맞바꿀 때의 교환 비율.", "detail": "보통 원/달러 환율을 말하며, 1달러를 받으려면 원화를 얼마 줘야 하느냐다. 이 숫자가 오르면(예: 1,300원→1,530원) 달러가 비싸진 것, 즉 원화가 약해진 것이다. 환율이 오르면 수입·여행·유학비가 비싸지고 수입 물가를 통해 국내 물가도 끌어올리지만, 수출 기업에는 유리하다.", "example": "2026년 상반기 원/달러 환율은 1,530원대 약세를 보였다. 수출엔 도움이 되지만 수입 물가를 자극해 한국은행이 금리를 내리기 어렵게 만드는 양날의 칼로 작용했다."}, {"id": "quantitative-easing", "term": "양적완화(QE)", "category": "거시경제", "keywords": ["양적완화", "qe", "유동성", "돈풀기", "중앙은행"], "short": "중앙은행이 시중의 채권을 대량으로 사들여 돈을 직접 푸는 비상 카드.", "detail": "금리를 0%까지 내려도 경기가 안 살아날 때 꺼내는 마지막 수단이다. 중앙은행이 국채 등을 사주고 그 대금으로 시장에 현금을 쏟아부어 돈을 억지로 돌게 만든다. 돈이 많이 풀리면 자산 값이 오르기 쉽지만, 시간이 지나면 인플레이션이라는 청구서로 돌아온다.", "example": "코로나 때 풀린 돈이 이후 물가 급등으로 이어진 것이 대표적이다. 반대로 2026년 한국은 물가·환율을 신경 쓰느라 돈을 푸는 게 아니라 조이는 쪽에 가까운 정반대 국면이었다."}, {"id": "carbon-tax", "term": "탄소세", "category": "거시경제", "keywords": ["탄소세", "탄소", "온실가스", "기후", "환경세", "ESG 공시", "WACC", "배출권거래제", "CBAM", "탄소세 vs 배출권거래제(ETS)", "탄소국경조정(CBAM)", "국책은행", "ESG", "기후금융"], "short": "온실가스를 배출하는 만큼 비용을 물려 배출을 줄이도록 유도하는 세금.", "detail": "기업이나 개인이 화석연료를 쓰며 내뿜는 탄소에 가격을 매겨, 공짜로 버리던 오염에 값을 치르게 하는 제도다. 배출을 줄일 동기를 만들지만, 에너지 비용 상승이 물가와 산업 경쟁력에 부담을 줄 수 있어 도입 속도와 범위가 늘 쟁점이 된다.", "example": "핀로그 1주차 논술에서 탄소세의 도입 배경과 현행 제도의 문제점·해결방안을 다뤘다. 탄소배출권거래제(ETS)와 함께 기후 대응의 핵심 정책 수단으로 비교된다.", "topic": true, "weeks": "1차", "hashtags": ["#국책은행", "#ESG", "#기후금융"], "conclusion": "핀로그는 ‘비용을 보이게 하면 행동이 바뀐다’에 동의하되, 정당성은 ‘세수 환원·전환 지원’ 에서 나온다고 보았다. 급격한 인상보다 역진성 완화를 동반한 점진적 강화가 현실적이며, CBAM 대응이 수출기업의 핵심 과제라고 정리했다.", "interview_tip": "[국책은행 지원] EU CBAM으로 타격이 예상되는 수출 중소·중견기업의 저탄소 전환을 위해 장기 저리의 ‘전환 금융(녹색 금융)’을 선제 공급하는 정책금융의 구원투수 역할을 강조하라.", "faqs": [{"question": "탄소세가 뭔가요?", "answer": "탄소 배출의 사회적 비용에 가격을 매겨 ‘오염하면 비싸지게’ 만드는 제도입니다."}, {"question": "탄소세의 정당성은 어디서 오나요?", "answer": "세율 인상폭보다, 거둔 세수를 역진성 완화·산업 전환 지원에 환원하는 데서 옵니다."}, {"question": "CBAM이 뭔가요?", "answer": "탄소 규제가 약한 나라 제품에 EU가 국경에서 비용을 매기는 탄소국경조정으로, 수출기업에 영향을 줍니다."}], "issues": ["형평성 : 에너지 비용 상승이 저소득층·중소기업에 더 큰 부담(역진성).", "경쟁력 : 자국 기업만 부담하면 해외로 생산이 빠져나가는 ‘탄소 누출’.", "세수 활용 : 걷은 세금을 환원·전환 지원에 어떻게 쓸 것인가."], "title": "탄소세 — 보이지 않는 비용에 가격표를 붙이다"}, {"id": "protectionism", "term": "보호무역주의·관세", "category": "거시경제", "keywords": ["보호무역", "관세", "자유무역", "공급망", "무역"], "short": "자국 산업을 보호하려고 수입품에 관세 등 장벽을 세우는 통상 정책.", "detail": "값싼 해외 제품으로부터 국내 산업과 일자리를 지키려는 취지지만, 상대국의 보복 관세를 부르고 전 세계 교역을 위축시킬 수 있다. 자유무역과 늘 충돌하는 주제이며, 글로벌 공급망 재편과 맞물려 원산지 분석·관세 컨설팅 수요를 키운다.", "example": "핀로그 5주차 관세사 인터뷰에서 보호무역주의 속 관세 컨설팅·원산지 분석 수요 확대를 짚었다. 한편 한·미 자동차 관세가 25%에서 15%로 내려간 것은 2026년 수출 기업에 단비가 됐다."}, {"id": "stock", "term": "주식", "category": "주식/채권", "keywords": ["주식", "주주", "지분", "증권", "stock"], "short": "회사의 소유권을 잘게 쪼갠 증서로, 사면 그 회사의 주주가 된다.", "detail": "주식을 사면 회사의 일부를 소유하는 주주가 되어 배당을 받고 의결권을 행사할 수 있다. 회사가 잘되면 주가가 오르고 배당이 늘어 이익을 보지만, 잘못되면 손실을 본다. 기업은 주식을 발행해 빚이 아닌 자기자본으로 사업 자금을 모은다.", "example": "주주환원(배당·자사주 소각)이 늘면 주식을 가진 사람의 몫이 커진다. 밸류업 정책이 주주환원을 강조하는 이유다."}, {"id": "bond", "term": "채권(금리와 가격)", "category": "주식/채권", "keywords": ["채권", "국채", "회사채", "채권금리", "차용증"], "short": "돈을 빌려주고 이자를 받는 차용증으로, 금리와 가격은 시소처럼 반대로 움직인다.", "detail": "채권은 정부나 기업이 돈 빌리고 이자 쳐서 갚겠다고 써준 증서다. 핵심은 시장 금리가 오르면 이미 발행된(이자가 낮은) 채권은 인기가 떨어져 값이 내리고, 금리가 내리면 옛 채권 값이 오른다는 점이다. 작년에 산 연 3% 쿠폰이 올해 5% 쿠폰이 나오면 중고 값을 깎아야 하는 것과 같다.", "example": "이 원리는 채권형 펀드와 퇴직연금(DC·IRP)에 그대로 적용된다. 한국의 WGBI 편입으로 외국인이 국채를 사들이면 채권 값을 떠받치는 효과가 있다."}, {"id": "dividend-buyback", "term": "배당·자사주 소각(주주환원)", "category": "주식/채권", "keywords": ["배당", "자사주", "소각", "주주환원", "자사주소각"], "short": "기업이 번 돈을 주주에게 돌려주는 두 가지 방법: 배당과 자기주식 소각.", "detail": "배당은 이익의 일부를 현금으로 주주에게 나눠 주는 것이고, 자사주 소각은 회사가 자기 주식을 사들여 아예 없애는 것이다. 주식 수가 줄면 남은 주식 한 주의 가치가 올라가, 주주 몫이 커진다. 둘 다 주주에게 보답한다는 신호로 주가에 긍정적으로 작용한다.", "example": "2026년 3월 자사주 의무소각이 시행되며 삼성전자가 7조 원대 자사주 소각에 나섰다. 2025년 한국 기업의 주주환원 규모는 약 92조 원에 달했다."}, {"id": "ipo", "term": "기업공개(IPO)·상장", "category": "주식/채권", "keywords": ["ipo", "상장", "기업공개", "공모", "공모주"], "short": "비상장 기업이 처음으로 증시에 주식을 공개해 거래할 수 있게 하는 절차.", "detail": "회사가 일반 투자자에게 주식을 팔아 대규모 자금을 모으는 동시에, 누구나 그 회사 주식을 시장에서 사고팔 수 있게 되는 과정이다. 상장 심사·공모가 산정·수요예측 등을 거치며, 이때 매겨지는 기업가치(밸류에이션)가 적정한지가 핵심 쟁점이다.", "example": "상장 직전 회사가 제시하는 예상 실적이 부풀려졌다 드러난 파두 사태가 IPO 밸류에이션 신뢰 문제의 대표 사례로 다뤄진다."}, {"id": "short-selling", "term": "공매도", "category": "주식/채권", "keywords": ["공매도", "무차입공매도", "숏", "대차", "short", "공매도 통합점검시스템", "차입공매도", "숏커버링", "NSDS", "MSCI", "한국예탁결제원", "KRX", "KSD", "헤지", "공매도(short selling)", "차입 vs 무차입", "금융공기업(KRX·KSD)"], "short": "주식을 빌려서 먼저 판 뒤, 값이 떨어지면 싸게 되사 갚아 차익을 노리는 거래.", "detail": "보통은 싸게 사서 비싸게 팔지만, 공매도는 순서가 거꾸로다. 이 주식 곧 떨어진다에 베팅하는 것이다. 가격 거품을 막고 유동성을 공급하는 순기능이 있지만, 빌린 주식 없이 먼저 파는 무차입 공매도 같은 반칙과 개인·기관 간 형평성 논란이 끊이지 않는다.", "example": "2025년 3월 31일 공매도가 전면 재개되면서 반칙을 잡는 공매도통합점검시스템(NSDS)도 함께 가동됐다. 점검률 91.3%에 위반 사례 76건이 적발됐다. 핀로그가 가장 자주 다룬 논술 주제이기도 하다.", "topic": true, "weeks": "2·3차", "hashtags": ["#한국거래소", "#한국예탁결제원", "#시장감시", "#리스크관리"], "conclusion": "핀로그는 공매도를 ‘폐지냐 허용이냐’의 이분법이 아니라 ‘감시가 투명한가’ 의 문제로 결론지었다. 한시적 전면금지는 단기 진정제일 뿐이며, NSDS 같은 전산 감시 강화와 개인의 대차 접근성 개선이 ‘기울어진 운동장’을 바로잡는 실효적 해법이라는 데 팀이 합의했다. 개인투자자 수익률은 제도만으로 보장되지 않으므로 정보 격차 해소가 병행되어야 한다.", "interview_tip": "[KRX·KSD 지원] 공매도를 규제 대상이 아니라 ‘MSCI 선진국 편입의 필수 조건’으로 재정의하고, NSDS 고도화로 ‘글로벌 스탠다드’와 ‘투자자 보호’를 동시에 잡는 인프라 중심 해법을 어필하라. 단, 전산화로도 무차입을 100% 막을 수 없다는 한계도 균형 있게 덧붙일 것.", "faqs": [{"question": "공매도가 뭔가요?", "answer": "주식을 빌려 먼저 팔고 나중에 싸게 되사 갚아 차익을 내는 거래로, ‘먼저 팔고 나중에 산다’는 점만 일반 거래와 반대입니다."}, {"question": "공매도는 왜 논란이 되나요?", "answer": "가격발견·유동성 같은 순기능이 있지만, 무차입공매도와 개인·기관 간 정보·차입 격차(기울어진 운동장) 때문에 신뢰 문제가 생깁니다."}, {"question": "무차입공매도를 어떻게 막나요?", "answer": "2025년 3월 가동된 한국거래소 공매도 통합점검시스템(NSDS)이 실시간으로 잔고를 대조해 무차입 주문을 사전 차단합니다."}], "issues": ["순기능 : 가격발견(과대평가 정보의 신속 반영), 유동성 공급, 분식·과열에 대한 시장 감시, 헤지 수단.", "역기능 : 주가 하락 압력과 시세조종 결합, 개인과 기관·외국인 사이의 정보·차입·인프라 격차(‘기울어진 운동장’), 무차입에 따른 신뢰 훼손.", "제도 : 한시적 금지 논쟁을 거쳐 2025년 3월 KRX 공매도 통합점검시스템(NSDS) 이 가동되어 무차입을 사전 점검한다. MSCI 선진국 지수 편입도 공매도 정상화와 맞물린다."], "title": "공매도 — 빌려서 먼저 파는 거래, 그 양날의 검"}, {"id": "settlement-cycle", "term": "결제주기(T+1)·KOFR", "category": "주식/채권", "keywords": ["t+1", "결제주기", "kofr", "예탁결제", "청산"], "short": "주식을 사고팔 때 실제 대금·주식이 오가기까지 걸리는 기간과 한국의 무위험지표금리.", "detail": "T+1은 거래 체결 다음 날(거래일+1) 결제가 끝나는 구조로, 결제 기간을 줄여 위험을 낮춘다. KOFR(한국 무위험지표금리)는 국채·통안증권 환매조건부거래를 기반으로 산출하는, 신뢰할 수 있는 단기 기준금리로 과거 CD금리 등을 대체한다. 둘 다 자본시장 후선 인프라의 핵심 요소다.", "example": "핀로그 3주차에서 KRX·KSD 현안으로 공매도 제도 개선, 토큰증권, T+1 결제주기, KOFR, 외국인 투자자 접근성 등을 종합 정리했다."}, {"id": "derivatives", "term": "파생상품", "category": "파생상품", "keywords": ["파생상품", "derivatives", "기초자산", "위험", "헤지", "한국거래소", "KRX", "선물", "옵션", "증거금", "일일정산", "VaR", "스트레스테스트", "레버리지", "VaR·스트레스테스트", "금융공기업(KRX)", "증권사(IB·트레이딩)", "증권사"], "short": "주가·금리·환율 같은 기초자산의 미래 가격에서 가치가 갈라져 나오는 계약.", "detail": "농부가 가을 밀값을 미리 정해 두듯, 미래의 가격 변동이라는 위험을 떼어 내 사고파는 상품이다. 가격 하락이 걱정인 수출기업이 환율을 미리 묶어 두는 헤지(위험회피)와, 수많은 거래가 모여 미래 가격 전망을 만드는 가격발견 기능이 있다. 잘 쓰면 보험, 잘못 쓰면 도박이 된다.", "example": "KRX는 코스피200 선물·옵션을 대표 상품으로 운영한다. 적은 증거금으로 큰 포지션을 잡는 레버리지 탓에 같은 상품이 헤지 수단도 투기 수단도 되어, 증거금·일일정산으로 결제불이행을 막는다.", "topic": true, "weeks": "7~8차", "hashtags": ["#한국거래소", "#증권사", "#리스크관리"], "conclusion": "핀로그는 레버리지를 ‘도구이자 위험’으로 규정하고, 해법은 ‘상품 금지’가 아니라 ‘판매방식·정보제공(적합성·공시)’ 규율 이라고 합의했다. 거래소 CCP의 증거금·일일정산이 시장 안정의 최후 보루라는 점도 함께 강조했다.", "interview_tip": "[증권사 리스크관리 지원] ELS 불완전판매를 교훈 삼아, 파생 특유의 꼬리위험(Tail Risk)을 VaR·스트레스테스트로 관리하는 ‘투자자 보호 중심 리스크 모델링’ 역량을 강조하라.", "faqs": [{"question": "선물과 옵션의 차이는?", "answer": "선물은 정한 가격에 사고팔 ‘의무’, 옵션은 ‘권리’로 매수자는 불리하면 프리미엄만 포기하면 됩니다."}, {"question": "파생상품은 왜 위험한가요?", "answer": "적은 증거금으로 큰 포지션을 잡는 레버리지 탓에 헤지 수단도, 투기 수단도 되기 때문입니다."}, {"question": "거래소는 위험을 어떻게 막나요?", "answer": "증거금과 일일정산(매일 손익 현금정산)으로 손실이 쌓이기 전에 끊어 결제불이행을 방지합니다."}], "issues": ["레버리지의 양면성 : 적은 증거금으로 큰 포지션 → 같은 상품이 헤지 수단도, 투기 수단도 된다.", "결제불이행 방지 : 거래소는 증거금 (이행 담보)과 일일정산 (매일 손익을 현금 정산)으로 손실이 쌓이기 전에 매일 끊어준다.", "약했던 사례가 2008년 AIG의 CDS — 증거금 없이 쌓인 장외파생이 시스템 위험으로 번졌다."], "title": "파생상품(선물·옵션) — 위험을 사고파는 시장"}, {"id": "futures", "term": "선물", "category": "파생상품", "keywords": ["선물", "futures", "증거금", "일일정산", "레버리지"], "short": "미래 특정일에 정한 가격으로 사고팔 의무를 정해 둔 계약.", "detail": "선물은 양쪽 모두 약속한 가격에 거래할 의무를 진다. 적은 증거금(계약 이행 담보)으로 큰 금액을 거래하는 레버리지 효과가 있어 수익도 손실도 커진다. 거래소는 매일 손익을 현금으로 정산하는 일일정산으로 미수금이 쌓이지 않게 하고, 한도를 넘으면 추가 증거금(마진콜)을 요구한다.", "example": "코스피200 선물이 대표적이다. 옵션 만기일엔 가격이 급변하기 쉬워, 이상 주문과 변동성 급등을 알고리즘이 실시간 감시한다."}, {"id": "options", "term": "옵션(콜·풋)", "category": "파생상품", "keywords": ["옵션", "콜옵션", "풋옵션", "프리미엄", "options"], "short": "정해진 가격에 사고팔 수 있는 권리를 거래하는 계약(콜=살 권리, 풋=팔 권리).", "detail": "선물과 달리 옵션을 산 쪽은 의무가 아니라 권리를 갖는다. 불리하면 권리를 포기하고 미리 낸 권리금(프리미엄)만 잃으면 된다. 안 가도 그만인 식당 예약과 비슷하다. 콜옵션은 살 권리, 풋옵션은 팔 권리이며, 손실은 프리미엄으로 한정되지만 이익은 크게 날 수 있다.", "example": "ELS·ELW 같은 파생결합상품이 옵션 구조를 활용해 설계된다. 증권사 IB·트레이딩 부서가 이를 설계·헤지하며 시장위험을 관리한다."}, {"id": "var", "term": "VaR(밸류앳리스크)·스트레스테스트", "category": "파생상품", "keywords": ["var", "밸류앳리스크", "스트레스테스트", "리스크관리", "위험"], "short": "최악의 하루에 얼마까지 잃을 수 있나를 통계로 산출하는 위험 측정 지표.", "detail": "VaR는 일정 확률 아래에서 발생할 수 있는 최대 손실 규모를 숫자로 보여 준다. 스트레스테스트는 금융위기 같은 극단 상황을 일부러 대입해 그래도 버틸 수 있는지를 점검하는 것이다. 파생상품처럼 가격 변동이 빠른 영역에서 결제 안정성을 지키는 핵심 도구다.", "example": "거래소와 금융회사는 실시간 증거금·포지션 모니터링과 함께 VaR·스트레스테스트로 결제 안정성을 점검한다. 파생상품 리스크 모델링은 KRX 청산·결제 직무의 핵심이다."}, {"id": "financial-statements", "term": "재무제표", "category": "재무/회계", "keywords": ["재무제표", "손익계산서", "재무상태표", "현금흐름표", "흑자도산", "KRX", "PER", "PBR", "ROE", "DCF", "파두 사태", "기술특례상장", "지배구조", "신용평가", "XBRL 표준화", "금융공기업(KRX)", "기업금융", "재무제표·펀더멘털 분석"], "short": "기업의 건강 상태를 숫자로 보여 주는 세 가지 핵심 보고서.", "detail": "재무제표는 회사의 건강검진표다. 손익계산서는 1년간 얼마 벌어 얼마 남겼는지(성적표), 재무상태표는 특정 시점에 가진 것과 갚을 것(재산 목록), 현금흐름표는 돈이 실제로 드나든 흐름(통장 내역)을 보여 준다. 이익이 나도 현금이 마르면 흑자도산하므로 셋을 함께 읽어야 한다.", "example": "금융감독원 DART가 공시를 XBRL(항목마다 태그가 붙은 표준 전자포맷)로 제공해, API로 수천 개 기업의 재무 항목을 모아 한 번에 분석하는 정량 스크리닝이 가능하다.", "topic": true, "weeks": "7~8차", "hashtags": ["#기업금융", "#여신심사", "#신용평가"], "conclusion": "파두 사태를 복기하며 팀이 얻은 결론은 ‘ 숫자가 아니라 추정의 가정을 의심하라 ’였다. 이익보다 현금흐름을 먼저 보아야 하며, 기술특례상장은 진입 금지가 아니라 사후 공시·검증 강화로 풀어야 한다는 쪽으로 의견을 모았다.", "interview_tip": "[기업금융·여신심사 지원] PER·PBR에 매몰되지 말고, 현금흐름표로 ‘흑자도산’ 징후를 잡고 통신·결제 대안데이터를 결합해 기업의 실질 상환능력을 입체적으로 검증하겠다고 어필하라.", "faqs": [{"question": "흑자도산이 뭔가요?", "answer": "장부상 이익이 나도 현금이 돌지 않아 망하는 것으로, 현금흐름표가 이를 경고합니다."}, {"question": "재무제표 분석의 핵심은?", "answer": "세 표(손익계산서·재무상태표·현금흐름표)의 연결을 보고, 숫자 뒤의 ‘가정’을 의심하는 것입니다."}, {"question": "파두 사태의 교훈은?", "answer": "기술특례상장의 추정 매출(예상 1,203억 vs 실제 224억)이 과대평가되면 회계·공시 리스크가 된다는 점입니다."}], "issues": ["파두 사태 : 예상 매출 1,203억 원 vs 실제 224억 원 — 기술특례상장의 추정 매출이 과대평가되면 회계·공시 리스크가 된다.", "추정의 함정 : 미래 추정에 기반한 밸류에이션은 가정이 무너지면 가치도 무너진다.", "질적 정보 : 숫자만으로는 사업 모델·경쟁력·지배구조를 못 본다."], "title": "재무제표·펀더멘털 분석 — 숫자 뒤의 맥락을 읽는 법"}, {"id": "per-pbr", "term": "PER·PBR", "category": "재무/회계", "keywords": ["per", "pbr", "주가수익비율", "주가순자산비율", "저평가"], "short": "주가가 비싼지 싼지를 가늠하는 두 잣대. PER은 이익 대비, PBR은 자산 대비 주가.", "detail": "PER은 주가를 주당순이익으로 나눈 값으로 몇 년치 이익을 모아야 이 주식값이 나오나를 뜻한다. PBR은 주가를 주당순자산으로 나눈 값으로, 1보다 낮으면 회사를 통째로 팔아 나눠도 지금 주가보다 많다는 뜻이라 저평가 신호로 읽힌다. 주식의 싸고 비쌈을 감이 아니라 숫자로 판단하게 해 준다.", "example": "한국 증시의 만성적 저PBR이 코리아 디스카운트의 핵심 근거였다. 밸류업 정책도 PBR 1배 미만 기업을 콕 집어 개선을 유도했다."}, {"id": "roe", "term": "ROE(자기자본이익률)·부채비율", "category": "재무/회계", "keywords": ["roe", "자기자본이익률", "부채비율", "수익성", "건전성"], "short": "내 돈으로 얼마나 잘 버는지(ROE)와 빚에 얼마나 기대는지(부채비율)를 보는 지표.", "detail": "ROE는 순이익을 자기자본으로 나눈 값으로, 주주가 맡긴 돈으로 회사가 얼마나 효율적으로 이익을 내는지를 보여 준다. 부채비율은 부채를 자기자본으로 나눈 값으로, 높을수록 빚 의존도가 크고 위험하다. 두 지표를 함께 보면 회사가 잘 벌면서도 안전한지를 가늠할 수 있다.", "example": "자산운용사는 ROE 15% 이상, 부채비율 100% 이하 같은 조건으로 종목을 한 번에 거르는 정량 스크리닝을 한다."}, {"id": "dcf", "term": "DCF·기업가치평가", "category": "재무/회계", "keywords": ["dcf", "기업가치평가", "밸류에이션", "할인", "현재가치"], "short": "앞으로 벌 현금을 현재가치로 할인해 더해 기업의 값어치를 추정하는 방법.", "detail": "DCF(현금흐름할인법)는 회사가 미래에 벌어들일 현금을 지금 돈으로 환산해 모두 합산해 기업가치를 매긴다. 미래는 불확실하므로 할인율을 적용해 깎아서 계산한다. 미래 추정치와 할인율을 어떻게 잡느냐에 따라 결과가 크게 흔들린다는 한계가 있어, PER·PBR 같은 상대가치와 함께 본다.", "example": "증권 리서치와 IB의 IPO 밸류에이션이 DCF·상대가치 평가 위에 선다. 적자기업은 PER이 무의미해 PSR·EV/EBITDA로 보완한다."}, {"id": "mm-wacc", "term": "MM이론·WACC·최적 자본구조", "category": "재무/회계", "keywords": ["mm이론", "wacc", "자본구조", "가중평균자본비용", "최적자본구조"], "short": "기업이 빚과 자기자본을 어떻게 섞어야 가치가 극대화되는지를 다루는 재무이론.", "detail": "MM이론은 세금이 없는 이상적 상황에선 자본구조가 기업가치와 무관하다는 출발점을 제시하고, 세금을 고려한 수정이론에선 부채의 이자비용 절세효과 때문에 적정한 빚이 가치를 높인다고 본다. WACC는 자기자본과 부채 조달비용을 가중평균한 회사가 돈을 쓰는 평균 비용으로, 이를 낮추는 자본구조가 최적이다.", "example": "핀로그 6주차에서 기업 밸류업·주주환원을 잉여현금흐름(FCF) 가설, 대리인 비용, MM 수정이론, 최적 자본구조 관점에서 검토했다."}, {"id": "fcf-agency", "term": "잉여현금흐름(FCF)·대리인 비용", "category": "재무/회계", "keywords": ["잉여현금흐름", "fcf", "대리인비용", "대리인문제", "주주환원"], "short": "회사에 남는 여윳돈(FCF)과, 경영진이 주주 이익과 다르게 행동할 때 생기는 비용.", "detail": "잉여현금흐름은 영업으로 번 돈에서 투자에 쓴 돈을 뺀, 회사가 자유롭게 쓸 수 있는 현금이다. 이 돈이 많은데 경영진이 주주에게 돌려주지 않고 비효율적으로 쓰면 대리인 비용이 생긴다. 주주(주인)와 경영진(대리인)의 이해가 어긋나는 문제로, 주주환원 확대가 이를 줄이는 처방으로 제시된다.", "example": "밸류업의 출발점도 결국 거버넌스와 대리인 문제다. 남는 현금을 쌓아 두지 말고 배당·자사주 소각으로 주주에게 돌려주라는 압박이 그 핵심이다."}, {"id": "cbdc", "term": "CBDC(중앙은행 디지털화폐)", "category": "디지털금융", "keywords": ["cbdc", "중앙은행디지털화폐", "디지털화폐", "프로젝트한강", "예금토큰"], "short": "한국은행이 직접 발행하는 디지털 형태의 공식 현금.", "detail": "카카오페이·계좌이체는 은행이 보증하는 돈이지만, CBDC는 한국은행이 발행을 보증하는 디지털 지폐다. 비트코인 같은 코인과 달리 값이 출렁이지 않고 1원은 늘 1원이다. 종이 지폐를 스캔해 스마트폰에 넣은 것처럼 발행처와 가치는 같고 형태만 디지털이다. 다만 모든 거래가 기록될 수 있어 사생활 논란이 따른다.", "example": "한국은행의 프로젝트 한강 1차 실험(2025년 4~6월)은 예금토큰 지갑 약 8만 개를 발급하고 종료됐다. 2차는 은행 비용 부담과 로드맵 부재로 잠정 보류된 상태다."}, {"id": "stablecoin", "term": "스테이블코인", "category": "디지털금융", "keywords": ["스테이블코인", "stablecoin", "원화스테이블코인", "테더", "준비금", "한국예탁결제원", "블록체인", "토큰증권", "CBDC", "토큰증권(STO)", "한국은행", "금융결제원", "지급결제", "스테이블코인·CBDC·토큰증권"], "short": "달러·원화 같은 실제 화폐에 값을 고정시킨, 출렁이지 않는 코인.", "detail": "비트코인은 하루에도 몇 %씩 뛰지만, 스테이블코인은 1코인 = 1달러처럼 값을 묶어 둔다. 그래서 코인 시장에서 현금 대용으로 쓰인다. 발행사가 코인 발행량만큼 진짜 달러(준비금)를 갖고 있느냐가 신뢰의 관건이다. 발행사가 부실하면 가치가 무너질 위험이 있다.", "example": "원화 스테이블코인은 은행이 지분 50%+1주를 가진 컨소시엄이 먼저 발행한다는 안 등을 놓고 입법이 공회전 중인 미확정 사안이다. 발행 시점에 최신 상황을 반드시 확인해야 한다.", "topic": true, "weeks": "4·7~8차", "hashtags": ["#한국은행", "#금융결제원", "#지급결제"], "conclusion": "팀은 스테이블코인의 본질을 ‘ 준비자산과 환매 ’로 압축했다. 이를 증권·예금·전자화폐 중 무엇으로 규율하느냐의 문제로 보고, 지급결제 인프라로 커질수록 금융안정 규율이 선행되어야 한다고 결론지었다(디지털금융포럼 참석 통찰 반영).", "interview_tip": "[한국은행·금융결제원 지원] CBDC를 현금 대체가 아니라, 빅테크·스테이블코인 확장에 맞서 ‘국가 통화 주권’과 ‘미래 지급결제 주도권’을 지키는 전략으로 정의하라.", "faqs": [{"question": "스테이블코인의 가치는 어디서 오나요?", "answer": "블록체인 기술이 아니라 달러·국채 같은 준비자산의 안정성, 발행사 신뢰, 환매 가능성에서 옵니다."}, {"question": "스테이블코인·CBDC·토큰증권의 차이는?", "answer": "가치를 떠받치는 ‘닻’이 각각 민간 준비자산, 국가(중앙은행), 기초증권으로 다릅니다."}, {"question": "왜 규율이 필요한가요?", "answer": "지급결제망에 편입될수록 디페깅(뱅크런)이 금융안정 위험이 되므로 준비자산의 투명한 공시가 우선 과제입니다."}], "issues": ["지급결제 인프라 : 스테이블코인이 송금·결제 수단으로 커지면 통화정책·금융안정에 영향.", "준비자산 투명성 : 발행사가 정말 1:1로 자산을 보유하는지(감사·공시)가 신뢰의 핵심.", "제도화 : 토큰증권·조각투자 제도화로 권리관리·결제 인프라의 디지털 확장."], "title": "스테이블코인·CBDC·토큰증권 — 디지털 화폐의 세 갈래"}, {"id": "blockchain", "term": "블록체인·분산원장", "category": "디지털금융", "keywords": ["블록체인", "분산원장", "blockchain", "장부", "위변조"], "short": "거래 기록을 여러 컴퓨터에 똑같이 나눠 저장해, 위조가 사실상 불가능한 장부 기술.", "detail": "보통 은행은 거래 장부를 중앙 서버 한 곳에 보관한다(중앙집중형). 블록체인은 그 장부를 참여자 모두가 한 부씩 나눠 갖고(분산원장), 새 거래가 생길 때마다 다 같이 대조해 기록한다. 한 명이 몰래 숫자를 고쳐도 나머지와 다르면 곧바로 가짜로 들통난다. 반 전체가 같은 출석부를 한 권씩 갖고 있는 셈이다.", "example": "CBDC, 스테이블코인, 토큰증권이 모두 이 기술 위에서 돌아간다. 디지털금융의 토대를 이해하는 기본기로, 핀로그 4주차에서 집중적으로 다뤘다."}, {"id": "ethereum", "term": "이더리움", "category": "디지털금융", "keywords": ["이더리움", "ethereum", "이더", "플랫폼", "프로그래밍"], "short": "스마트컨트랙트를 돌릴 수 있는, 프로그래밍 가능한 대표 블록체인 플랫폼.", "detail": "비트코인이 단순히 가치를 주고받는 디지털 금이라면, 이더리움은 그 위에 다양한 프로그램(스마트컨트랙트)을 올려 돌릴 수 있는 일종의 운영체제 같은 블록체인이다. 토큰 발행, 자동 계약, 탈중앙 앱(DApp)이 대부분 이더리움 같은 플랫폼 위에서 만들어진다.", "example": "토큰증권·스테이블코인 등 새로운 디지털 자산이 이더리움류 플랫폼의 스마트컨트랙트를 활용해 발행·운영된다. 핀로그 채팅에서 분산원장·블록체인과 함께 자주 헷갈리는 개념으로 정리됐다."}, {"id": "smart-contract", "term": "스마트컨트랙트", "category": "디지털금융", "keywords": ["스마트컨트랙트", "smartcontract", "자동계약", "코드", "자판기"], "short": "조건이 충족되면 사람 개입 없이 자동으로 실행되는, 블록체인 위의 계약 프로그램.", "detail": "A가 입금하면 즉시 B에게 소유권을 넘긴다 같은 약속을 코드로 짜 두면, 조건이 맞는 순간 자동으로 실행된다. 중개인이나 공증인이 필요 없다. 정해진 금액을 넣으면 직원 없이 음료가 나오는 자판기에 비유된다. 계약서이자 동시에 그 계약을 집행하는 직원인 셈이다.", "example": "토큰증권 거래에서 배당·권리 이전을 자동화하는 핵심 기술로 쓰인다. 부동산 거래나 보험금 지급도 자동·즉시 처리될 수 있어 중간 비용과 시간을 줄인다."}, {"id": "sto", "term": "토큰증권(STO)·조각투자", "category": "디지털금융", "keywords": ["토큰증권", "sto", "조각투자", "디지털증권", "전자증권"], "short": "부동산·미술품·저작권 같은 자산을 블록체인 위 디지털 조각으로 쪼개 거래하는 증권.", "detail": "수십억짜리 빌딩이나 유명 그림은 보통 사람이 통째로 못 산다. 이걸 1만 원짜리 조각 수만 개로 나눠 사고팔 수 있게 만든 게 토큰증권이다. 피자 한 판을 조각으로 잘라 나눠 사는 것과 같다. 주식처럼 정식 증권으로 인정받는다는 점이 핵심이며, 큰돈 없이 다양한 자산에 소액 투자할 길을 연다.", "example": "토큰증권 관련법이 2026년 1월 국회를 통과해 2월 공포됐고, 실제 시행은 2027년 2월로 예정돼 있다. 제도 틀은 잡혔지만 본격 시장이 열리기까진 시간이 더 걸린다."}, {"id": "mydata", "term": "마이데이터", "category": "디지털금융", "keywords": ["마이데이터", "mydata", "본인신용정보", "자산관리", "정보주권"], "short": "여기저기 흩어진 내 금융정보를 한곳에 모아 보고, 내가 주도권을 갖는 서비스.", "detail": "은행·카드·보험·증권에 흩어진 내 데이터를 한 앱에서 모아 보여 준다. 핵심은 내 정보의 주인은 나라는 점이다. 내가 동의해야만 기업이 내 데이터를 가져다 맞춤 서비스를 만들 수 있다. 여러 은행 통장을 한 폴더에 모은 가계부 앱과 비슷하며, 폴더 열쇠는 내가 쥔다.", "example": "마이데이터는 이미 대부분 금융앱의 기본 토대가 됐다. 앞으로는 통신·의료 등 금융 밖 데이터까지 묶이는 방향으로 넓어지고 있다."}, {"id": "open-banking", "term": "오픈뱅킹", "category": "디지털금융", "keywords": ["오픈뱅킹", "openbanking", "api", "계좌통합", "이체"], "short": "앱 하나로 모든 은행 계좌를 조회·이체할 수 있게 길을 터준 공동 시스템.", "detail": "예전엔 은행마다 앱을 따로 깔아야 했지만, 오픈뱅킹은 한 앱에서 여러 은행 계좌를 모두 다루게 해 준다. 은행들이 서로 거래 통로(API)를 열어준 덕분이다. 은행마다 따로 있던 출입문을 하나의 마스터키로 다 여는 것에 비유된다. 마이데이터와 짝을 이뤄 한 앱에서 다 되는 금융을 떠받친다.", "example": "오픈뱅킹은 토스·카카오페이부터 전통 은행 앱까지 표준 기능으로 깔렸다. 핀테크가 빠르게 큰 바탕에 이 공동 통로가 있었다."}, {"id": "crypto-wallet", "term": "가상자산 지갑(개인키)", "category": "디지털금융", "keywords": ["가상자산지갑", "지갑", "개인키", "프라이빗키", "코인보관"], "short": "코인·토큰을 보관하고 주고받는, 디지털 자산용 전자지갑.", "detail": "코인은 실물이 없어 지갑이라는 앱·기기에 보관한다. 핵심은 지갑마다 있는 개인키다. 이 비밀번호 격 열쇠를 잃으면 안에 든 자산을 영영 못 찾고, 남에게 알려주면 통째로 털린다. 열쇠가 단 하나뿐이고 재발급도 안 되는 금고에 비유된다. 내 자산은 내가 직접 지킨다는 책임이 따른다.", "example": "한국은행 프로젝트 한강에서 발급한 예금토큰 지갑 약 8만 개가 바로 이 가상자산 지갑의 한 형태다. 제도권 디지털화폐 실험도 결국 지갑에서 시작한다."}, {"id": "pqc", "term": "양자내성암호(PQC)", "category": "디지털금융", "keywords": ["양자내성암호", "pqc", "양자컴퓨터", "보안", "암호"], "short": "미래의 양자컴퓨터로도 못 깨도록 설계한 차세대 암호 기술.", "detail": "지금 금융 보안은 풀기 너무 오래 걸리는 수학 문제에 기대고 있는데, 양자컴퓨터가 이를 순식간에 풀어버릴 수 있다. 그 전에 미리 갈아 끼우는 더 튼튼한 자물쇠가 양자내성암호다. 곧 등장할 만능 도둑을 대비해 미리 신형 자물쇠를 다는 셈이다.", "example": "한국은 독자 표준 KpqC 4종을 선정했고(2025년 1월), 토스페이먼츠가 2026년 4월 국내 처음으로 양자내성암호 결제를 도입했다. 이론에서 실제 결제로 넘어오기 시작한 단계다."}, {"id": "alt-data-credit", "term": "대안데이터 신용평가·씬파일러", "category": "디지털금융", "keywords": ["대안데이터", "씬파일러", "신용평가", "포용금융", "비금융데이터", "XAI", "AI 기본법", "고영향 AI", "편향", "씬파일러(thin-filer)", "XAI 거절 사유 고지", "인터넷은행", "핀테크", "대안데이터·신용평가"], "short": "금융이력이 얇은 사람을 통신비·공과금 같은 생활 데이터로 평가해 대출 문을 여는 기술.", "detail": "은행은 보통 과거 카드·대출 상환 기록으로 신용을 본다. 그런데 사회초년생·신규 자영업자는 이 기록 자체가 거의 없는 씬파일러(thin filer)다. 신용이 나쁜 게 아니라 평가할 데이터가 없는 것이다. 대안데이터는 통신비·도시가스·전기요금을 제때 냈는지 같은 성실히 살아온 기록으로 갚을 능력을 추정한다.", "example": "국내에선 통신사 납부정보, 국민연금·건강보험료 납부이력이 이미 신용평가에 반영된다. 다만 거주지·소비패턴이 특정 계층을 불리하게 만들 수 있어, AI 기본법이 편향검증 의무를 부과했다.", "topic": true, "weeks": "7~8차", "hashtags": ["#인터넷은행", "#핀테크", "#신용평가"], "conclusion": "핀로그는 대안 신용평가를 ‘포용 vs 공정’의 긴장 으로 압축했다. 대안데이터로 포용을 넓히되 거주지·소비 같은 간접차별 변수는 편향검증으로 걸러야 하며, 거절 사유 고지가 신뢰의 최소조건이라고 보았다.", "interview_tip": "[인터넷전문은행·핀테크 기획] 혁신적 신용평가 모델을 구축하되, 차별 요소를 배제하는 정기 검증 시스템을 함께 마련해 ‘규제와 포용’을 동시에 만족시키겠다고 어필하라.", "faqs": [{"question": "씬파일러가 뭔가요?", "answer": "금융 거래 이력이 얇아 전통 신용평가에서 불리한 사회초년생·자영업자입니다."}, {"question": "대안데이터는 무엇인가요?", "answer": "통신비·공과금 같은 비금융 데이터로 상환능력을 추정해 금융 포용을 넓힙니다."}, {"question": "‘공정성 역설’이란?", "answer": "포용을 위한 데이터(거주지·소비)가 오히려 간접차별을 낳을 수 있어 편향검증이 필수라는 점입니다."}], "issues": ["금융 포용 : 대안 신용평가로 사회초년생·자영업자의 금융 접근성 확대.", "편향 위험 : 거주지·소비패턴이 지역·계층 차별로 이어질 수 있다.", "설명책임 : ‘왜 거절됐는지’ 고지 의무(AI 기본법 고영향 AI)."], "title": "대안데이터·신용평가 — 금융 이력 없는 사람에게 점수를 주는 법"}, {"id": "ai-fraud-detection", "term": "AI 이상거래탐지·시장감시", "category": "디지털금융", "keywords": ["이상거래탐지", "시장감시", "시세조종", "nsds", "비지도학습", "공매도 통합점검시스템", "공매도", "NSDS", "한국거래소", "KRX", "AI 이상거래탐지", "XAI", "SHAP", "LIME", "AI 기본법", "설명가능성(XAI)", "NSDS(2025.03 가동)", "XAI(SHAP·LIME)", "금융공기업(KRX)"], "short": "수백만 건의 주문을 기계가 실시간으로 훑어 시세조종·불법 공매도를 잡아내는 기술.", "detail": "시장감시는 거래소·감독기관이 비정상 거래를 찾아내는 일로, 모든 가방을 X-ray로 통과시키는 공항 보안검색대에 비유된다. 시세조종(허수 주문)·불법 무차입 공매도·미공개정보 이용이 대표적 불공정거래다. 정상 거래가 압도적이라 정답표 없이 평소와 다른 행동을 찾는 비지도학습(이상치 탐지)이 잘 맞는다.", "example": "2025년 3월 공매도 재개와 함께 KRX가 공매도통합점검시스템(NSDS)을 가동해, 매도 가능 잔고를 넘어선 주문을 주문 단계에서 걸러낸다. 점검률 91.3%, 위반 76건이 확인됐다.", "topic": true, "weeks": "7~8차", "hashtags": ["#한국거래소", "#금융감독원", "#컴플라이언스"], "conclusion": "팀의 결론은 ‘ 잡는 능력만큼 설명하는 능력 ’이다. AI는 보조이고 최종 판단·책임은 사람이 진다는 원칙 아래, XAI가 제재의 정당성을 만든다고 보았다. NSDS는 무차입 억제의 진일보지만 100% 차단은 불가능하다는 한계도 함께 인식했다.", "interview_tip": "[KRX·금감원 컴플라이언스 지원] 모델 정확도 향상에만 집중하지 않겠다고 하라. 비지도학습으로 적발한 이상 패턴을 SHAP·LIME로 시각화해 사후 제재의 ‘정당성·수용성’을 확보하는 거버넌스 접근을 어필하라.", "faqs": [{"question": "AI 이상거래탐지가 뭔가요?", "answer": "정상 패턴을 학습해 거기서 벗어난 이상(시세조종 등)을 실시간으로 잡아내는 기술입니다."}, {"question": "왜 설명가능성(XAI)이 필요한가요?", "answer": "‘왜 이상한가’를 설명하지 못하면 제재의 법적 근거가 약해지기 때문입니다."}, {"question": "NSDS의 한계는?", "answer": "무차입 억제에 진일보했지만 100% 차단은 불가능해, 사람의 최종 판단이 병행돼야 합니다."}], "issues": ["NSDS(2025.03 가동) : 한국거래소 공매도 통합점검시스템이 실시간 잔고 대조·주문 차단으로 무차입을 사전 점검.", "실시간성 : 가격이 출렁이는 순간을 잡아야 하므로 사람 손으로는 늦다.", "오탐 딜레마 : 민감도를 높이면 정상 거래도 걸리고, 낮추면 놓친다."], "title": "AI 이상거래탐지 — 시장의 ‘CCTV’가 똑똑해지다"}, {"id": "algo-fairness", "term": "알고리즘 공정성·설명가능 AI(XAI)", "category": "디지털금융", "keywords": ["알고리즘", "공정성", "설명가능ai", "xai", "블랙박스"], "short": "AI가 내린 금융 결정의 왜를 설명하고 차별이 없는지 검증하는 금융윤리 과제.", "detail": "AI가 대출 가부·신용점수를 정할 때 모델 속을 들여다보기 어려운 것을 블랙박스라 한다. 여기서 편향(과거 차별을 그대로 학습), 설명 불가(거절 사유를 못 알려줌), 책임 공백 위험이 생긴다. 설명가능 AI(XAI)는 SHAP·LIME 같은 기법으로 소득 대비 부채 과다처럼 결정에 작용한 변수를 수치로 제시해 이를 푼다.", "example": "요점은 사후 변명이 아니라 모델을 만들 때부터 설명·검증·기록을 설계에 넣는 것이다. AI 기본법이 신용평가·여신심사를 고영향 AI로 분류한 배경이기도 하다."}, {"id": "esg-data", "term": "ESG 데이터 자동산출·그린워싱", "category": "디지털금융", "keywords": ["esg데이터", "그린워싱", "탄소배출계수", "데이터허브", "좌초자산"], "short": "흩어진 탄소·ESG 데이터를 자동으로 모아 표준화하고, 부풀리기를 탐지하는 기술.", "detail": "공시 의무화로 기업은 검증 가능한 ESG 숫자를 내야 하는데, 수천 개 협력사가 자기 배출량조차 모르고 엑셀 취합은 오류가 잦다. 전력 1kWh = CO2 몇 g 같은 배출계수 DB로 자동 환산하고, ESG 데이터 허브로 한 번 입력한 값을 여러 기관이 공유하게 한다. 동종업계 대비 이상치를 잡아 그린워싱도 탐지한다.", "example": "기후리스크는 대출 부실로 이어지므로, 은행은 차주의 탄소데이터로 좌초자산(가치가 급락할 자산) 위험을 미리 반영한다. ESG 펀드는 신뢰할 수 있는 배출 데이터가 종목 편입의 근거가 된다."}, {"id": "value-up", "term": "밸류업(기업가치 제고)", "category": "규제/제도", "keywords": ["밸류업", "valueup", "기업가치제고", "주주환원", "코리아디스카운트"], "short": "저평가된 한국 기업이 주주환원·지배구조 개선으로 스스로 몸값을 끌어올리는 정책 흐름.", "detail": "정부와 거래소가 기업들아, 배당 늘리고 자사주 소각해서 주주한테 보답하고 그 계획을 공개해라라고 유도하는 프로그램이다. 코리아 디스카운트를 푸는 처방전 격이며, 집을 내놓기 전 도배·수리해 제값을 받으려는 노력에 비유된다. PBR 1배 미만 저평가 기업의 개선을 특히 겨냥했다.", "example": "밸류업 공시 기업이 누적 약 718곳(시가총액의 77%)에 이르렀고, 2025년 주주환원 규모는 약 92조 원이었다. 자사주 의무소각 시행으로 삼성전자가 7조 원대 소각에 나선 것이 대표 사례다."}, {"id": "korea-discount", "term": "코리아 디스카운트", "category": "규제/제도", "keywords": ["코리아디스카운트", "할인", "저평가", "지배구조", "지정학"], "short": "비슷한 외국 기업보다 한국 주식이 유독 싸게 평가받는 현상.", "detail": "같은 돈을 벌어도 한국 회사 주가가 미국·유럽 회사보다 낮게 매겨지는 한국 할인이다. 원인으로 지정학 리스크(북한), 지배구조 문제(소액주주 홀대), 낮은 배당이 꼽혀 왔다. 차 자체가 나쁜 게 아니라 신뢰 문제로 값이 깎이는 중고차와 비슷하다.", "example": "2025년 코스피가 75.6% 오르고 2026년 6월 9,000선을 돌파하면서 코리아 디스카운트가 드디어 풀리는 것 아니냐는 기대가 커졌다. 이사가 주주에게도 충실해야 한다는 상법 개정도 같은 맥락이다."}, {"id": "commercial-law", "term": "상법 개정(이사 충실의무)", "category": "규제/제도", "keywords": ["상법개정", "이사충실의무", "주주", "지배구조", "소액주주"], "short": "이사의 충실의무 대상에 회사뿐 아니라 주주를 추가한 법 개정.", "detail": "기존 상법은 이사가 회사를 위해 일하면 된다고 규정해, 실제로는 대주주 이익만 챙기고 소액주주가 손해 보는 일이 잦았다. 개정으로 이사가 모든 주주를 향해 운전대를 잡아야 한다는 의무가 추가됐다. 대리인 문제를 줄이고 코리아 디스카운트를 푸는 제도적 장치로 평가된다.", "example": "2025년 7월 공포됐다. 회사가 일부 대주주만이 아니라 일반 주주도 챙겨야 한다는 신호로, 밸류업·주주환원 흐름과 맞물린다."}, {"id": "regtech", "term": "레그테크(RegTech)", "category": "규제/제도", "keywords": ["레그테크", "regtech", "컴플라이언스", "aml", "kyc", "가상자산이용자보호법", "가상자산", "AML", "KYC", "트래블룰", "AI 기본법", "고영향 AI", "편향", "신용평가", "AML·KYC", "AI 기본법(2026.01.22 시행)", "자금세탁방지"], "short": "복잡한 금융규제 대응을 소프트웨어로 자동화해, 위반을 실시간으로 걸러내는 기술.", "detail": "규제(Regulation)와 기술(Technology)의 합성어다. 사람이 일일이 확인하던 규정 준수를 자동화한다. 차선 이탈을 경고하고 충돌 직전 제동을 거는 운전자 보조시스템처럼, 의심거래를 감지해 경보를 울리고 위반을 미리 막는다. 대표 영역이 AML(자금세탁방지)·KYC(고객확인)다.", "example": "한국은 가상자산이용자보호법과 트래블룰 적용으로 점검 대상이 크게 늘어 레그테크 수요가 커졌다. 탐지 기준을 너무 빡빡하게 잡으면 정상 거래까지 막는 오탐이 늘어나는 게 과제다.", "topic": true, "weeks": "7~8차", "hashtags": ["#자금세탁방지", "#컴플라이언스", "#금융IT"], "conclusion": "핀로그는 레그테크의 본질을 ‘오탐·미탐의 균형’ 으로 정리했다. 자동화는 불가피하나 ‘왜 잡았는지 설명할 수 있느냐’가 규제 신뢰의 관건이며, 컴플라이언스 인재는 규제지식과 데이터 역량을 겸비해야 한다고 보았다.", "interview_tip": "[은행 자금세탁방지(AML) 직무] AI 기본법(‘고영향 AI’)을 위기가 아닌 기회로 삼겠다고 답하라. 룰베이스 모니터링을 넘어 AI로 오탐률을 낮추고 내부통제 비용을 절감하는 레그테크 도입 적임자임을 강조할 것.", "faqs": [{"question": "레그테크가 뭔가요?", "answer": "AML·KYC 같은 규제 준수를 데이터·AI로 자동화하는 기술입니다."}, {"question": "오탐·미탐 딜레마란?", "answer": "경보를 많이 울리면 정상 고객이 막히고(오탐), 적게 울리면 범죄를 놓칩니다(미탐)."}, {"question": "AI 기본법이 왜 중요한가요?", "answer": "신용평가·여신을 ‘고영향 AI’로 지정해 설명가능성·편향검증 의무를 부여하면서 레그테크 수요를 키웁니다."}], "issues": ["AI 기본법(2026.01.22 시행) : 신용평가·여신심사를 ‘고영향 AI’로 지정 → 설명가능성·편향검증 의무가 레그테크 수요를 키운다.", "오탐 문제 : 의심거래 경보가 과도하면 정상 고객 불편·운영비 폭증.", "컴플라이언스 직무 : 규제 해석 + 데이터·모델 이해를 겸비한 인재 수요 증가."], "title": "레그테크(RegTech) — 규제를 기술로 지키다"}, {"id": "crypto-law", "term": "가상자산이용자보호법·특금법·트래블룰", "category": "규제/제도", "keywords": ["가상자산이용자보호법", "특금법", "트래블룰", "mica", "코인규제"], "short": "코인 투자자를 보호하고 자금세탁을 막기 위한 한국·국제 규제 틀.", "detail": "가상자산이용자보호법은 코인 투자자의 예치금 보호·불공정거래 처벌 등을 규정한다. 특금법(특정금융정보법)은 가상자산사업자에게 자금세탁방지 의무를 지운다. 트래블룰은 코인을 주고받을 때 송·수신인 정보를 거래소끼리 확인·전송하도록 한 규칙이다. 유럽연합의 통합 규제인 MiCA와 비교해 자주 논의된다.", "example": "핀로그 4주차에서 가상자산이용자보호법·특금법·MiCA·CBDC를 비교하며 가상자산 규제와 이용자 보호를 토론했다."}, {"id": "ai-basic-law", "term": "AI 기본법(고영향 AI)", "category": "규제/제도", "keywords": ["ai기본법", "인공지능기본법", "고영향ai", "설명가능성", "편향검증"], "short": "사람의 권리에 큰 영향을 주는 AI를 고영향 AI로 분류해 설명·검증 의무를 지운 법.", "detail": "채용·의료·대출처럼 사람의 권리·의무에 큰 영향을 주는 영역의 AI를 고영향 AI로 본다. 신용평가·여신심사가 여기에 포함돼, 사업자는 AI가 왜 그렇게 판단했는지 설명할 수 있어야 하고(설명가능성) 특정 집단을 차별하지 않는지 검증해야 한다(편향검증). 다만 영향평가는 강제가 아닌 노력의무로 출발했다.", "example": "2026년 1월 22일 시행됐다. AI가 대출을 거절하면 그 근거를 댈 수 있어야 한다는 뜻으로, 대안신용평가·AI 이상거래탐지 등 금융 AI 전반에 영향을 준다."}, {"id": "esg-disclosure", "term": "ESG 공시·스코프3", "category": "규제/제도", "keywords": ["esg공시", "스코프3", "scope3", "탄소배출", "그린워싱", "KRX", "KSD", "DCF", "ESG 공시", "스코프 3", "WACC", "리스크 프리미엄", "리스크 프리미엄·WACC", "산업별 표준 배출계수 DB", "ESG 데이터 허브", "Safe Harbor", "금융공기업(KRX·KSD)", "ESG금융"], "short": "기업의 환경·사회·지배구조 성과, 특히 탄소배출량을 검증 가능한 형태로 공개하는 제도.", "detail": "탄소배출은 세 단계로 센다. 직접 배출(Scope1, 공장 굴뚝), 산 전기에서 나온 배출(Scope2), 공급망 전체(Scope3, 협력사·물류·제품 사용)다. Scope3는 측정이 가장 까다롭지만 전체 배출의 대부분을 차지하기도 한다. 공시가 의무화되면 이 숫자를 검증 가능하게 내야 해, 부풀리는 그린워싱 방지가 핵심 쟁점이다.", "example": "핀로그 6주차에서 ESG 공시·스코프3 문제를 정보 비대칭, 리스크 프리미엄, WACC, 그린워싱 방지(세이프하버) 관점에서 토론했다.", "topic": true, "weeks": "6·7~8차", "hashtags": ["#ESG금융", "#국책은행", "#자산운용"], "conclusion": "핀로그는 ESG를 이미지가 아니라 ‘자본비용에 반영되는 정보’ 로 규정했다. 스코프 3는 의무화 방향이 맞되, 표준 배출계수·Safe Harbor로 중소기업 부담을 줄이는 ‘검증 가능성 우선’ 설계가 핵심이라는 데 의견을 모았다.", "interview_tip": "[은행·국책은행 ESG 직무] ESG 데이터를 리포트용으로만 쓰지 않겠다고 선언하라. 기후위험을 리스크 프리미엄 산출에 반영해 여신심사·금리 산정에 녹이는 ‘기후금융 솔루션’을 기획하겠다고 어필하라.", "faqs": [{"question": "ESG 공시가 왜 중요한가요?", "answer": "재무제표가 못 보는 기후·공급망 등 미래 위험을 드러내 자본비용(WACC)과 기업가치에 반영하기 때문입니다."}, {"question": "스코프 3가 뭔가요?", "answer": "기업 직접배출(1)·구매전력(2)을 넘어 공급망 전체 배출(3)을 뜻하며, 측정이 가장 어렵습니다."}, {"question": "스코프 3 부담을 어떻게 줄이나요?", "answer": "산업별 표준 배출계수, 단계적 외부 검증, Safe Harbor로 ‘검증 가능성’을 우선 확보합니다."}], "issues": ["스코프 3 부담 : 대기업은 공시 의무를 지지만 데이터는 다수의 중소 협력사에 흩어져 있어, 측정 역량이 없으면 비용·부정확·그린워싱 위험.", "의무화 흐름 : 국내외 지속가능성 공시 의무화가 단계적으로 확대.", "핵심 원칙 : 공시 확대 자체보다 검증 가능성·비교 가능성 이 중요."], "title": "ESG 공시 — 재무제표가 못 보는 ‘미래 위험’을 비추다"}, {"id": "yellow-envelope", "term": "노란봉투법·긴급조정권", "category": "규제/제도", "keywords": ["노란봉투법", "긴급조정권", "노동권", "파업", "손해배상", "리스크 프리미엄", "반도체", "거시경제", "자본시장", "시사토론", "노란봉투법·긴급조정권"], "short": "파업 노동자에 대한 기업의 손해배상 청구를 제한하는 법과, 정부가 쟁의를 강제 중단시키는 권한.", "detail": "노란봉투법은 합법적 쟁의행위에 대해 기업이 노동자에게 과도한 손해배상·가압류를 청구하지 못하도록 제한하는 취지의 법이다. 긴급조정권은 국가 경제에 큰 타격을 주는 쟁의가 벌어졌을 때 정부가 일정 기간 강제로 중단시키는 권한이다. 노동권과 기업 투자 의사결정·거시경제 안정성이 충돌하는 주제다.", "example": "핀로그 6주차에서 단순 찬반이 아니라 노동권, 기업 투자, 글로벌 자본 유출입, 거시경제 안정성이 충돌하는 문제로 다뤘다.", "topic": true, "weeks": "6차", "hashtags": ["#거시경제", "#자본시장", "#시사토론"], "conclusion": "팀의 결론은 ‘ 노동권과 거시안정은 본래 충돌이 아니라 제도 설계 부실에서 충돌한다 ’는 것이다. 적용 범위·기준의 정교함이 순효과를 좌우하며, 긴급조정권은 ‘최후 수단’일 때만 정당하다는 데 의견을 모았다.", "interview_tip": "[경제·시사 토론 면접] 노사 불안정이 ‘국가 리스크 프리미엄’을 높여 외국인 투자를 좌우하는 핵심 거시 변수임을 지적하고, 예측 가능한 제도 설계로 투자 불확실성을 제거하는 것이 자본시장 발전의 선결 과제임을 논리적으로 전개하라.", "faqs": [{"question": "노란봉투법이 뭔가요?", "answer": "하청 노동자 교섭권 확대·손배 책임 제한 등 노동권을 강화하는 입법입니다."}, {"question": "자본시장과 무슨 관련이 있나요?", "answer": "노사 불안정은 국가 리스크 프리미엄을 높여 외국인 투자를 좌우하는 거시 변수입니다."}, {"question": "순효과를 좌우하는 것은?", "answer": "입법 취지가 아니라 ‘적용 범위·기준의 정교함’이며, 긴급조정권은 최후 수단일 때만 정당합니다."}], "issues": ["긍정 : 하청 노동자 보호, 노사 갈등의 제도권 흡수, ESG 사회(S) 개선, 리스크 프리미엄 감소 가능성.", "부정 : 원청 교섭 부담·거래비용 증가, 경영 의사결정 지연, 외국인 투자자 우려.", "핵심 : 순효과는 입법 취지가 아니라 적용 범위·기준의 정교함 에 달려 있다."], "title": "노란봉투법·긴급조정권 — 노동권과 거시 안정의 줄다리기"}, {"id": "bigtech-finance", "term": "빅테크의 금융 진출·독점", "category": "규제/제도", "keywords": ["빅테크", "독점", "플랫폼", "독과점", "금융진출"], "short": "거대 IT 플랫폼이 결제·대출·보험으로 영역을 넓히며 생기는 편익과 독과점 우려.", "detail": "네이버·카카오 같은 빅테크가 결제·대출·보험을 한 플랫폼에서 제공하면 소비자는 편리하다. 하지만 알고리즘이 누구에게 돈을 빌려줄지 정하는 순간 책임 소재가 흐려지고, 한 기업이 금융을 쥐는 독과점·데이터 집중 우려가 커진다. 혁신 촉진과 공정 경쟁·소비자 보호 사이의 균형이 쟁점이다.", "example": "핀로그 1주차에서 빅테크 독점의 원인과 규제의 한계·개선방안을 논술 주제로 다뤘다. 지배구조·책임경영 보고서에서도 핵심 과제로 짚었다."}, {"id": "governance", "term": "기업 지배구조(거버넌스)", "category": "규제/제도", "keywords": ["지배구조", "거버넌스", "이사회", "대리인문제", "책임경영"], "short": "회사의 의사결정 규칙과 견제 장치로, 주주·이사회·경영진의 권한 균형을 다룬다.", "detail": "주주가 주인, 이사회가 운전대, 경영진이 운전기사라면, 운전기사가 자기 편한 길로만 가면 주인이 손해를 본다. 이것이 대리인 문제다. 지배구조는 이사회·감사·주주총회 등으로 경영진을 견제해 모든 주주의 이익을 지키는 틀이다. ESG의 G에 해당하며 기업 신뢰자본의 핵심이다.", "example": "전자투표·의결권 행사(KSD), 밸류업 공시·거버넌스 점검(KRX)이 주주 권리를 실무에서 구현한다. 상법 개정으로 이사 충실의무 대상에 주주가 추가된 것도 거버넌스 강화의 일환이다."}, {"id": "terra-luna", "term": "테라·루나 사태", "category": "사건사례", "keywords": ["테라", "루나", "terra", "luna", "알고리즘스테이블코인"], "short": "1달러 고정을 알고리즘에 의존하던 스테이블코인이 무너지며 막대한 가치가 증발한 사건.", "detail": "테라(UST)는 실제 달러 준비금 대신 자매 코인 루나(LUNA)와의 교환 알고리즘으로 1코인=1달러를 유지하려 한 알고리즘 스테이블코인이었다. 2022년 5월 신뢰가 흔들리자 가격이 1달러 밑으로 깨졌고, 이를 메우려 루나를 무한 발행하면서 루나 가치까지 동반 폭락하는 죽음의 소용돌이에 빠져 며칠 만에 사실상 휴지가 됐다.", "example": "준비금 없는 스테이블코인의 위험을 보여 준 대표 사례로, 스테이블코인 발행사가 발행량만큼 진짜 자산을 보유해야 한다는 규제 논의의 출발점이 됐다."}, {"id": "svb", "term": "실리콘밸리은행(SVB) 파산", "category": "사건사례", "keywords": ["svb", "실리콘밸리은행", "뱅크런", "파산", "예금인출"], "short": "금리 급등기에 보유 채권 손실과 대규모 예금 인출이 겹쳐 며칠 만에 무너진 미국 은행.", "detail": "SVB는 저금리 때 사들인 장기 국채를 많이 들고 있었는데, 2022~2023년 금리가 급등하며 그 채권 값이 크게 떨어졌다(채권 가격은 금리와 반대로 움직인다). 손실을 메우려 채권을 팔고 자본을 확충하려 하자 불안이 퍼져, 2023년 3월 SNS를 타고 예금이 한꺼번에 빠져나가는 뱅크런으로 단 며칠 만에 파산했다.", "example": "금리 위험 관리와 예금 편중의 위험을 보여 준 사건이다. 채권 가격과 금리가 반대로 움직인다는 원리가 현실에서 어떻게 은행을 무너뜨리는지 보여 주는 교과서적 사례로 인용된다."}, {"id": "padu", "term": "기술특례상장·파두 사태", "category": "사건사례", "keywords": ["파두", "기술특례상장", "과대공시", "예상매출", "ipo논란"], "short": "기술력을 인정받아 특례로 상장한 기업이 상장 직후 실적 부풀리기 논란을 일으킨 사건.", "detail": "기술특례상장은 당장 이익이 없어도 기술력·성장성이 뛰어나면 상장을 허용하는 제도로, 유망 기술기업의 자금 조달을 돕는다. 반도체 팹리스 파두는 상장 직전 예상매출로 1,203억 원을 제시했지만 실제는 224억 원에 그쳐 과대공시 논란을 불렀다. 상장 심사와 공시의 신뢰성을 흔든 사건이다.", "example": "핀로그 2주차에서 파두 사태의 원인 분석과 해결방안을 논술로 다뤘다. PER 같은 지표도 공시 숫자 자체가 부풀려지면 무의미해진다는 점을 보여 준다. (세부 수치는 발행 전 재확인 권장)"}, {"id": "lime-optimus", "term": "라임·옵티머스 사태", "category": "사건사례", "keywords": ["라임", "옵티머스", "사모펀드", "환매중단", "불완전판매"], "short": "부실 자산에 투자한 사모펀드가 환매를 중단하며 대규모 투자자 피해를 낸 사건.", "detail": "라임·옵티머스는 사모펀드(소수 투자자 대상 펀드)로, 부실하거나 실체가 불분명한 자산에 투자하고 손실을 돌려막다 결국 돈을 돌려주지 못하는 환매중단에 빠졌다. 판매 과정에서 위험을 제대로 알리지 않은 불완전판매 문제까지 겹쳐, 사모펀드 규제와 투자자 보호 제도를 대폭 강화하는 계기가 됐다.", "example": "사모펀드의 정보 비대칭과 판매사 책임 문제를 보여 준 대표 사례다. 이후 사모펀드 운용·판매 규제가 강화됐다."}, {"id": "short-resume", "term": "공매도 전면 재개(2025)", "category": "사건사례", "keywords": ["공매도재개", "전면재개", "nsds", "2025", "무차입공매도"], "short": "장기간 금지·부분 허용됐던 공매도가 2025년 3월 전면 재개된 사건.", "detail": "한국은 코로나·불법 무차입 공매도 논란 등으로 공매도를 금지하거나 일부만 허용해 왔다. 2025년 3월 31일 공매도가 전면 재개되면서, 빌린 주식 없이 파는 반칙을 사전에 거르는 공매도통합점검시스템(NSDS)이 함께 가동됐다. 개인투자자 형평성과 시장 효율성 사이의 오랜 논쟁이 다시 불붙었다.", "example": "재개 후 점검률 91.3%에 위반 사례 76건이 적발됐다. 핀로그가 2~3주차에 걸쳐 공매도의 순기능·역기능과 개인투자자 수익률, 금융위 조치의 효과를 핵심 논술 주제로 다뤘다."}, {"id": "samsung-bonus", "term": "삼성전자 성과급·주주환원 논쟁", "category": "사건사례", "keywords": ["삼성전자", "성과급", "초과이익", "주주환원", "hbm"], "short": "기업의 초과이익을 직원 성과급으로 더 줄지 주주환원에 쓸지를 둘러싼 분배 논쟁.", "detail": "회사가 예상보다 많이 벌면 그 초과이익을 누구에게 얼마나 나눠야 하느냐가 문제가 된다. 직원 성과급을 늘리면 사기와 인재 유지에 좋고, 배당·자사주 소각 같은 주주환원을 늘리면 주가와 투자자에게 좋다. 노동·경영·주주의 이해가 맞부딪치는 분배 문제로, 반도체 HBM 경쟁 같은 산업 현안과도 얽힌다.", "example": "핀로그 5주차에서 삼성전자 성과급 대 주주환원, 반도체 HBM 경쟁을 토론했다. 2026년 자사주 의무소각으로 삼성전자가 7조 원대 소각에 나선 것과도 연결된다."}, {"id": "kospi-9000", "term": "코스피 9,000 돌파(2026)", "category": "사건사례", "keywords": ["코스피9000", "상승장", "밸류업", "반도체", "역사적고점"], "short": "코스피가 2026년 6월 사상 처음 9,000선을 넘은 역사적 상승장.", "detail": "2025년 75.6% 급등에 이어 2026년 6월 18일 코스피가 처음으로 9,000을 돌파했다(연초 대비 약 90% 상승). 반도체와 삼성전자가 상승을 이끌었고, 밸류업·상법 개정·자사주 의무소각 같은 제도 개혁이 시장 체질을 바꾼 것이 배경으로 꼽힌다. 오랜 숙제였던 코리아 디스카운트 해소 기대가 커졌다.", "example": "흔히 코스피 폭락을 떠올리기 쉽지만 2026년 상반기는 정반대인 강력한 상승장이었다. 다만 3%대 물가·1,530원대 환율·청년 고용 부진이라는 그늘이 공존한 뜨겁고도 불안한 호황이었다."}, {"id": "nim", "term": "NIM(순이자마진)", "category": "취업/직무", "keywords": ["nim", "순이자마진", "은행", "예대마진", "수익성"], "short": "은행이 돈을 빌려주고 받은 이자에서 예금에 준 이자를 뺀, 핵심 이익률.", "detail": "은행은 싸게 예금을 받아 비싸게 대출해 주며 그 차이로 먹고산다. 이 차이를 운용자산으로 나눈 게 NIM이다. 도매로 1,000원에 떼 온 물건을 1,500원에 파는 가게 마진과 같으며, 은행에선 그 물건이 돈일 뿐이다. 이 숫자가 높을수록 은행이 장사를 잘하고 있다는 뜻이다.", "example": "금융권 취업을 노린다면 은행 실적을 읽는 첫 열쇠다. 기준금리가 멈춘 국면에선 은행이 예금금리를 빠르게 낮춰 NIM을 방어하려는 움직임이 나타난다."}, {"id": "dsr", "term": "DSR(총부채원리금상환비율)", "category": "취업/직무", "keywords": ["dsr", "총부채원리금상환비율", "대출규제", "가계부채", "한도"], "short": "내 연 소득에서 모든 대출의 원금+이자 갚는 데 쓰는 돈의 비율.", "detail": "연봉이 5,000만 원인데 한 해 갚아야 할 대출 원리금이 2,000만 원이면 DSR은 40%다. 정부는 이 비율에 상한을 둬서 갚을 능력을 넘는 과도한 대출을 막는다. 주택담보대출·신용대출·카드론까지 다 합산되는 게 핵심이다. 식당이 정하는 1인당 최대 주문 한도와 비슷한 안전장치다.", "example": "집을 살 때 얼마까지 대출이 나오나를 결정하는 가장 강력한 규제다. 가계부채·환율 부담이 큰 국면에서 집값과 가계빚을 동시에 관리하는 핵심 수단으로 쓰인다."}, {"id": "krx", "term": "한국거래소(KRX)", "category": "취업/직무", "keywords": ["한국거래소", "krx", "거래소", "상장", "시장감시"], "short": "주식·채권·파생상품이 거래되는 시장을 운영하고 감시하는 한국의 핵심 자본시장 인프라 기관.", "detail": "KRX는 단순히 주식이 거래되는 곳이 아니라 상장 심사, 매매체결, 공시, 시장감시, 청산·결제까지 책임지는 시장 인프라 기관이다. 파생상품 증거금·일일정산 설계, 불공정거래 적출(시장감시본부) 등이 핵심 업무다. 금융공기업 취업 준비생이 가장 많이 분석하는 기관 중 하나다.", "example": "핀로그는 5주차에 부산 BIFC의 한국거래소 자본시장역사박물관을 방문해 상장·매매체결·공시·시장감시 등 거래소 역할을 현장에서 체험했다. NXT 출범으로 복수거래소 체제에서의 역할이 새 화두가 됐다."}, {"id": "ksd", "term": "한국예탁결제원(KSD)", "category": "취업/직무", "keywords": ["한국예탁결제원", "ksd", "예탁", "결제", "전자증권"], "short": "증권의 예탁·결제와 권리 관리를 담당하는 자본시장 후선 인프라 기관.", "detail": "KSD는 거래가 체결된 뒤 실제로 증권과 대금이 안전하게 오가도록 하는 결제, 증권을 모아 보관하는 예탁, 배당·의결권 같은 권리 관리, 전자증권·전자투표 운영을 맡는다. 눈에 잘 띄진 않지만 시장이 사고 없이 돌아가게 하는 후선 인프라의 핵심이다.", "example": "결제 안정성, 투자자 권리 보호, 토큰증권 같은 디지털 자산 인프라 정비와 연결된다. 전자투표·의결권 행사 지원으로 주주 권리를 실무에서 구현한다."}, {"id": "policy-finance", "term": "생산적 금융·기술평가·정책금융", "category": "취업/직무", "keywords": ["생산적금융", "기술평가", "기술보증기금", "정책금융", "포용금융"], "short": "기술력·성장성을 가진 기업이나 취약계층에 자금을 공급하는 공적 금융의 역할.", "detail": "생산적 금융은 돈이 부동산 투기가 아니라 기술·산업 같은 실물 경제 성장으로 흘러가게 하자는 방향이다. 기술보증기금 등 정책금융기관은 담보가 부족해도 기술력을 평가(기술평가)해 보증·자금을 지원한다. 서민금융·정책서민대출처럼 취약계층의 금융 문턱을 낮추는 포용금융도 정책금융의 큰 축이다.", "example": "핀로그 5주차에서 기술보증기금 현직자(박성배) 인터뷰로 생산적 금융·기술평가·공공기관 취업 준비를 심화했다. 대안데이터 신용평가가 포용금융의 실행 도구로 함께 논의됐다."}, {"id": "essay-interview", "term": "금융공기업 논술·면접 준비법", "category": "취업/직무", "keywords": ["논술", "면접", "금융공기업", "두괄식", "양면성"], "short": "쟁점을 균형 있게 분석하고 기관의 역할로 연결하는 금융권 논술·면접 답안 작성법.", "detail": "금융공기업 논술은 단순 찬반보다 제도의 긍정적 효과와 부작용, 현실적 개선방안, 공공기관의 역할을 균형 있게 제시하는 것이 핵심이다. 서론에서 왜 자본시장에 중요한지 밝히고, 본론에서 효과와 한계를 나눠 설명하며, 결론에서 거래소·예탁결제원 같은 기관 역할로 연결하는 구조가 권장된다. 투자자 보호·시장 안정성·혁신·공정성을 함께 고려한다.", "example": "핀로그는 1~2주차에 이 답안 구조를 정립하고, 두괄식·상호존칭·시간제한으로 실제 면접처럼 연습했다. 공매도·밸류업·NXT·ESG 등을 양면성 관점에서 다뤘다."}, {"id": "hbm-semiconductor", "term": "반도체·HBM 산업 현안", "category": "취업/직무", "keywords": ["반도체", "hbm", "메모리", "tsmc", "산업이해"], "short": "AI 시대 핵심 부품인 고대역폭메모리(HBM)를 둘러싼 반도체 산업 경쟁 이슈.", "detail": "HBM(고대역폭메모리)은 여러 메모리 칩을 수직으로 쌓아 데이터를 매우 빠르게 주고받는 고성능 메모리로, AI 반도체에 필수다. 한국 메모리 기업의 핵심 먹거리로 떠오르며 차세대(HBM4) 경쟁과 파운드리(TSMC)와의 협력 구도가 산업 화두다. 금융권에서도 반도체 업황은 코스피·수출과 직결돼 중요하다.", "example": "핀로그 5주차 SK하이닉스 인터뷰에서 HBM4 경쟁, TSMC와의 협력, 문과 직무의 산업 이해 필요성을 논의했다. 2026년 5월 반도체 수출이 169.4% 급증하며 코스피 9,000 돌파를 이끌었다."}, {"id": "seigniorage", "term": "시뇨리지(화폐주조차익)", "category": "디지털금융", "keywords": ["시뇨리지", "화폐주조차익", "seigniorage", "발행이익"], "short": "화폐를 발행해서 얻는 이익. 액면가와 제조원가의 차이.", "detail": "한국은행이 5만원권을 약 1,500원에 만들면 약 4만8,500원이 발행이익이다. 스테이블코인 발행사도 1달러를 받아 이자 없이 코인을 주고, 그 1달러를 미국 국채에 넣어 이자를 챙긴다. 디지털 금융 포럼에서 '발행사가 가만히 앉아 연 수조원을 버는 구조'로 설명됐다.", "example": "테더·서클이 막대한 수익을 내는 이유가 바로 시뇨리지다. 김용진 교수는 '코인 말고 테더·서클 주식에 투자하라'고 했다."}, {"id": "depeg", "term": "디페그(De-peg)", "category": "사건사례", "keywords": ["디페그", "depeg", "페그깨짐", "고정붕괴"], "short": "스테이블코인의 1코인=1달러 고정(페그)이 깨지는 현상.", "detail": "준비금 부실, 대량 매도, 보관 은행 부실 등으로 가격이 1달러 아래로 떨어진다. 알고리즘형은 구조적으로 취약하고, 담보형도 보관처 리스크가 있다.", "example": "2023년 실리콘밸리은행(SVB) 파산 때 USDC가 0.88달러까지 떨어졌다. 원인은 '핀테크라서'가 아니라 준비금을 맡긴 은행의 부실이었다."}, {"id": "hangang", "term": "프로젝트 한강(CBDC 실증)", "category": "디지털금융", "keywords": ["프로젝트한강", "한강프로젝트", "cbdc실증", "예금토큰실증"], "short": "한국은행이 주도한 예금토큰 기반 CBDC 실증사업.", "detail": "한국은행이 기관용 CBDC를 발행하고, 은행이 이를 기반으로 예금토큰을 발행·유통하는 이중구조다. 2025년 4~6월 1단계(결제), 이후 2단계(송금)로 진행됐다. 부산은행은 신라대 장학금 등에 적용했다.", "example": "1단계에서 전자지갑 약 8.1만 개가 발행됐지만, 가맹점 유인 부족으로 '결제·화폐용 성공 가능성은 낮다'는 평가가 나왔다."}, {"id": "mbridge", "term": "mBridge·프로젝트 아고라", "category": "디지털금융", "keywords": ["mbridge", "엠브리지", "아고라", "agora", "국경간결제", "bis"], "short": "BIS(국제결제은행)가 주도하는 국경 간 디지털 결제 프로젝트.", "detail": "mBridge는 중앙은행 간 결제, 아고라는 예금토큰 기반 결제를 실험한다. 중앙은행 7곳과 40여 개 민간은행이 참여하며 한국은행·연준·영란은행·일본은행이 포함된다. 핵심 과제는 상호운용성(API·KYC·AML 표준화)이다.", "example": "미국이 장악한 SWIFT망의 대안으로, 블록체인 기반 국경 간 결제를 통일하려는 시도다."}, {"id": "deposit-token", "term": "예금토큰(Deposit Token)", "category": "디지털금융", "keywords": ["예금토큰", "deposittoken", "토큰예금"], "short": "은행 예금을 블록체인 토큰으로 만든 것.", "detail": "중앙은행 CBDC를 기반에 두고 은행이 자기 예금을 토큰화해 발행한다. 은행의 신용창출 기능을 유지하면서 디지털 화폐의 장점(24시간·프로그래밍 가능)을 더하려는 절충 모델이다.", "example": "프로젝트 한강의 핵심 구조가 '한국은행 CBDC + 은행 예금토큰'의 이중구조다."}, {"id": "zkp", "term": "영지식증명(ZKP)", "category": "디지털금융", "keywords": ["영지식증명", "zkp", "zeroknowledge", "프라이버시증명"], "short": "데이터를 공개하지 않고도 사실을 증명하는 암호 기술.", "detail": "CBDC는 중앙은행이 모든 거래를 보는 프라이버시 문제가, 완전 암호화폐는 100% 익명성 문제가 있다. 영지식증명은 '거래 내용을 보지 않고도 안전·정당함을 증명'해 그 중간점을 제공한다.", "example": "디지털 금융 포럼에서 CBDC와 스테이블코인의 '관리된 공존'을 가능케 하는 핵심 기술로 제시됐다."}, {"id": "genius-act", "term": "지니어스법(GENIUS Act)", "category": "규제/제도", "keywords": ["지니어스법", "geniusact", "genius", "미국스테이블코인법"], "short": "미국의 스테이블코인 규제법(2025년 7월 발효).", "detail": "일반 법인의 스테이블코인 발행을 허용하되 ① 1달러 가치 유지 ② 준비금 100%를 현금·미국 단기국채로 보유 ③ 월별 준비금 공시 ④ 자금세탁(AML) 규제를 요구한다.", "example": "숨은 의도는 '국채 소화'다. 준비금을 미 국채로 채우게 해 달러 패권을 디지털로 연장하려는 전략으로 해석된다."}, {"id": "mica", "term": "MiCA(EU 가상자산 규제)", "category": "규제/제도", "keywords": ["mica", "미카", "eu가상자산법", "마켓인크립토에셋"], "short": "EU가 세계 최초로 만든 포괄적 가상자산 규제법.", "detail": "자산준거토큰(ART)과 전자화폐토큰(EMT)의 준비금 요건을 정하고 2025년부터 라이선스 체계를 적용한다. 미·중 패권 경쟁 사이에서 EU가 자기 권역을 보호하기 위한 '규제 방어막'이다.", "example": "유럽은 ECB의 디지털 유로(CBDC)와 MiCA(민간 규제)를 함께 추진한다."}, {"id": "rwa", "term": "RWA(실물자산 토큰화)", "category": "디지털금융", "keywords": ["rwa", "실물자산토큰화", "realworldasset", "조각투자자산"], "short": "부동산·저작권·원두 같은 실물자산을 쪼개 디지털로 거래하는 것.", "detail": "고가 자산을 토큰으로 잘게 나눠 소액 투자자도 참여할 수 있게 한다. 스테이블코인은 이런 자산 거래의 결제 매개가 된다.", "example": "부산 비단(BDAN)은 커피 원두를 1,000~2,000원 단위로 조각투자하는 RWA 상품을 출시했다."}, {"id": "won-stablecoin", "term": "원화 스테이블코인", "category": "규제/제도", "keywords": ["원화스테이블코인", "krw스테이블코인", "원화코인"], "short": "원화에 가치를 고정한 스테이블코인. 한국의 핵심 입법 과제.", "detail": "달러 스테이블코인의 확산으로 통화주권을 잃을 수 있다는 위기감에서 '빨리 도입하자'는 골든타임론이 나온다. 다만 '누가 발행하나(은행 51% vs 핀테크 개방)'를 두고 입법이 교착 상태다.", "example": "국내 첫 발행 유력 후보로 글로벌 네트워크를 가진 삼성이 거론됐다. 원화가 글로벌 통화가 아니라는 한계(환치기)도 과제다."}, {"id": "t_복수거래소", "term": "복수거래소", "category": "핀로그 학습주제", "keywords": ["복수거래소", "NXT", "최선집행의무", "SOR", "유동성 파편화", "한국거래소", "KRX", "NXT(대체거래소·ATS)", "한국거래소(KRX)", "SOR 엔진", "금융공기업(KRX)", "증권사IT", "시장운영"], "short": "약 70년 독점이 깨지고 한국거래소(KRX) 옆에 대체거래소 NXT 가 섰다.", "detail": "", "example": "", "topic": true, "weeks": "6차", "hashtags": ["#한국거래소", "#증권사IT", "#시장운영"], "conclusion": "팀은 ‘경쟁 자체’가 아니라 ‘분산을 묶는 인프라’가 성패를 가른다고 보았다. 통합 시세·최선집행·통합 시장감시가 미비한 채의 경쟁 도청산"], "short": "공매도한 주식을 되사는 것이 숏커버링, 그 매수가 몰려 주가가 급등하는 것이 쇼트 스퀴즈다.", "detail": "공매도 투자자는 빌린 주식을 갚기 위해 언젠가 반드시 시장에서 주식을 되사야 한다(숏커버링). 주가가 오르면 손실을 줄이려는 되사기가 한꺼번에 몰리고, 이 매수세가 주가를 더 밀어 올리는 악순환이 쇼트 스퀴즈다.", "example": "2021년 미국 게임스탑 사태가 대표 사례로, 개인 투자자들의 집중 매수가 공매도 세력의 대규모 숏커버링을 강제해 주가가 폭등했다."}, {"id": "best-execution", "term": "최선집행의무·SOR", "category": "규제/제도", "keywords": ["최선집행의무", "sor", "스마트오더라우팅", "주문라우팅", "복수거래소"], "short": "증권사가 고객 주문을 가장 유리한 시장으로 보내야 하는 의무와, 이를 자동으로 수행하는 기술(SOR).", "detail": "거래소가 두 곳 이상이면 같은 주식도 시장마다 호가가 다를 수 있다. 증권사는 가격·비용·속도를 따져 고객에게 가장 유리한 곳으로 주문을 보내야 하며(최선집행의무), 이를 사람 대신 실시간으로 판단해 주문을 배분하는 시스템이 SOR(스마트 주문 라우팅)이다.", "example": "2025년 대체거래소 넥스트레이드(NXT) 출범으로 한국도 복수시장 시대가 열리면서, KRX와 NXT의 호가를 비교해 주문을 보내는 SOR이 증권사 필수 인프라가 됐다."}, {"id": "consolidated-tape", "term": "통합 시세(Consolidated Tape)", "category": "시장/지수", "keywords": ["통합시세", "consolidated", "tape", "통합호가"], "short": "여러 거래소의 호가·체결 정보를 하나로 합쳐 실시간으로 보여주는 시세 피드.", "detail": "시장이 여러 개로 나뉘면 투자자는 어느 시장의 가격이 진짜 최선인지 알기 어렵다. 통합 시세는 모든 시장의 정보를 한데 모아 최우선 호가를 한눈에 보여줌으로써, 복수거래소 체제에서 투자자 보호와 시장 투명성을 지탱하는 기반이 된다.", "example": "미국은 여러 거래소의 시세를 통합한 테이프를 오래전부터 운영해 왔고, 한국도 복수거래소 시대에 맞춰 통합 시세의 중요성이 커지고 있다."}, {"id": "stock-lending", "term": "대차거래", "category": "주식/채권", "keywords": ["대차거래", "주식대여", "대차잔고", "증권대차"], "short": "기관 간에 주식을 빌려주고 빌리는 거래로, 공매도의 재료가 되는 후선 인프라다.", "detail": "주식을 장기 보유하는 연기금 등이 수수료를 받고 주식을 빌려주면, 빌린 쪽은 이를 공매도나 결제 이행에 쓴다. 한국예탁결제원 등이 중개·관리하며, 대차잔고는 공매도 대기 물량을 가늠하는 지표로도 읽힌다.", "example": "무차입 공매도를 걸러내려면 '실제로 주식을 빌렸는지'가 핵심이므로, 대차거래 기록은 공매도 점검 시스템의 기초 데이터가 된다."}, {"id": "e-voting", "term": "전자투표·전자위임장", "category": "규제/제도", "keywords": ["전자투표", "전자위임", "주주총회", "의결권"], "short": "주주총회에 가지 않아도 온라인으로 의결권을 행사할 수 있게 하는 제도.", "detail": "소액주주는 시간·거리 문제로 주총 참석이 어려워 의결권을 포기하기 쉽다. 전자투표는 이 문턱을 낮춰 주주 참여를 넓히고, 밸류업 시대에 주주권을 실질화하는 수단으로 주목받는다. 한국예탁결제원이 관련 플랫폼을 운영한다.", "example": "3월 말에 주총이 몰리는 '슈퍼 주총데이'에도 전자투표를 쓰면 여러 회사의 의결권을 모두 행사할 수 있다."}, {"id": "permissioned-dlt", "term": "허가형 분산원장", "category": "디지털금융", "keywords": ["허가형", "분산원장", "프라이빗블록체인", "컨소시엄"], "short": "아무나 참여하는 퍼블릭 블록체인과 달리, 허가받은 기관만 참여하는 분산원장.", "detail": "비트코인처럼 누구나 검증에 참여하는 방식은 금융 규제·속도 요건과 맞지 않는 경우가 많다. 허가형 분산원장은 은행·거래소 등 신뢰할 수 있는 기관들만 장부를 공유·검증하므로, 책임 소재가 분명하고 처리 속도가 빨라 토큰증권 등록이나 CBDC 실증 같은 제도권 실험에 주로 쓰인다.", "example": "한국의 토큰증권(STO) 인프라나 한국은행의 예금토큰 실증은 퍼블릭 코인이 아니라 허가형 분산원장 기반으로 설계된다."}, {"id": "cds", "term": "CDS(신용부도스왑)", "category": "파생상품", "keywords": ["cds", "신용부도스왑", "신용파생", "크레딧디폴트스왑"], "short": "채권이 부도날 위험을 사고파는 파생상품 — 부도가 나면 보험금처럼 손실을 보전받는다.", "detail": "보험료(프리미엄)를 내는 대신 채권 발행자가 부도나면 원금을 보전받는 구조로, '부도 보험'에 비유된다. 다만 장외에서 증거금 없이 대량으로 쌓이면 한 회사의 부실이 금융 시스템 전체로 번질 수 있다.", "example": "2008년 금융위기 때 AIG는 CDS를 증거금 관리 없이 대량 판매했다가 서브프라임 부실이 터지자 감당하지 못했고, 결국 미국 정부의 구제금융을 받았다."}, {"id": "network-effect", "term": "네트워크 효과", "category": "디지털금융", "keywords": ["네트워크효과", "승자독식", "플랫폼경제", "락인"], "short": "쓰는 사람이 많아질수록 서비스 가치가 커져 1등이 시장을 독식하게 되는 현상.", "detail": "메신저는 친구가 많이 쓸수록, 결제앱은 가맹점이 많을수록 좋아진다. 이 구조에서는 선두 플랫폼에 이용자와 데이터가 계속 쏠려 후발주자가 따라잡기 어렵고, 빅테크 독점·데이터 집중 논쟁의 출발점이 된다.", "example": "빅테크 플랫폼 규제 토론에서 '자사우대' 문제와 함께 항상 등장하는 개념으로, 핀로그 토론에서는 시청이 자기 상가 앞에만 횡단보도를 놓는 것에 비유됐다."}, {"id": "cbam", "term": "탄소국경조정제도(CBAM)", "category": "규제/제도", "keywords": ["cbam", "탄소국경세", "탄소국경조정", "eu탄소"], "short": "탄소 규제가 약한 나라의 제품에 EU가 국경에서 탄소 비용을 물리는 제도.", "detail": "EU 기업만 탄소 비용을 내면 생산이 규제 약한 나라로 빠져나가는 '탄소 누출'이 생긴다. CBAM은 수입품에도 같은 비용을 매겨 이를 막는 장치로, 철강·알루미늄 등 탄소 다배출 산업의 수출 기업에 직접적인 부담이 된다.", "example": "철강 수출 비중이 큰 한국 기업들은 CBAM 대응을 위해 탄소 배출량 측정·감축 체계를 서둘러 갖추고 있다."}, {"id": "kets", "term": "배출권거래제(ETS·K-ETS)", "category": "규제/제도", "keywords": ["배출권거래제", "ets", "kets", "탄소배출권"], "short": "정부가 탄소 배출 총량을 정하고, 기업들이 배출할 권리를 사고팔게 하는 제도.", "detail": "탄소세가 '가격'을 정하는 방식이라면, 배출권거래제는 '총량'을 정하고 가격은 시장에서 결정되게 하는 방식이다. 감축을 잘한 기업은 남은 배출권을 팔아 이익을 얻으므로, 시장 원리로 감축을 유도한다.", "example": "한국은 2015년부터 K-ETS를 운영 중이며, 탄소세 도입 논쟁에서 항상 비교 대상으로 등장한다."}, {"id": "externality", "term": "외부효과", "category": "거시경제", "keywords": ["외부효과", "외부성", "시장실패", "사회적비용"], "short": "내 행동의 비용이나 이익이 거래에 참여하지 않은 남에게 전가되는 현상.", "detail": "공장이 내뿜는 탄소의 피해는 공장이 아니라 사회 전체가 진다. 이렇게 가격에 반영되지 않는 비용(부정적 외부효과)은 시장 실패를 낳고, 세금(탄소세)이나 규제로 비용을 원인 제공자에게 되돌리는 것이 교정 수단이다.", "example": "탄소세 토론의 출발점이 되는 개념으로, 핀로그 토론에서는 '쓰레기 무단투기 벌금'에 비유됐다."}, {"id": "margin-call", "term": "마진콜(추가증거금 요구)", "category": "파생상품", "keywords": ["마진콜", "추가증거금", "증거금부족", "margincall"], "short": "파생상품 손실로 증거금이 기준 아래로 떨어지면 추가 납입을 요구받는 것.", "detail": "거래소는 시세에 맞춰 포지션별 필요 증거금을 매일(또는 실시간) 다시 계산한다. 손실이 나서 증거금이 유지 기준을 밑돌면 추가 증거금을 요구하고(마진콜), 내지 못하면 포지션이 강제 청산된다. 손실이 무한정 쌓이기 전에 끊어내는 안전장치다.", "example": "레버리지가 큰 선물 포지션일수록 작은 가격 변동에도 마진콜이 발생할 수 있어, 파생상품 리스크 관리의 핵심 장치로 꼽힌다."}, {"id": "els-elw", "term": "ELS·ELW(파생결합상품)", "category": "파생상품", "keywords": ["els", "elw", "파생결합증권", "주가연계증권"], "short": "주가나 지수의 움직임에 따라 수익이 결정되도록 설계된 파생결합 금융상품.", "detail": "ELS(주가연계증권)는 '지수가 일정 수준 아래로 떨어지지 않으면 약속한 수익을 준다'는 식으로 설계되는 상품으로, 증권사가 파생상품으로 헤지하며 운용한다. 조건이 깨지면 원금 손실이 커질 수 있어 불완전판매 논란이 반복돼 왔다.", "example": "홍콩 H지수 ELS 사태는 지수 급락으로 대규모 원금 손실이 발생해, 고위험 상품의 일반 투자자 판매 규제를 강화하는 계기가 됐다."}, {"id": "price-discovery", "term": "가격발견 기능", "category": "시장/지수", "keywords": ["가격발견", "프라이스디스커버리", "시장기능", "적정가격"], "short": "수많은 매수·매도가 부딪히며 자산의 적정 가격이 시장에서 찾아지는 과정.", "detail": "공매도와 파생상품이 순기능으로 인정받는 핵심 근거다. 고평가됐다고 보는 투자자의 매도(공매도)와 미래 전망을 반영한 선물 가격이 시장에 정보를 더해, 거품을 빼고 가격이 실제 가치에 다가가도록 돕는다.", "example": "공매도 토론에서 '별점 1개를 줄 권리'라는 핀로그의 비유가 바로 이 기능 — 나쁜 평가도 가격에 반영될 통로가 있어야 시장이 건강해진다는 뜻이다."}, {"id": "psr-evebitda", "term": "PSR·EV/EBITDA", "category": "재무/회계", "keywords": ["psr", "ev/ebitda", "에비타", "밸류에이션보완"], "short": "이익이 없는 적자기업의 가치를 매길 때 쓰는 보완 밸류에이션 지표.", "detail": "PER은 이익 기준이라 적자기업에는 쓸 수 없다. PSR은 매출 대비 시가총액으로, EV/EBITDA는 영업 현금창출력 대비 기업가치로 평가해 성장 초기 기업이나 설비 투자가 큰 기업을 비교할 때 쓴다. 어떤 지표든 업종·시점 맥락과 함께 읽어야 한다.", "example": "기술특례상장 기업처럼 당장 이익이 없는 회사의 공모가 산정에 PSR 같은 보완 지표가 동원되며, 파두 사태 이후 그 타당성 검증이 더 중요해졌다."}, {"id": "xbrl-dart", "term": "XBRL·DART 전자공시", "category": "재무/회계", "keywords": ["xbrl", "dart", "전자공시", "공시데이터"], "short": "기업 공시를 컴퓨터가 읽을 수 있는 표준 데이터로 만들어(XBRL) 공개하는 시스템(DART).", "detail": "DART는 금융감독원의 전자공시시스템이고, XBRL은 재무제표의 각 항목에 표준 태그를 붙인 데이터 형식이다. 사람이 PDF를 읽는 대신 프로그램이 수천 개 기업의 지표를 한 번에 계산·비교할 수 있어, 이상 징후 자동 탐지와 정량 스크리닝의 기반이 된다.", "example": "동종업계 대비 매출 추정이 튀는 기업을 시스템이 이상치로 잡아내는 식의 감시가 가능해져, 과대공시 방지 수단으로 주목받는다."}, {"id": "str", "term": "STR(의심거래보고)", "category": "규제/제도", "keywords": ["str", "의심거래", "자금세탁방지", "aml보고"], "short": "자금세탁이 의심되는 거래를 금융회사가 당국(FIU)에 보고하는 제도.", "detail": "자금세탁방지(AML)의 핵심 실행 장치로, 고액 현금이 쪼개져 움직이거나 거래 패턴이 평소와 크게 다를 때 금융회사는 이를 금융정보분석원에 보고할 의무가 있다. 최근에는 머신러닝이 의심 정황에 점수를 매기고 보고서 초안까지 만들어 주는 레그테크로 자동화되고 있다.", "example": "가상자산 거래소에도 트래블룰과 함께 STR 의무가 적용되면서, 레그테크 솔루션 수요가 빠르게 늘고 있다."}, {"id": "false-positive", "term": "오탐 vs 미탐 트레이드오프", "category": "디지털금융", "keywords": ["오탐", "미탐", "1종오류", "2종오류", "탐지기준"], "short": "탐지 기준을 조이면 정상 거래까지 잡고(오탐), 풀면 범죄를 놓치는(미탐) 딜레마.", "detail": "이상거래 탐지·자금세탁 감시 시스템의 근본 딜레마다. 오탐은 사람이 한 번 더 확인하면 되지만 미탐은 그대로 통과되므로, 자금세탁처럼 사회적 비용이 큰 영역은 오탐을 감수하는 보수적 기준이 일반적이다. 대신 오탐으로 불편을 겪는 정상 고객을 위한 신속 해제 절차가 함께 필요하다.", "example": "핀로그 심화 토론에서도 '보수적으로 잡되 정밀도를 높이고, 탐지 근거를 설명(XAI)할 수 있어야 한다'는 결론이 나왔다."}, {"id": "liquidity-fragmentation", "term": "유동성 파편화·슬리피지", "category": "시장/지수", "keywords": ["유동성파편화", "슬리피지", "시장분할", "호가분산"], "short": "거래가 여러 시장으로 갈리며 각 시장의 주문이 얕아지고, 그만큼 원하는 가격에 못 사게 되는 문제.", "detail": "복수거래소의 대표적 부작용 우려다. 같은 종목의 주문이 두 시장에 나뉘면 한 시장의 호가창이 얇아지고, 큰 주문일수록 체결 가격이 예상보다 밀리는 슬리피지가 커질 수 있다. SOR과 통합 시세가 이를 보완하는 장치다.", "example": "NXT 출범 논의에서 '경쟁 촉진'의 반대편 논거로 항상 등장한 개념이다."}, {"id": "fab-value-chain", "term": "팹리스·파운드리·패키징", "category": "취업/직무", "keywords": ["팹리스", "파운드리", "패키징", "반도체분업", "tsmc"], "short": "설계(팹리스)–위탁생산(파운드리)–후공정(패키징)으로 나뉜 반도체 산업의 분업 구조.", "detail": "엔비디아처럼 설계만 하는 회사가 팹리스, TSMC처럼 남의 설계를 받아 생산만 하는 회사가 파운드리다. HBM 같은 첨단 메모리는 여러 칩을 쌓는 패키징 기술이 경쟁력을 좌우한다. 이 구조를 알아야 반도체 기업들의 실적과 경쟁 구도가 읽힌다.", "example": "금융권 리서치·여신 직무에서도 반도체 밸류체인 이해는 기업 분석의 기본기로 요구된다 — 핀로그 현직자 인터뷰에서도 산업 이해의 중요성이 강조됐다."}];
const FAQS = [{"q": "공매도가 뭔가요?", "a": "주식을 빌려 먼저 팔고 나중에 싸게 되사 갚아 차익을 내는 거래로, ‘먼저 팔고 나중에 산다’는 점만 일반 거래와 반대입니다.", "term": "공매도", "weeks": "2·3차", "cat": "금융·자본시장"}, {"q": "공매도는 왜 논란이 되나요?", "a": "가격발견·유동성 같은 순기능이 있지만, 무차입공매도와 개인·기관 간 정보·차입 격차(기울어진 운동장) 때문에 신뢰 문제가 생깁니다.", "term": "공매도", "weeks": "2·3차", "cat": "금융·자본시장"}, {"q": "무차입공매도를 어떻게 막나요?", "a": "2025년 3월 가동된 한국거래소 공매도 통합점검시스템(NSDS)이 실시간으로 잔고를 대조해 무차입 주문을 사전 차단합니다.", "term": "공매도", "weeks": "2·3차", "cat": "금융·자본시장"}, {"q": "NXT가 뭔가요?", "a": "한국거래소(KRX) 외에 새로 생긴 대체거래소로, 매매체결을 담당해 약 70년 독점을 깬 복수거래소 체제를 만들었습니다.", "term": "복수거래소", "weeks": "6차", "cat": "금융·자본시장"}, {"q": "복수거래소의 문제점은?", "a": "거래가 갈리며 유동성이 파편화돼 체결 품질이 나빠질 수 있고, 시장 간 속도 차이를 이용한 차익거래가 개인에게 불리할 수 있습니다.", "term": "복수거래소", "weeks": "6차", "cat": "금융·자본시장"}, {"q": "최선집행의무와 SOR이 뭔가요?", "a": "증권사가 고객 주문을 가장 유리한 시장에 보내야 할 의무이며, SOR(스마트 주문 라우팅)은 여러 시장 호가를 비교해 자동 분배하는 기술입니다.", "term": "복수거래소", "weeks": "6차", "cat": "금융·자본시장"}, {"q": "KRX와 KSD의 차이는?", "a": "KRX는 매매체결·상장·시장감시 등 ‘앞단’, 한국예탁결제원(KSD)은 예탁·결제·권리관리 등 ‘뒷단’ 인프라를 맡습니다.", "term": "자본시장 인프라", "weeks": "3·5차", "cat": "금융·자본시장"}, {"q": "왜 둘 다 중요한가요?", "a": "거래가 체결돼도 결제·권리관계가 정확히 처리돼야 하므로, 앞단과 뒷단이 맞물려야 시장 신뢰가 완성됩니다.", "term": "자본시장 인프라", "weeks": "3·5차", "cat": "금융·자본시장"}, {"q": "자본시장의 주요 현안은?", "a": "공매도 전산화, MSCI 선진국 편입, T+1 결제 전환, 토큰증권 제도화 등이 모두 인프라 위에서 돌아갑니다.", "term": "자본시장 인프라", "weeks": "3·5차", "cat": "금융·자본시장"}, {"q": "가상자산을 어떻게 봐야 하나요?", "a": "투기 수단이 아니라 ‘기록 기술(블록체인)’과 ‘기록되는 가치’를 분리해 보는 것이 핵심입니다.", "term": "블록체인·가상자산", "weeks": "4차", "cat": "금융·자본시장"}, {"q": "분산원장·블록체인·토큰의 차이는?", "a": "분산원장은 공유 장부, 블록체인은 그 한 방식, 토큰은 그 위에 발행된 권리·가치의 증표입니다.", "term": "블록체인·가상자산", "weeks": "4차", "cat": "금융·자본시장"}, {"q": "가상자산 규제 방향은?", "a": "전면금지보다 가상자산이용자보호법 등 제도권 관리로 가되, 예치금 분리·콜드월렛 등 투자자 보호장치 마련이 전제입니다.", "term": "블록체인·가상자산", "weeks": "4차", "cat": "금융·자본시장"}, {"q": "스테이블코인의 가치는 어디서 오나요?", "a": "블록체인 기술이 아니라 달러·국채 같은 준비자산의 안정성, 발행사 신뢰, 환매 가능성에서 옵니다.", "term": "스테이블코인·CBDC·토큰증권", "weeks": "4·7~8차", "cat": "금융·자본시장"}, {"q": "스테이블코인·CBDC·토큰증권의 차이는?", "a": "가치를 떠받치는 ‘닻’이 각각 민간 준비자산, 국가(중앙은행), 기초증권으로 다릅니다.", "term": "스테이블코인·CBDC·토큰증권", "weeks": "4·7~8차", "cat": "금융·자본시장"}, {"q": "왜 규율이 필요한가요?", "a": "지급결제망에 편입될수록 디페깅(뱅크런)이 금융안정 위험이 되므로 준비자산의 투명한 공시가 우선 과제입니다.", "term": "스테이블코인·CBDC·토큰증권", "weeks": "4·7~8차", "cat": "금융·자본시장"}, {"q": "선물과 옵션의 차이는?", "a": "선물은 정한 가격에 사고팔 ‘의무’, 옵션은 ‘권리’로 매수자는 불리하면 프리미엄만 포기하면 됩니다.", "term": "파생상품", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "파생상품은 왜 위험한가요?", "a": "적은 증거금으로 큰 포지션을 잡는 레버리지 탓에 헤지 수단도, 투기 수단도 되기 때문입니다.", "term": "파생상품", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "거래소는 위험을 어떻게 막나요?", "a": "증거금과 일일정산(매일 손익 현금정산)으로 손실이 쌓이기 전에 끊어 결제불이행을 방지합니다.", "term": "파생상품", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "흑자도산이 뭔가요?", "a": "장부상 이익이 나도 현금이 돌지 않아 망하는 것으로, 현금흐름표가 이를 경고합니다.", "term": "재무제표·펀더멘털 분석", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "재무제표 분석의 핵심은?", "a": "세 표(손익계산서·재무상태표·현금흐름표)의 연결을 보고, 숫자 뒤의 ‘가정’을 의심하는 것입니다.", "term": "재무제표·펀더멘털 분석", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "파두 사태의 교훈은?", "a": "기술특례상장의 추정 매출(예상 1,203억 vs 실제 224억)이 과대평가되면 회계·공시 리스크가 된다는 점입니다.", "term": "재무제표·펀더멘털 분석", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "밸류업이 뭔가요?", "a": "기업이 자본을 규율 있게 써 저평가(코리아 디스카운트)를 해소하도록 유도하는 정책입니다.", "term": "기업 밸류업·주주환원", "weeks": "6·7~8차", "cat": "금융·자본시장"}, {"q": "주주환원은 무조건 좋은가요?", "a": "대리인 비용을 줄이는 규율 효과가 있지만, 과도하면 R&D·CAPEX를 줄여 장기가치를 해칠 수 있습니다.", "term": "기업 밸류업·주주환원", "weeks": "6·7~8차", "cat": "금융·자본시장"}, {"q": "자사주 소각의 효과는?", "a": "사 둔 자사주를 없애 주주 몫을 키우는 것으로, 2026년 3월 자사주 의무소각이 시행됩니다.", "term": "기업 밸류업·주주환원", "weeks": "6·7~8차", "cat": "금융·자본시장"}, {"q": "대리인 문제가 뭔가요?", "a": "소유(주주)와 경영(경영진)이 분리되며 생기는 이해 상충으로, 지배구조로 통제합니다.", "term": "기업 지배구조·책임경영", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "상법 개정의 핵심은?", "a": "2025년 7월 이사 충실의무 대상에 ‘모든 주주’가 추가돼, 일부 대주주가 아닌 전체 주주를 향하게 됐습니다.", "term": "기업 지배구조·책임경영", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "빅테크 금융진출의 위험은?", "a": "알고리즘이 여신을 결정할 때 ‘책임 공백’이 생기므로 동일기능–동일규제와 모델 거버넌스가 필요합니다.", "term": "기업 지배구조·책임경영", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "ESG 공시가 왜 중요한가요?", "a": "재무제표가 못 보는 기후·공급망 등 미래 위험을 드러내 자본비용(WACC)과 기업가치에 반영하기 때문입니다.", "term": "ESG 공시", "weeks": "6·7~8차", "cat": "금융·자본시장"}, {"q": "스코프 3가 뭔가요?", "a": "기업 직접배출(1)·구매전력(2)을 넘어 공급망 전체 배출(3)을 뜻하며, 측정이 가장 어렵습니다.", "term": "ESG 공시", "weeks": "6·7~8차", "cat": "금융·자본시장"}, {"q": "스코프 3 부담을 어떻게 줄이나요?", "a": "산업별 표준 배출계수, 단계적 외부 검증, Safe Harbor로 ‘검증 가능성’을 우선 확보합니다.", "term": "ESG 공시", "weeks": "6·7~8차", "cat": "금융·자본시장"}, {"q": "AI 이상거래탐지가 뭔가요?", "a": "정상 패턴을 학습해 거기서 벗어난 이상(시세조종 등)을 실시간으로 잡아내는 기술입니다.", "term": "AI 이상거래탐지", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "왜 설명가능성(XAI)이 필요한가요?", "a": "‘왜 이상한가’를 설명하지 못하면 제재의 법적 근거가 약해지기 때문입니다.", "term": "AI 이상거래탐지", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "NSDS의 한계는?", "a": "무차입 억제에 진일보했지만 100% 차단은 불가능해, 사람의 최종 판단이 병행돼야 합니다.", "term": "AI 이상거래탐지", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "레그테크가 뭔가요?", "a": "AML·KYC 같은 규제 준수를 데이터·AI로 자동화하는 기술입니다.", "term": "레그테크", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "오탐·미탐 딜레마란?", "a": "경보를 많이 울리면 정상 고객이 막히고(오탐), 적게 울리면 범죄를 놓칩니다(미탐).", "term": "레그테크", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "AI 기본법이 왜 중요한가요?", "a": "신용평가·여신을 ‘고영향 AI’로 지정해 설명가능성·편향검증 의무를 부여하면서 레그테크 수요를 키웁니다.", "term": "레그테크", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "AI 여신의 3대 위험은?", "a": "편향(과거 차별 학습), 설명 불가, 책임 공백입니다.", "term": "알고리즘 의사결정의 공정성·금융윤리", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "‘완벽히 공정한 AI’가 있나요?", "a": "없습니다. 어떤 공정성을 택하고 책임지느냐가 관건입니다.", "term": "알고리즘 의사결정의 공정성·금융윤리", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "공정성 위험의 해법은?", "a": "XAI(SHAP·LIME), 편향 정기검증, 감사 로그·모델 거버넌스로 위험을 방어합니다.", "term": "알고리즘 의사결정의 공정성·금융윤리", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "씬파일러가 뭔가요?", "a": "금융 거래 이력이 얇아 전통 신용평가에서 불리한 사회초년생·자영업자입니다.", "term": "대안데이터·신용평가", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "대안데이터는 무엇인가요?", "a": "통신비·공과금 같은 비금융 데이터로 상환능력을 추정해 금융 포용을 넓힙니다.", "term": "대안데이터·신용평가", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "‘공정성 역설’이란?", "a": "포용을 위한 데이터(거주지·소비)가 오히려 간접차별을 낳을 수 있어 편향검증이 필수라는 점입니다.", "term": "대안데이터·신용평가", "weeks": "7~8차", "cat": "금융·자본시장"}, {"q": "플랫폼 규제의 핵심은?", "a": "규모 자체가 아니라 자기우대·데이터 잠금 같은 ‘행위’를 겨냥해야 한다는 점입니다.", "term": "빅테크 독점과 플랫폼 규제", "weeks": "1차", "cat": "시사"}, {"q": "빅테크 금융진출은 어떻게 규율하나요?", "a": "‘동일기능–동일규제’ 원칙으로 건전성과 책임 소재를 분명히 합니다.", "term": "빅테크 독점과 플랫폼 규제", "weeks": "1차", "cat": "시사"}, {"q": "사전규제와 사후규제의 차이는?", "a": "미리 금지하는 사전규제(EU DMA)와 위반 후 제재하는 사후규제가 있으며, 혁신 위축을 피하는 균형이 쟁점입니다.", "term": "빅테크 독점과 플랫폼 규제", "weeks": "1차", "cat": "시사"}, {"q": "탄소세가 뭔가요?", "a": "탄소 배출의 사회적 비용에 가격을 매겨 ‘오염하면 비싸지게’ 만드는 제도입니다.", "term": "탄소세", "weeks": "1차", "cat": "시사"}, {"q": "탄소세의 정당성은 어디서 오나요?", "a": "세율 인상폭보다, 거둔 세수를 역진성 완화·산업 전환 지원에 환원하는 데서 옵니다.", "term": "탄소세", "weeks": "1차", "cat": "시사"}, {"q": "CBAM이 뭔가요?", "a": "탄소 규제가 약한 나라 제품에 EU가 국경에서 비용을 매기는 탄소국경조정으로, 수출기업에 영향을 줍니다.", "term": "탄소세", "weeks": "1차", "cat": "시사"}, {"q": "세대갈등을 금융 관점에서 보면?", "a": "이념 대립이 아니라 연금·자산 등 자원 배분과 제도 지속가능성의 문제입니다.", "term": "세대갈등", "weeks": "1차", "cat": "시사"}, {"q": "핵심 해법은?", "a": "한 세대에 희생을 전가하는 게 아니라 ‘지속가능성과 세대 간 형평’을 동시에 잡는 균형입니다.", "term": "세대갈등", "weeks": "1차", "cat": "시사"}, {"q": "금융감독의 역할은?", "a": "고령층 금융소외·보이스피싱 보호와 청년 자산형성 지원의 균형입니다.", "term": "세대갈등", "weeks": "1차", "cat": "시사"}, {"q": "학생인권과 교권은 충돌하나요?", "a": "두 권리 자체의 모순이 아니라 ‘생활지도 기준·민원 절차의 공백’에서 갈등이 증폭됩니다.", "term": "학생인권 vs 교권", "weeks": "2차", "cat": "시사"}, {"q": "해법은 무엇인가요?", "a": "기준과 절차를 명확히 하고 학교·교육청·가정이 책임을 분담하면 두 가치는 함께 보호됩니다.", "term": "학생인권 vs 교권", "weeks": "2차", "cat": "시사"}, {"q": "취업·면접과의 연결은?", "a": "‘권리 대 권리가 아니라 규칙의 공백’이라는 프레임은 조직 갈등 해결 논리로 활용됩니다.", "term": "학생인권 vs 교권", "weeks": "2차", "cat": "시사"}, {"q": "HBM이 뭔가요?", "a": "여러 D램을 쌓아 데이터 통로(대역폭)를 넓힌 AI용 고성능 메모리입니다.", "term": "반도체·HBM 경쟁", "weeks": "5차", "cat": "시사"}, {"q": "HBM 경쟁이 왜 중요한가요?", "a": "AI 성능의 병목을 푸는 핵심이자 수출·국가 안보가 걸린 거시경제 최전선이기 때문입니다.", "term": "반도체·HBM 경쟁", "weeks": "5차", "cat": "시사"}, {"q": "정부의 산업 지원은 정당한가요?", "a": "글로벌 보조금 경쟁 속 필수 안보 투자라는 시각과, 시장 왜곡·특혜 우려가 맞섭니다.", "term": "반도체·HBM 경쟁", "weeks": "5차", "cat": "시사"}, {"q": "관세를 어떻게 봐야 하나요?", "a": "선악이 아니라 보호받는 산업과 피해 주체(소비자·수출기업) 간 ‘득실의 분배’ 문제로 봐야 합니다.", "term": "관세·보호무역", "weeks": "2·5차", "cat": "시사"}, {"q": "보호무역의 부작용은?", "a": "글로벌 분업 훼손, 소비자 가격 상승, 보복 관세로 결국 부메랑이 됩니다.", "term": "관세·보호무역", "weeks": "2·5차", "cat": "시사"}, {"q": "무역금융의 역할은?", "a": "원산지 관리·공급망 다변화·외환 변동성 방어를 돕는 맞춤형 무역금융이 중요해집니다.", "term": "관세·보호무역", "weeks": "2·5차", "cat": "시사"}, {"q": "노란봉투법이 뭔가요?", "a": "하청 노동자 교섭권 확대·손배 책임 제한 등 노동권을 강화하는 입법입니다.", "term": "노란봉투법·긴급조정권", "weeks": "6차", "cat": "시사"}, {"q": "자본시장과 무슨 관련이 있나요?", "a": "노사 불안정은 국가 리스크 프리미엄을 높여 외국인 투자를 좌우하는 거시 변수입니다.", "term": "노란봉투법·긴급조정권", "weeks": "6차", "cat": "시사"}, {"q": "순효과를 좌우하는 것은?", "a": "입법 취지가 아니라 ‘적용 범위·기준의 정교함’이며, 긴급조정권은 최후 수단일 때만 정당합니다.", "term": "노란봉투법·긴급조정권", "weeks": "6차", "cat": "시사"}];

function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function el(tag,cls,html){const d=document.createElement(tag);if(cls)d.className=cls;if(html!=null)d.innerHTML=html;return d;}
function scroll(){chat.scrollTop=chat.scrollHeight;}
function addUser(t){const m=el('div','msg user');m.appendChild(el('div','b',escapeHtml(t)));chat.appendChild(m);scroll();}
function botWrap(){const m=el('div','msg bot');m.appendChild(el('div','ic','<img src="'+IMG.goma+'" alt="고마">'));const b=el('div','b');m.appendChild(b);chat.appendChild(m);scroll();return b;}
function typingOn(){const m=el('div','msg bot');m.id='typing';m.appendChild(el('div','ic','<img src="'+IMG.goma+'" alt="고마">'));const b=el('div','b');b.appendChild(el('div','typing','<span></span><span></span><span></span>'));m.appendChild(b);chat.appendChild(m);scroll();}
function typingOff(){const t=document.getElementById('typing');if(t)t.remove();}

// ---- search ----
function scoreEntry(e,nq,tk){
  let s=0; const nt=norm(e.term);
  if(nt===nq) s+=120; else if(nt.includes(nq)||nq.includes(nt)) s+=48;
  for(const k of (e.keywords||[])){const nk=norm(k);
    if(nk===nq) s+=90; else if(nq.includes(nk)&&nk.length>=2) s+=34; else if(nk.includes(nq)&&nq.length>=2) s+=16;}
  for(const w of tk){const nw=norm(w);
    if(nt&&(nt.includes(nw)||(nt.length>=2&&nw.includes(nt)))) s+=22;
    if((e.keywords||[]).some(k=>{const nk=norm(k);return nk.includes(nw)||(nk.length>=2&&nw.includes(nk));})) s+=18;
    if(norm(e.short).includes(nw)) s+=6;
    if(e.detail&&norm(e.detail).includes(nw)) s+=3;}
  return s;
}
function search(q){
  const nq=norm(q), tk=toks(q); if(!nq) return [];
  const out=[];
  for(const e of KB){const s=scoreEntry(e,nq,tk); if(s>0) out.push({e,s});}
  out.sort((a,b)=>b.s-a.s); return out;
}
function searchFAQ(q){
  const nq=norm(q), tk=toks(q); if(tk.length===0 && nq.length<2) return null;
  let best=null,bs=0;
  for(const f of FAQS){const nq2=norm(f.q), ftk=toks(f.q); let s=0;
    if(nq2===nq) s+=100; else if(nq2.includes(nq)&&nq.length>=4) s+=40;
    for(const w of tk){const nw=norm(w);
      if(nq2.includes(nw)) s+=16;
      else if(nw.length>=2 && ftk.some(fw=>{const nf=norm(fw);return nf.includes(nw)||nw.includes(nf);})) s+=12;
      if(norm(f.a).includes(nw)) s+=4;}
    if(s>bs){bs=s;best=f;}}
  return bs>=40?{f:best,s:bs}:null;
}
function highlight(text,tk){let h=escapeHtml(text);
  tk.forEach(w=>{if(w.length<2)return;const re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');h=h.replace(re,'<span class="hl">$1</span>');});
  return h;}

// ---- render ----
function renderEntry(e,tk){
  tk=tk||[];
  let h='<div class="ans"><span class="term">'+escapeHtml(e.term)+'</span><span class="cat">'+escapeHtml(e.category)+'</span>';
  if(e.weeks) h+='<span class="wk">학습 '+escapeHtml(e.weeks)+'</span>';
  if(e.short) h+='<div class="short">'+highlight(e.short,tk)+'</div>';
  if(e.detail) h+='<div class="detail">'+highlight(e.detail,tk)+'</div>';
  if(e.issues&&e.issues.length){h+='<ul class="iss">';e.issues.forEach(x=>{
    let mi=''; if(x.indexOf('순기능')===0) mi='<img class="mi" src="'+IMG.oreuso+'">'; else if(x.indexOf('역기능')===0) mi='<img class="mi" src="'+IMG.goma+'">';
    h+='<li>'+mi+highlight(x,tk)+'</li>';});h+='</ul>';}
  if(e.example) h+='<div class="ex"><b>사례</b> '+highlight(e.example,tk)+'</div>';
  if(e.conclusion) h+='<div class="box concl"><span class="h">💡 핀로그의 결론</span>'+escapeHtml(e.conclusion)+'</div>';
  if(e.interview_tip) h+='<div class="box tip"><span class="h">🎯 면접·자소서 활용</span>'+escapeHtml(e.interview_tip)+'</div>';
  h+='</div>';
  return h;
}
function faqChips(b,e){
  if(!e.faqs||!e.faqs.length) return;
  b.appendChild(el('div','hint','이 주제 자주 묻는 질문:'));
  const c=el('div','chips');
  e.faqs.forEach(f=>{const ch=el('div','chip faq','Q. '+escapeHtml(f.question));ch.onclick=()=>ask(f.question);c.appendChild(ch);});
  b.appendChild(c);
}
function relatedChips(b,arr,excludeId){
  const rel=arr.filter(x=>x.e.id!==excludeId).slice(0,3); if(!rel.length) return;
  b.appendChild(el('div','hint','관련 용어:'));
  const c=el('div','chips');
  rel.forEach(x=>{const ch=el('div','chip',escapeHtml(x.e.term));ch.onclick=()=>ask(x.e.term);c.appendChild(ch);});
  b.appendChild(c);
}
function catChips(b,label){
  b.appendChild(el('div','hint',label||'카테고리로 찾아보기:'));
  const c=el('div','chips');
  CATS.forEach(cat=>{if(cat.includes('학습주제'))return;const ch=el('div','chip cat',escapeHtml(cat));ch.onclick=()=>ask(cat);c.appendChild(ch);});
  b.appendChild(c);
}

function answer(q){
  typingOff();
  const tk=toks(q);
  const FOREIGN=['미국','해외','글로벌','일본','중국','유럽','영국','인도','대만','실리콘밸리','월가'];
  const hasForeign=FOREIGN.some(w=>norm(q).includes(norm(w)));
  // category browse
  const ncat=norm(q);
  const catHit=CATS.find(c=>norm(c)===ncat);
  const res=search(q);
  if(catHit && (!res.length||res[0].s<48)){
    const b=botWrap(); b.innerHTML='<b>'+escapeHtml(catHit)+'</b> 카테고리예요. 눌러서 확인해 보세요.';
    const list=KB.filter(e=>e.category===catHit);
    const c=el('div','chips'); list.forEach(e=>{const ch=el('div','chip',escapeHtml(e.term));ch.onclick=()=>ask(e.term);c.appendChild(ch);});
    b.appendChild(c); scroll(); return;
  }
  const faq=searchFAQ(q);
  const kbBest=res.length?res[0].s:0;
  // FAQ가 충분히 강하고, 키워드 직접매칭(>=85)이 아니면 FAQ 우선
  if(faq && faq.s>=kbBest*0.8 && kbBest<90){
    const ent=KB.find(e=>e.term===faq.f.term);
    const b=botWrap();
    let h='<div class="ans">';
    h+='<div class="short">'+highlight(faq.f.q,tk)+'</div>';
    h+='<div class="detail">'+highlight(faq.f.a,tk)+'</div>';
    if(ent) h+='<div class="box tip"><span class="h">🔗 관련 주제</span>'+escapeHtml(ent.term)+(ent.weeks?' · 학습 '+escapeHtml(ent.weeks):'')+'</div>';
    h+='</div>'; b.innerHTML=h;
    if(ent){const c=el('div','chips');const ch=el('div','chip','▶ '+escapeHtml(ent.term)+' 더 알아보기');ch.onclick=()=>ask(ent.term);c.appendChild(ch);b.appendChild(c);}
    scroll(); return;
  }
  if(res.length && res[0].s>=50){
    const e=res[0].e; const b=botWrap();
    const pre=hasForeign?'<div class="short">핀로그 챗봇은 <b>국내 금융 이슈</b> 위주라, 해외 사례는 아직 준비돼 있지 않아요. 가장 가까운 국내 내용을 알려드릴게요 👇</div>':'';
    b.innerHTML=pre+renderEntry(e,tk);
    faqChips(b,e); relatedChips(b,res,e.id); scroll(); return;
  }
  // no match
  const b=botWrap();
  b.innerHTML='음… <b>"'+escapeHtml(q)+'"</b>는 제가 아직 학습하지 않은 내용이에요. 저는 <b>국내 자본시장·디지털금융</b> 이슈 위주로 알고 있어요! 아래 카테고리에서 찾아볼까요?';
  catChips(b);
  scroll();
}
function ask(q){ addUser(q); typingOn(); setTimeout(()=>answer(q),420); }

document.getElementById('send').onclick=()=>{const v=inp.value.trim();if(v){ask(v);inp.value='';}};
inp.addEventListener('keydown',e=>{if(e.key==='Enter' && !e.isComposing){const v=inp.value.trim();if(v){ask(v);inp.value='';}}});
