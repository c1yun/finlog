<style>

    --bg:#eef1f8;--card:#fff;--ink:#16233a;--mut:#5b6b85;--line:#e3e8f2;--bot:#f3f6fc;--user:#1f4e9b;}

  header{background:linear-gradient(135deg,var(--navy2),var(--navy));color:#fff;padding:54px 20px 16px;display:flex;align-items:center;gap:13px;flex-shrink:0}

  @media(max-width:480px){.msg{max-width:97%}}
  .today{margin-top:9px;padding:11px 13px;border-radius:12px;background:#fbf6ea;border:1px solid #ecdcb0;color:#5a4516}
  .today .h{font-weight:800;display:block;margin-bottom:4px;color:#9a7b22;font-size:.82rem}

  .today .tc{display:inline-block;font-size:.72rem;font-weight:800;color:var(--gold);background:#fff;border:1px solid #ecdcb0;padding:1px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}

  .allterms summary::-webkit-details-marker{display:none}
  .allterms summary .cn{flex:1 1 auto;min-width:0}
  .allterms summary .cnt{flex:0 0 auto;font-size:.72rem;font-weight:700;color:var(--mut);background:#eaf0fb;border:1px solid #d6e1f5;padding:1px 0;border-radius:20px;min-width:34px;text-align:center;margin-left:auto}
  .allterms summary::after{content:"▸";color:var(--mut);font-weight:700;margin-left:8px;flex:0 0 auto}

  .allterms details[open] summary{background:#eef4fc;color:var(--blue)}
  .termlist{display:flex;flex-wrap:wrap;gap:6px;padding:4px 12px 12px}

<script>
const IMG = {"goma": "assets/images/chatbot/goma-avatar.png", "oreuso": "assets/images/chatbot/orso-avatar.png", "gomaFull": "assets/images/chatbot/goma-full.png", "oreusoFull": "assets/images/chatbot/orso-full.png"};
const chat=document.getElementById('chat'), inp=document.getElementById('inp'), quick=document.getElementById('quick');
const CATS=[...new Set(KB.map(e=>e.category))];
const TOPICS=KB.filter(e=>e.topic);
document.getElementById('kbn').innerHTML='용어 '+KB.length+'개<br>FAQ '+FAQS.length+'개';

const STOP=['뭐','뭐야','뭔가요','무엇','무엇인가요','뜻','의미','정의','차이','차이점','설명','알려줘','알려줘요','해줘','이란','란','은','는','이','가','을','를','대해','대해서','관해','관련','좀','그','이게','이건','어떻게','어떤','왜','이야','인가요','인가','한가요','해','하는','하나요','요','에','의','과','와','어때','대하여'];
function norm(s){return (s||'').toLowerCase().replace(/[\s()\[\]·,.\-_/?!~'"]/g,'');}
function toks(s){return (s||'').toLowerCase().split(/[\s()\[\]·,.\-_/?!~'"]+/).map(w=>w.replace(/(이란|이라는|라는|에대해|에대한|에관해)$/,'')).filter(w=>w.length>=2&&!STOP.includes(w));}
function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function el(tag,cls,html){const d=document.createElement(tag);if(cls)d.className=cls;if(html!=null)d.innerHTML=html;return d;}
function scroll(){chat.scrollTop=chat.scrollHeight;}
function addUser(t){const m=el('div','msg user');m.appendChild(el('div','b',escapeHtml(t)));chat.appendChild(m);scroll();}
function botWrap(){const m=el('div','msg bot');m.appendChild(el('div','ic','<img src="'+IMG.goma+'" alt="고마 캐릭터" width="300" height="300" decoding="async">'));const b=el('div','b');m.appendChild(b);chat.appendChild(m);scroll();return b;}
function typingOn(){const m=el('div','msg bot');m.id='typing';m.appendChild(el('div','ic','<img src="'+IMG.goma+'" alt="고마 캐릭터" width="300" height="300" decoding="async">'));const b=el('div','b');b.appendChild(el('div','typing','<span></span><span></span><span></span>'));m.appendChild(b);chat.appendChild(m);scroll();}
function typingOff(){const t=document.getElementById('typing');if(t)t.remove();}

// ---- search ----
function scoreEntry(e,nq,tk){
  let s=0; const nt=norm(e.term);
  if(nt===nq) s+=120; else if(nt.includes(nq)||nq.includes(nt)) s+=48;
  for(const k of (e.keywords||[])){const nk=norm(k);
    if(nk===nq) s+=90; else if(nq.includes(nk)&&nk.length>=2) s+=34; else if(nk.includes(nq)&&nq.length>=2) s+=16;}
  for(const w of tk){const nw=norm(w);
    if(nt&&(nt.includes(nw)||(nt.length>=2&&nw.includes(nt)))) s+=22;
    if((e.keywords||[]).some(k=>{const nk=norm(k);return nk.includes(nw)||(nk.length>=2&&nw.includes(nk));})) s+=18;
    if(norm(e.short).includes(nw)) s+=6;
    if(e.detail&&norm(e.detail).includes(nw)) s+=3;}
  return s;
}
function search(q){
  const nq=norm(q), tk=toks(q); if(!nq) return [];
  const out=[];
  for(const e of KB){const s=scoreEntry(e,nq,tk); if(s>0) out.push({e,s});}
  out.sort((a,b)=>b.s-a.s); return out;
}
// ---- 오타 제안(레벤슈타인 편집거리) ----
function lev(a,b){
  a=a||''; b=b||''; if(a===b) return 0;
  const m=a.length, n=b.length; if(!m) return n; if(!n) return m;
  let prev=Array.from({length:n+1},(_,i)=>i);
  for(let i=1;i<=m;i++){
    let cur=[i];
    for(let j=1;j<=n;j++){
      const cost=a[i-1]===b[j-1]?0:1;
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);
    }
    prev=cur;
  }
  return prev[n];
}
function suggest(q){
  const nq=norm(q); if(nq.length<3) return null;
  let best=null, bd=2; // 편집거리 1 이하만 채택
  for(const e of KB){
    const cand=[e.term, ...(e.keywords||[])];
    for(const c of cand){
      const nc=norm(c); if(nc.length<3) continue;
      const d=lev(nq,nc);
      if(d>0 && d<=1 && d<bd){ bd=d; best=e; }
    }
  }
  return best;
}
// ---- 함께 보면 좋은 용어(같은 카테고리·키워드 겹침) ----
function relatedByCat(e){
  const kws=new Set((e.keywords||[]).map(norm));
  const scored=[];
  for(const o of KB){
    if(o.id===e.id) continue;
    let s=0;
    if(o.category===e.category) s+=2;
    for(const k of (o.keywords||[])){ if(kws.has(norm(k))){ s+=3; break; } }
    if(s>0) scored.push({o,s});
  }
  scored.sort((a,b)=>b.s-a.s);
  return scored.slice(0,3).map(x=>x.o);
}
function searchFAQ(q){
  const nq=norm(q), tk=toks(q); if(tk.length===0 && nq.length<2) return null;
  let best=null,bs=0;
  for(const f of FAQS){const nq2=norm(f.q), ftk=toks(f.q); let s=0;
    if(nq2===nq) s+=100; else if(nq2.includes(nq)&&nq.length>=4) s+=40;
    for(const w of tk){const nw=norm(w);
      if(nq2.includes(nw)) s+=16;
      else if(nw.length>=2 && ftk.some(fw=>{const nf=norm(fw);return nf.includes(nw)||nw.includes(nf);})) s+=12;
      if(norm(f.a).includes(nw)) s+=4;}
    if(s>bs){bs=s;best=f;}}
  return bs>=40?{f:best,s:bs}:null;
}
function highlight(text,tk){let h=escapeHtml(text);
  tk.forEach(w=>{if(w.length<2)return;const re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');h=h.replace(re,'<span class="hl">$1</span>');});
  return h;}

// ---- render ----
function renderEntry(e,tk){
  tk=tk||[];
  let h='<div class="ans"><span class="term">'+escapeHtml(e.term)+'</span><span class="cat">'+escapeHtml(e.category)+'</span>';
  if(e.weeks) h+='<span class="wk">학습 '+escapeHtml(e.weeks)+'</span>';
  if(e.short) h+='<div class="short">'+highlight(e.short,tk)+'</div>';
  if(e.detail) h+='<div class="detail">'+highlight(e.detail,tk)+'</div>';
  if(e.issues&&e.issues.length){h+='<ul class="iss">';e.issues.forEach(x=>{
    let mi=''; if(x.indexOf('순기능')===0) mi='<img class="mi" src="'+IMG.oreuso+'" alt="오르소 캐릭터">'; else if(x.indexOf('역기능')===0) mi='<img class="mi" src="'+IMG.goma+'" alt="고마 캐릭터">';
    h+='<li>'+mi+highlight(x,tk)+'</li>';});h+='</ul>';}
  if(e.example) h+='<div class="ex"><b>사례</b> '+highlight(e.example,tk)+'</div>';
  if(e.conclusion) h+='<div class="box concl"><span class="h">💡 핀로그의 결론</span>'+escapeHtml(e.conclusion)+'</div>';
  if(e.interview_tip) h+='<div class="box tip"><span class="h">🎯 면접·자소서 활용</span>'+escapeHtml(e.interview_tip)+'</div>';
  h+='</div>';
  return h;
}
function faqChips(b,e){
  if(!e.faqs||!e.faqs.length) return;
  b.appendChild(el('div','hint','이 주제 자주 묻는 질문:'));
  const c=el('div','chips');
  e.faqs.forEach(f=>{const ch=el('div','chip faq','Q. '+escapeHtml(f.question));ch.onclick=()=>{FORCE_FAQ=f;ask('Q. '+f.question);};c.appendChild(ch);});
  b.appendChild(c);
}
function relatedChips(b,arr,excludeId){
  const rel=arr.filter(x=>x.e.id!==excludeId).slice(0,3); if(!rel.length) return;
  b.appendChild(el('div','hint','관련 용어:'));
  const c=el('div','chips');
  rel.forEach(x=>{const ch=el('div','chip',escapeHtml(x.e.term));ch.onclick=()=>ask(x.e.term);c.appendChild(ch);});
  b.appendChild(c);
}
function sameTopicChips(b,e){
  const rel=relatedByCat(e); if(!rel.length) return;
  b.appendChild(el('div','hint','함께 보면 좋은 용어:'));
  const c=el('div','chips');
  rel.forEach(o=>{const ch=el('div','chip',escapeHtml(o.term));ch.onclick=()=>ask(o.term);c.appendChild(ch);});
  b.appendChild(c);
}
function catChips(b,label){
  b.appendChild(el('div','hint',label||'카테고리로 찾아보기:'));
  const c=el('div','chips');
  CATS.forEach(cat=>{if(cat.includes('학습주제'))return;const ch=el('div','chip cat',escapeHtml(cat));ch.onclick=()=>ask(cat);c.appendChild(ch);});
  b.appendChild(c);
}

let FORCE_FAQ=null;
function answer(q){
  if(FORCE_FAQ){const f=FORCE_FAQ;FORCE_FAQ=null;const b=botWrap();b.innerHTML='<div class="ans"><div class="short">'+escapeHtml(f.question)+'</div><div class="detail">'+escapeHtml(f.answer)+'</div></div>';scroll();return;}
  typingOff();
  const tk=toks(q);
  const FOREIGN=['미국','해외','글로벌','일본','중국','유럽','영국','인도','대만','실리콘밸리','월가'];
  const hasForeign=FOREIGN.some(w=>norm(q).includes(norm(w)));
  // category browse
  const ncat=norm(q);
  const catHit=CATS.find(c=>norm(c)===ncat);
  const res=search(q);
  if(catHit && !(res.length && norm(res[0].e.term)===norm(q))){
    const b=botWrap(); b.innerHTML='<b>'+escapeHtml(catHit)+'</b> 분류에 해당합니다. 아래 항목에서 확인할 수 있습니다.';
    const list=KB.filter(e=>e.category===catHit);
    const c=el('div','chips'); list.forEach(e=>{const ch=el('div','chip',escapeHtml(e.term));ch.onclick=()=>ask(e.term);c.appendChild(ch);});
    b.appendChild(c); scroll(); return;
  }
  const faq=searchFAQ(q);
  const kbBest=res.length?res[0].s:0;
  // FAQ가 충분히 강하고, 키워드 직접매칭(>=85)이 아니면 FAQ 우선
  if(faq && faq.s>=kbBest*0.8 && kbBest<90){
    const ent=KB.find(e=>e.term===faq.f.term)||KB.find(e=>e.term.includes(faq.f.term))||KB.find(e=>faq.f.term.includes(e.term));
    const b=botWrap();
    let h='<div class="ans">';
    h+='<div class="short">'+highlight(faq.f.q,tk)+'</div>';
    h+='<div class="detail">'+highlight(faq.f.a,tk)+'</div>';
    if(ent) h+='<div class="box tip"><span class="h">🔗 관련 주제</span>'+escapeHtml(ent.term)+(ent.weeks?' · 학습 '+escapeHtml(ent.weeks):'')+'</div>';
    h+='</div>'; b.innerHTML=h;
    if(ent){const c=el('div','chips');const ch=el('div','chip','▶ '+escapeHtml(ent.term)+' 관련 항목');ch.onclick=()=>ask(ent.term);c.appendChild(ch);b.appendChild(c);}
    scroll(); return;
  }
  if(res.length && res[0].s>=50){
    const e=res[0].e; const b=botWrap();
    const pre=hasForeign?'<div class="short">핀로그 지식베이스는 <b>국내 금융 이슈</b>를 중심으로 구성되어 있습니다. 관련성이 높은 국내 항목을 제시합니다.</div>':'';
    b.innerHTML=pre+renderEntry(e,tk);
    faqChips(b,e); sameTopicChips(b,e); scroll(); return;
  }
  // no match — 오타 제안 먼저 시도
  const sg=suggest(q);
  if(sg){
    const b=botWrap();
    const ch1=sg.term.charAt(sg.term.length-1).charCodeAt(0);
    const josa=(ch1>=0xac00&&ch1<=0xd7a3&&(ch1-0xac00)%28!==0)?'을':'를';
    b.innerHTML='음… <b>"'+escapeHtml(q)+'"</b>는 잘 못 찾았어요. 혹시 <b>\''+escapeHtml(sg.term)+'\'</b>'+josa+' 찾으셨나요?';
    const c=el('div','chips');
    const ch=el('div','chip','▶ \''+escapeHtml(sg.term)+'\' 보기');ch.onclick=()=>ask(sg.term);c.appendChild(ch);
    b.appendChild(c); scroll(); return;
  }
  // no match
  const b=botWrap();
  b.innerHTML='<b>"'+escapeHtml(q)+'"</b>는 현재 지식베이스의 범위를 벗어납니다. 아래 분류에서 <b>국내 자본시장·디지털금융</b> 관련 항목을 확인할 수 있습니다.';
  catChips(b);
  scroll();
}
function ask(q){ addUser(q); typingOn(); setTimeout(()=>answer(q),420); }

  });

}
