  --cy:#5bb0e8;--cy2:#86c8f5;--go:#e2b04a;--go2:#f0cd7a;--te:#3dbe9a;--gr:#a6b6d4;--grd:#6c7fa2;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard','Apple SD Gothic Neo','Segoe UI',system-ui,sans-serif;background:
  radial-gradient(1100px 520px at 80% -8%,rgba(91,176,232,.16),transparent 60%),
  radial-gradient(800px 460px at 0% 108%,rgba(226,176,74,.12),transparent 55%),var(--bg);
  color:#e8eefc;line-height:1.65;min-height:100vh;-webkit-font-smoothing:antialiased;word-break:keep-all;overflow-wrap:break-word}
.wrap{max-width:900px;margin:0 auto;padding:0 22px}
header{text-align:center;padding:64px 0 6px}
h1{font-size:clamp(2rem,5vw,3rem);font-weight:900;letter-spacing:-.03em;margin:0 0 10px;color:#fff}
h1 .a{background:linear-gradient(100deg,var(--go2),var(--cy2));-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--gr);font-size:1.05rem;max-width:640px;margin:0 auto}
.tagline{color:var(--grd);font-size:.85rem;font-weight:700;margin-top:12px}
.cats{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:26px 0 4px}
.cat{background:transparent;border:1px solid var(--bd);border-radius:24px;padding:7px 16px;font-size:.83rem;font-weight:700;color:var(--gr);cursor:pointer;transition:.16s;white-space:nowrap}
.cat:hover{border-color:var(--cy);color:#fff}
.cat.on{background:var(--go);border-color:var(--go);color:#241a04}
.picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:8px;margin:14px 0 8px}
.tch{background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:9px 8px;font-size:.82rem;font-weight:600;color:#cfdcf3;cursor:pointer;transition:.16s;text-align:center;white-space:nowrap}
.tch:hover{border-color:var(--cy);color:#fff;transform:translateY(-2px)}
.tch.on{background:var(--cy);color:#06203c;border-color:var(--cy)}
.tch.hide{display:none}
.tch b{color:var(--go2);margin-right:6px;font-weight:800}.tch.on b{color:#06203c}
.stage{margin:24px 0 60px}
.ttl{text-align:center;font-size:1.5rem;font-weight:800;color:#fff;margin:0 0 20px}
.panel{border-radius:18px;padding:22px 24px;border:1px solid var(--bd)}
.panel.eng{background:linear-gradient(160deg,#12315f,#0b1f43)}
.panel.fil{background:linear-gradient(160deg,#3a2f17,#241a08);border-color:#6a5320}
.lab{font-size:.82rem;font-weight:800;margin-bottom:14px}
.eng .lab{color:var(--cy2)}.fil .lab{color:var(--go2)}
.term{margin-bottom:12px}.term:last-child{margin-bottom:0}
.tk{display:block;font-weight:800;color:#fff;font-size:1.02rem;margin-bottom:3px}
.tv{color:#c3d3ee;font-size:.95rem}
.tr{text-align:center;color:var(--grd);font-size:.92rem;font-weight:700;padding:14px 0}
.easy{color:#f3ead6;font-size:1.05rem;line-height:1.8}
.tmap{margin-top:14px;background:rgba(0,0,0,.18);border:1px dashed #6a5320;border-radius:12px;padding:12px 14px}
.tmt{font-size:.8rem;font-weight:800;color:var(--go2);margin-bottom:9px}
.tmr{display:flex;gap:10px;align-items:baseline;margin-bottom:7px}.tmr:last-child{margin-bottom:0}
.tmr b{flex:0 0 auto;color:#fff;font-weight:800;min-width:104px;font-size:.95rem}
.tmr b::after{content:' →';color:var(--go2);font-weight:900}
.tmr span{color:#f0e6cf;font-size:.93rem}
@media(max-width:560px){.tmr{flex-direction:column;gap:1px}.tmr b{min-width:0}}
details.bg{margin-top:14px;background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
details.bg summary{cursor:pointer;padding:12px 16px;font-size:.86rem;font-weight:700;color:var(--gr);list-style:none}
details.bg summary::-webkit-details-marker{display:none}
details.bg summary::after{content:' \25be';color:var(--grd)}
details.bg[open] summary::after{content:' \25b4'}
.flow{padding:0 16px 14px;color:#c9d6ee;font-size:.92rem;line-height:1.7}
.nav{display:flex;justify-content:center;gap:10px;margin-top:22px}
.nbtn{background:var(--card);border:1px solid var(--bd);color:#cfdcf3;border-radius:24px;padding:10px 18px;font-weight:600;cursor:pointer;font-size:.9rem;transition:.16s}
.nbtn:hover{border-color:var(--cy);color:#fff}
.count{color:var(--grd);font-size:.85rem;align-self:center;font-weight:700}
footer{text-align:center;color:var(--grd);font-size:.84rem;padding:30px 0 50px;border-top:1px solid var(--bd)}
footer b{color:var(--go2)}
</style>

const D = [{"n": 1, "label": "빅테크 규제", "title": "빅테크 독점과 플랫폼 규제", "cat": "soc", "eco": "양면시장(Two-sided Market) — 판매자와 소비자처럼 성격이 다른 두 집단을 한 플랫폼이 동시에 연결해 가치를 만드는 시장 구조.", "dig": "자사우대(Self-preferencing) — 플랫폼이 검색·노출 순위에서 자기 서비스나 계열사 상품을 경쟁사보다 위에 올려 유리하게 대우하는 행위.", "bi": "거대한 시장 입구를 지키는 '문지기'를 떠올려 보자. 처음엔 무료로 손님을 모아 가게(입점업체)와 손님(소비자)을 잔뜩 끌어들이지만, 사람이 충분히 몰리고 나면 입장료(수수료)를 슬쩍 올리고, 자기 친척 가게를 시장 한복판 명당에 앉힌다. 손님은 이미 다른 시장으로 옮기기 귀찮아서(잠금효과) 그냥 머무른다.", "flow": "공정거래위원회는 거대 플랫폼의 자사우대·끼워팔기·최혜대우 강요 등을 사전에 막는 '플랫폼 규제' 입법을 추진해 왔고, EU의 디지털시장법(DMA)을 한국형으로 다듬는 논의가 이어지고 있다. 구글·애플의 인앱결제 강제와 카카오·네이버 등 국내 플랫폼의 시장지배력이 반복적으로 도마에 올랐다.", "em": "가게와 손님을 한자리에 모으는 시장", "dm": "친척 가게를 명당에 앉히기"}, {"n": 2, "label": "탄소세", "title": "탄소세 도입 논쟁", "cat": "soc", "eco": "외부효과(Externality) — 한 경제주체의 활동이 시장 가격에 반영되지 않은 채 제3자에게 끼치는 영향. 공장 매연처럼 사회가 대신 부담하는 비용이 대표적.", "dig": "탄소국경조정제도(CBAM) — EU가 철강·시멘트 등 수입품의 탄소 배출량에 사실상 관세를 매겨, 탄소 규제가 느슨한 나라 제품에 추가 비용을 물리는 제도.", "bi": "공장이 매연을 뿜으면 그 피해(맑은 공기 손실)는 동네 주민이 떠안는다. 탄소세는 \"쓰레기 무단 투기 벌금\"과 같다. 공짜로 버리던 매연에 가격표를 붙여, \"버릴 거면 돈을 내라\"고 함으로써 덜 버리게 유도하는 장치다.", "flow": "EU의 CBAM이 본격 시행 단계로 들어서면서, 철강·알루미늄 등 한국 수출기업의 '탄소 비용' 부담이 현실화되고 있다. 국내에서도 탄소세 도입과 배출권거래제(ETS) 강화를 둘러싼 논쟁이 이어지고, 탄소중립 목표와 산업 경쟁력 사이의 균형이 핵심 화두로 떠올랐다.", "em": "매연 피해를 동네 주민이 떠안는 것", "dm": "다른 나라 제품에 매기는 탄소 관세"}, {"n": 3, "label": "기준금리", "title": "기준금리 인상의 파급효과", "cat": "fin", "eco": "기준금리(Base Rate) — 한국은행이 정하는, 나라 안 모든 금리의 출발점이 되는 이자율. 이 숫자가 오르내리면 예금·대출 금리가 줄줄이 따라 움직인다.", "dig": "통화정책 파급경로(Transmission Mechanism) — 기준금리 변화가 대출·환율·자산가격을 거쳐 소비·투자·물가에까지 전달되는 연쇄 통로.", "bi": "기준금리는 집 전체에 물을 보내는 '메인 수도꼭지'다. 한국은행이 꼭지를 잠그면(인상) 집안 곳곳 수도(예금·대출·주택담보대출)에서 물이 가늘게 나오고, 틀면(인하) 콸콸 나온다. 돈이라는 물의 세기를 조절하는 손잡이를 한국은행이 쥐고 있는 셈이다.", "flow": "한국은행 기준금리는 연 2.50%로 동결 기조가 이어지고 있다(8회 연속 동결, 다음 금융통화위원회 7월 16일). 5월 소비자물가 상승률 3.1%, 원/달러 1,530원대 약세, 가계부채 부담이 겹쳐 \"더 내리고 싶어도 못 내리는\" 상황이다. 동시에 코스피는 2026년 6월 9,000선을 돌파하며 강세장이 이어졌다.", "em": "집에 물 보내는 메인 수도꼭지", "dm": "꼭지에서 집안 수도로 물이 퍼지는 길"}, {"n": 4, "label": "보호무역", "title": "보호무역 vs 자유무역 — 공급망 3법", "cat": "soc", "eco": "비교우위(Comparative Advantage) — 각 나라가 상대적으로 더 잘 만드는 것에 특화해 교환하면 모두 이득이라는, 자유무역의 이론적 토대.", "dig": "공급망 3법 — 핵심 원자재·소부장(소재·부품·장비) 등 국가 경제안보에 직결되는 공급망을 안정적으로 관리·지원하기 위한 법제(공급망기본법 등). 특정국 의존도를 낮추고 위기 시 대응 체계를 갖추는 것이 목표.", "bi": "자유무역이 \"각자 제일 잘하는 요리만 만들어 나눠 먹는 잔치\"라면, 보호무역은 \"우리 집 김치는 우리가 직접 담근다\"는 자급 전략이다. 공급망 3법은 \"마트가 갑자기 문을 닫아도 굶지 않게, 집에 비상 식량 창고를 갖춰두는 것\"에 가깝다.", "flow": "미·중 관세 갈등과 반도체·이차전지 공급망 재편이 이어지면서, '효율'보다 '안정'을 앞세운 보호무역·경제안보 기조가 강해지고 있다. 한국은 수출 의존도가 높아(5월 수출 전년比 급증, 1~5월 무역흑자 1,000억 달러대) 자유무역의 수혜국이면서도, 핵심 광물·소재의 특정국 의존이라는 공급망 리스크를 안고 있어 두 노선 사이에서 균형을 모색 중이다.", "em": "각자 잘하는 요리만 만들어 나눠 먹기", "dm": "집에 비상 식량 창고 갖추기"}, {"n": 5, "label": "기술특례상장", "title": "기술특례상장과 파두", "cat": "fin", "eco": "IPO(기업공개) — 회사가 처음으로 주식을 증시에 내놓고 일반 투자자에게 파는 것. 회사의 '데뷔 무대'다.", "dig": "기술특례상장 — 당장은 적자라도 기술력·성장성이 인정되면 매출·이익 요건을 면제해 코스닥에 올려주는 제도. 미래를 보고 문을 열어주는 '특별 입학전형'이다.", "bi": "기술특례상장은 '잠재력만 보고 미리 데뷔시키는 연습생 오디션'이다. 아직 히트곡(이익)은 없지만 \"곧 대박 날 재목\"이라는 회사·증권사의 약속을 믿고 무대에 세운다. 그런데 파두는 데뷔 직전 이미 주요 거래처 발주가 끊긴 걸 알면서도 \"내년 연간 1,000억대 매출 기대\"라는 화려한 프로필을 내걸고 무대에 올랐다는 의혹을 받는다. 관객(투자자)이 표를 다 사고 나서야 실적이 분기 수억 원대로 쪼그라든 게 드러난 셈이다.", "flow": "2024년 12월 검찰이 파두 경영진 3명과 법인을 자본시장법 위반 등으로 불구속 기소했고, 2026년 들어 공판 절차가 진행 중이다. 회사 측은 \"반도체 불황에 따른 실적 부진일 뿐 은폐는 없었다\"며 혐의를 전면 부인하고 있다. 사건은 기술특례상장 전반의 신뢰와 증권사(주관사)의 실사 책임 문제로 번졌다.", "em": "무대에 데뷔시켜 표를 파는 것", "dm": "잠재력만 보고 미리 세우는 오디션"}, {"n": 6, "label": "공매도", "title": "공매도 제도 재개의 쟁점 — 투기 vs 가격발견", "cat": "fin", "eco": "공매도(空賣渡, Short Selling) — 갖고 있지 않은 주식을 빌려서 먼저 판 뒤, 값이 떨어지면 싸게 되사 갚아 차익을 남기는 거래. '내릴 것에 거는 베팅'이다.", "dig": "NSDS(공매도 중앙점검시스템) — 기관의 잔고와 매매내역을 전산으로 대조해 '빌리지도 않고 판' 불법 무차입 공매도를 자동 적발하는 한국거래소 시스템. 세계 최초의 공매도 전산 감시망이다.", "bi": "공매도는 '친구 우산을 빌려 중고로 판 뒤, 비가 그쳐 우산값이 떨어지면 싸게 사서 친구에게 돌려주는' 거래다. 값이 내릴수록 이득이다. 문제는 빌리지도 않은 우산을 판 척(무차입 공매도) 하는 반칙인데, NSDS는 \"누가 진짜 우산을 빌렸는지\" 장부를 실시간으로 대조해 반칙을 잡아내는 심판이다.", "flow": "코로나 이후 부분 금지됐던 공매도가 2025년 3월 31일 전면 재개됐다. 핵심 전제는 개인투자자의 오랜 불만이었던 '기울어진 운동장'을 바로잡기 위한 NSDS 가동이었다. 무차입 공매도를 전산으로 상시 점검·적발하는 체계가 갖춰진 뒤에야 시장 문을 다시 연 것이다.", "em": "우산 빌려 팔고 싸게 되사 갚기", "dm": "장부를 대조해 반칙 잡는 심판"}, {"n": 7, "label": "스테이블코인", "title": "가상자산·블록체인과 스테이블코인·CBDC", "cat": "fin", "eco": "법정화폐(Fiat Money) — 국가가 가치를 보증하는 돈(원·달러). 금 같은 실물이 아니라 '국가의 신용'이 가치의 뿌리다.", "dig": "스테이블코인 / CBDC — 스테이블코인은 달러 등에 가치를 고정한 '민간 발행 디지털 코인', CBDC는 '중앙은행이 직접 발행하는 디지털 법정화폐'. 둘 다 디지털이지만 발행 주체가 정반대다.", "bi": "일반 코인(비트코인)이 '가격이 출렁이는 미술품'이라면, 스테이블코인은 '백화점 상품권'이다. 1코인=1달러로 가치를 고정해 결제에 쓰기 좋게 만든 것. 다만 그 상품권을 민간 회사가 찍으면 스테이블코인, 한국은행이 직접 찍으면 CBDC다. 상품권의 신뢰는 \"발행사가 진짜 1달러어치 자산을 쌓아뒀는가(준비금)\"에 달려 있다.", "flow": "미국은 2025년 7월 'GENIUS Act(지니어스법)'를 제정해 스테이블코인 규율의 연방 틀을 마련하며(시행 전) '달러 패권의 디지털 확장' 신호를 보냈다. 유럽은 MiCA로 발 빠르게 규율 중이다. 한국은행은 '프로젝트 한강'으로 디지털화폐 활용성 테스트를 진행하며 CBDC 가능성을 실험하고, 동시에 원화 스테이블코인 제도화 논의가 본격화됐다.", "em": "가치의 기준이 되는 진짜 1달러", "dm": "1달러에 묶인 백화점 상품권"}, {"n": 8, "label": "토큰증권", "title": "토큰증권", "cat": "fin", "eco": "증권(Security) — 주식·채권처럼 '재산적 권리'를 표시한 증표. 소유·수익의 권리를 사고팔 수 있게 만든 것이다.", "dig": "토큰증권(STO) / 조각투자 — 부동산·미술품·한우 같은 자산의 권리를 블록체인 토큰으로 쪼개 발행·유통하는 것. 비싼 자산을 잘게 나눠 소액으로 사는 '조각투자'를 제도권으로 끌어들인 형태다.", "bi": "강남 빌딩 한 채는 보통 사람이 못 산다. 그런데 그 빌딩을 피자처럼 1만 조각으로 잘라 한 조각씩 토큰으로 파는 것이 토큰증권이다. 미술품·음원·한우도 마찬가지. '비싸서 못 사던 자산'을 '치킨값으로 한 조각' 살 수 있게 만든 게 핵심이고, 그 조각이 법적으로 '증권'이라는 점이 STO의 본질이다.", "flow": "그동안 조각투자·토큰증권은 규제 샌드박스(혁신금융서비스)로만 제한 운영됐는데, 2026년 1월 15일 전자증권법·자본시장법 개정안이 국회 본회의를 통과하며 전면 제도화의 길이 열렸다. 블록체인 분산원장이 공식 전자등록 체계로 편입되고, 조각투자 거래소가 합법적으로 운영될 근거가 마련됐다.", "em": "법적으로 '증권'인 그 조각", "dm": "빌딩을 피자처럼 잘라 파는 토큰"}, {"n": 9, "label": "초과이익 배분", "title": "삼성전자 초과이익 배분 — 성과급 vs 주주환원", "cat": "fin", "eco": "배당가능이익 — 회사가 법적으로 주주에게 나눠줄 수 있는 이익의 한도(자본을 까먹지 않는 선까지). 영업이익이 아무리 커도 이 한도를 넘겨 배당할 수는 없다.", "dig": "OPI(Overall Performance Incentive, 초과이익성과급) — 삼성전자가 사업부별 연간 실적이 목표(초과이익)를 넘으면 그 일부를 임직원에게 연봉의 최대 50%까지 지급하는 제도. 보통 '세전이익(영업이익)' 기준으로 산정된다.", "bi": "회사 이익은 '한 솥 가득 끓인 국'이다. 직원에게 먼저 한 국자(성과급) 떠주면 일할 맛은 나지만 국이 줄어든다. 그 줄어든 국에서 세금(법인세)을 떼고, 남은 걸 주주에게 떠주는(배당) 순서다. 누구에게 먼저, 얼마나 떠줄지가 핵심 갈등이다.", "flow": "정부의 '기업 밸류업'과 상법 개정 흐름 속에서 자사주 의무소각·배당 확대 압박이 커졌다. 동시에 HBM·반도체 인력 이탈을 막기 위한 성과급 경쟁도 치열해, '직원이냐 주주냐'의 이익배분 균형이 핵심 화두로 떠올랐다.", "em": "세금 떼고 남아 주주에게 줄 국물", "dm": "직원에게 먼저 떠주는 한 국자"}, {"n": 10, "label": "복수거래소", "title": "복수거래소", "cat": "fin", "eco": "유동성 파편화(Liquidity Fragmentation) — 같은 주식을 사고파는 시장이 여러 곳으로 쪼개지면, 한곳에 모이던 매수·매도 주문이 흩어져 '체결이 어려워지거나 가격이 갈라지는' 현상.", "dig": "ATS(Alternative Trading System, 대체거래소) — 한국거래소(KRX) 외에 상장주권을 매매·중개하는 '다자간매매체결회사'(자본시장법 §8의2⑤). 국내 최초가 '넥스트레이드(NXT)'다.", "bi": "그동안 모든 주식 거래를 '한국거래소'라는 단 하나의 고속도로 톨게이트로만 통과했다. 이제 옆에 '넥스트레이드'라는 새 톨게이트가 생긴 것이다. 통행료(수수료)는 더 싸고 운영시간(8시~20시)은 더 길다. 다만 어느 톨게이트가 더 빠른지 골라주는 '내비게이션(SOR)'이 꼭 필요해졌다.", "flow": "넥스트레이드는 2025년 3월 4일 영업을 개시해 2013년 제도 도입 이후 국내 최초의 ATS가 됐다. 거래시간 연장과 수수료 인하로 거래비용이 줄었지만, 두 시장으로 주문이 갈리면서 '유동성 파편화'와 '최선집행' 관리가 새 과제로 부상했다.", "em": "손님이 두 톨게이트로 갈려 줄이 흩어짐", "dm": "새로 생긴 톨게이트 '넥스트레이드'"}, {"n": 11, "label": "밸류업", "title": "기업 밸류업 프로그램과 대리인 비용", "cat": "fin", "eco": "대리인 비용(Agency Cost) — 회사의 '주인(주주)'과 '대리인(경영진)'의 이해가 어긋날 때 생기는 손실. 경영진이 주주 돈을 자기 제국 키우기·과잉 현금 쌓기에 쓰면 주주가 손해를 본다.", "dig": "자사주 의무소각 — 기업이 사들인 자기 주식을 '없애버리는' 것. 발행주식 수가 줄어 주당 가치가 올라간다. 밸류업·상법 개정 논의에서 핵심 카드다.", "bi": "회사가 번 돈(잉여현금)은 '냉장고에 쌓인 식재료'다. 안 쓰고 계속 쟁여두면(사내유보) 썩기 시작한다. 주주는 \"남는 건 우리한테 나눠주거나(배당), 아예 식구 수(주식 수)를 줄여(자사주 소각) 1인분을 키워달라\"고 요구한다. 밸류업은 이 '냉장고 정리'를 제도로 유도하는 것이다.", "flow": "'코리아 디스카운트' 해소를 목표로 정부의 기업 밸류업 프로그램과 배당·자사주 소각 확대, 상법 개정(이사 충실의무 등) 논의가 본격화됐다. 핵심 논리는 '잉여현금을 주주에게 돌려줘 대리인 비용을 줄이자'는 것이다.", "em": "안 쓰고 쟁여둬 썩는 잉여현금", "dm": "식구 수를 줄여 1인분 키우기"}, {"n": 12, "label": "ESG 공시", "title": "ESG 공시 의무화 로드맵", "cat": "fin", "eco": "좌초자산(Stranded Asset) — 규제·기술 변화로 예상보다 일찍 경제적 가치를 잃는 자산. 예컨대 탄소규제가 강해지면 석탄발전소가 다 쓰기도 전에 '애물단지'가 된다.", "dig": "Scope 3(스코프 3) — 회사 자체 배출(1·2)을 넘어 협력사·원료·물류 등 '가치사슬 전체'에서 나오는 탄소 배출량. 측정이 가장 어렵고 부담도 크다.", "bi": "ESG 공시는 식당의 '원산지·위생 표시'를 의무화하는 것과 같다. 손님(투자자)은 그동안 주방(기업) 속을 못 봤다. 이제 '우리 가게 탄소·기후위험은 이렇습니다'를 메뉴판에 적게 하는 것이다. 단, 협력 농가(Scope 3)까지 다 적으라면 작은 식당은 버겁다. 그래서 단계적·유예 장치가 붙는다.", "flow": "금융위원회는 2026년 2월 'ESG 공시 제도화 방안'을 발표하며 로드맵을 구체화했다. 2028년 자산 30조원 이상 코스피 대형사부터 기후공시를 의무화하고, 부담이 큰 Scope 3는 3년 유예(2031년)와 Safe Harbor(면책) 장치를 두는 '연착륙' 설계가 골자다.", "em": "곧 못 쓰게 될까 미리 밝혀야 할 위험", "dm": "협력 농가(공급망)까지 표시하기"}, {"n": 13, "label": "노란봉투법", "title": "노란봉투법과 거시경제 보호의 상충", "cat": "soc", "eco": "외부효과(Externality) — 한 경제주체의 행동이 가격에 반영되지 않은 채 제3자(투자자·하청·소비자)에게 비용·편익을 떠넘기는 현상. 파업의 사회적 비용 논쟁의 뿌리다.", "dig": "긴급조정권 — 쟁의행위가 국민경제나 국민의 일상을 현저히 위협할 때 고용노동부 장관이 노동위원회 의견을 들어 쟁의를 강제로 30일간 중지시키는 비상 제동장치.", "bi": "회사를 한 동네 아파트라고 하자. 노란봉투법은 \"관리비를 깎으려면 진짜 결정권을 쥔 건물주(원청)와도 직접 협상하게 해달라\"는 입주민(하청·특수고용)의 요구다. 그런데 협상이 길어져 단지 전체 전기가 끊기면(파업 장기화) 옆 동네 상가(협력업체·수출)까지 손님이 끊긴다. 누구의 권리를 어디까지 보장할지가 핵심이다.", "flow": "2025년 노조법 2·3조 개정안(이른바 노란봉투법)이 국회를 통과하며 사용자 범위 확대와 손해배상 책임 제한을 둘러싼 논쟁이 재점화됐다. 경영계는 원청 교섭부담·투자 위축을, 노동계는 하청·플랫폼 노동자의 교섭권 사각지대 해소를 강조한다. 외국인 투자자는 노동시장 경직성을 한국 증시 리스크 변수로 주시한다.", "em": "파업이 옆 동네 상가 손님까지 끊는 것", "dm": "너무 길어지면 잠깐 강제로 멈추는 차단기"}, {"n": 14, "label": "WGBI 편입", "title": "세계국채지수", "cat": "fin", "eco": "국채(Government Bond) — 국가가 돈을 빌리며 발행하는 차용증. 금리가 오르면 가격이 떨어지고, 신뢰가 높을수록 낮은 금리로 빌릴 수 있다.", "dig": "WGBI(세계국채지수) — FTSE 러셀이 산출하는 글로벌 채권 벤치마크 지수. 전 세계 연기금·국부펀드가 이 지수를 따라 자금을 배분하므로, 편입은 곧 '글로벌 패시브 자금의 자동 유입 자격'을 뜻한다.", "bi": "WGBI는 세계 채권시장의 '우량 마트 진열대'다. 그동안 한국 국채는 진열대 밖 별도 코너에 있어 큰손 손님(글로벌 펀드)이 잘 담지 못했다. 편입은 한국 국채가 메인 진열대에 정식 입점하는 것이고, 입점 즉시 '이 진열대 통째로 사는' 패시브 펀드들이 정해진 비중만큼 우리 국채를 자동으로 장바구니에 담는다.", "flow": "한국은 2026년 4월부터 11월까지 WGBI에 단계적으로 편입되고 있다. 한국 국채의 지수 내 비중은 약 2% 안팎(약 2.08% 수준이 거론)으로, 편입 완료 시 수백억 달러(약 560억 달러 수준이 자주 언급) 규모의 외국인 자금이 국채시장에 유입될 것으로 기대된다. 다만 실제 유입 규모·속도는 환율·글로벌 금리 여건에 따라 달라질 수 있다.", "em": "장바구니에 담기는 한국 '국채'", "dm": "글로벌 펀드의 우량 마트 진열대"}, {"n": 15, "label": "파생상품", "title": "거시 불확실성과 파생상품 리스크 관리", "cat": "fin", "eco": "변동성(Volatility) — 가격이 출렁이는 정도. 불확실성의 크기를 숫자로 잰 것으로, 옵션 가격을 좌우하는 핵심 재료다. 흔히 'VIX(공포지수)'로 체감한다.", "dig": "일일정산(Mark-to-Market) — 파생상품 포지션의 손익을 매일 시세로 평가해 현금으로 정산하는 제도. 손실이 한쪽에 쌓이기 전에 매일 끊어줘 결제불이행을 막는 안전장치다.", "bi": "파생상품은 '미래 날씨에 거는 우산 계약'이다. 헤지는 비가 걱정인 야외 결혼식 주최자가 미리 우산을 확보하는 '보험'이고, 투기는 비 올지 안 올지에 돈을 거는 '내기'다. 같은 우산 계약이라도 누가 왜 쓰느냐에 따라 보험이 되기도, 도박이 되기도 한다. 거시 불확실성이 커지면 날씨 예보가 흔들리고, 우산 값(옵션 프리미엄)도 폭등한다.", "flow": "2025~2026년 글로벌 통화정책 경로 불확실성, 지정학 리스크, 환율 변동이 겹치며 파생상품 시장의 변동성 관리 수요가 커졌다. KRX는 코스피200 선물·옵션을 중심으로 실시간 증거금·VaR 기반 리스크 관리를 강화하고 있다.", "em": "예보가 흔들리는 날씨(불확실성)", "dm": "우산 값을 매일 다시 매겨 정산"}, {"n": 16, "label": "기업가치평가", "title": "한국 자본시장 기업가치평가 모형", "cat": "fin", "eco": "현재가치(Present Value) — 미래의 돈을 '지금 이 순간의 가치'로 환산한 금액. 미래 1만 원은 할인율만큼 깎여 지금은 그보다 적은 가치를 갖는다. 모든 가치평가의 출발점이다.", "dig": "밸류업(기업가치 제고) 프로그램 — 저평가된 한국 상장사가 자율적으로 주주환원·지배구조 개선 계획을 공시해 기업가치를 끌어올리도록 유도하는 정책. '코리아 디스카운트' 해소가 목표다.", "bi": "기업가치평가는 '중고차 가격 매기기'다. DCF는 \"이 차가 앞으로 몇 년간 절약해줄 기름값을 다 더한 값\"으로 매기는 방식(미래 현금 기준)이고, 상대가치(PER·PBR)는 \"옆 매물 비슷한 차가 얼마에 팔렸나\"로 매기는 방식(시장 비교)이다. 그런데 한국 차는 같은 성능인데도 유독 싸게 팔린다 — 이 만성 할인이 '코리아 디스카운트'다.", "flow": "코리아 디스카운트 해소를 위한 밸류업 프로그램이 2024년 본격화된 이후, 2025~2026년에도 주주환원 확대·지배구조 개선이 기업가치평가의 핵심 변수로 자리 잡았다. PBR이 낮은 종목의 재평가 기대와 함께, 펀더멘털 없는 단기 테마에 대한 경계도 공존한다.", "em": "앞으로 아낄 기름값을 지금 값으로 더한 것", "dm": "싸게 팔리는 한국 차 값 끌어올리기"}, {"n": 17, "label": "레그테크", "title": "레그테크(RegTech)", "cat": "fin", "eco": "AML·KYC — AML(자금세탁방지)은 범죄 자금이 금융망에 섞여 드는 것을 막는 규제, KYC(고객확인)는 '이 고객이 진짜 누구인지' 확인하는 절차. 금융사가 반드시 지켜야 할 규정 준수의 핵심 영역이다.", "dig": "AI 기본법(2026.1.22 시행) — 신용평가·여신심사 같은 결정을 '고영향 AI'로 지정해 설명가능성·편향검증 의무를 부과한 법. 규정 준수 부담이 커진 만큼, 이를 자동화하는 레그테크 수요를 키웠다.", "bi": "레그테크는 금융사의 '운전자 보조시스템(ADAS)'이다. 사람이 일일이 눈으로 규정 위반을 잡던 걸, 차선 이탈을 경고하고 충돌 직전 제동을 걸듯 소프트웨어가 의심거래를 자동 감지해 경보를 울린다. 대표 영역이 AML·KYC로, 규제(Regulation)와 기술(Technology)의 합성어다.", "flow": "한국은 가상자산이용자보호법과 트래블룰 적용으로 점검 대상이 크게 늘어 레그테크 수요가 커졌고, 2026년 1월 22일 시행된 AI 기본법이 신용평가·여신을 '고영향 AI'로 지정하면서 설명가능성·편향검증 의무가 이 수요를 더 키웠다. 다만 탐지 기준을 너무 빡빡하게 잡으면 정상 거래까지 막는 '오탐'이 늘어나는 게 과제다.", "em": "감시할 의심거래(자금세탁·본인확인)", "dm": "AI 심사에 설명·편향검증을 의무화한 규정"}, {"n": 18, "label": "대안데이터", "title": "대안데이터 신용평가와 씬파일러", "cat": "fin", "eco": "씬파일러(Thin-filer) — 금융 거래 이력이 얇아(thin) 전통 신용평가에서 불리한 사람. 신용이 나쁜 게 아니라 '평가할 데이터 자체가 없는' 사회초년생·신규 자영업자가 대표적이다.", "dig": "XAI 거절 사유 고지 — AI가 대출을 거절했을 때 '왜 거절됐는지'를 설명해 알리는 것. AI 기본법(2026.1.22 시행)이 신용평가를 '고영향 AI'로 지정해 설명가능성·편향검증을 의무화했다.", "bi": "은행은 보통 과거 카드·대출 상환 기록으로 신용을 본다. 그런데 사회초년생은 이 기록 자체가 거의 없는 '씬파일러'다 — 백지 이력서를 든 신입 지원자인 셈이다. 대안데이터는 통신비·도시가스·전기요금을 제때 냈는지 같은 '성실히 살아온 생활 기록'으로 갚을 능력을 추정해, 백지에 첫 줄을 채워준다.", "flow": "국내에선 통신사 납부정보, 국민연금·건강보험료 납부이력이 이미 신용평가에 반영돼 금융 포용을 넓히고 있다. 다만 거주지·소비패턴 같은 변수가 특정 계층을 불리하게 만드는 '간접차별'을 낳을 수 있어, 2026년 1월 22일 시행된 AI 기본법이 편향검증과 거절 사유 고지 의무를 부과했다. 핀로그는 이를 '포용 vs 공정'의 긴장으로 정리했다.", "em": "백지 이력서를 든 신입(기록 없는 사람)", "dm": "왜 반려됐는지 알려주기"}, {"n": 19, "label": "AI 이상거래", "title": "AI 이상거래탐지와 시장감시", "cat": "fin", "eco": "비지도학습(Unsupervised Learning) — '정답표' 없이 데이터에서 스스로 평소와 다른 패턴을 찾아내는 기계학습. 정상 거래가 압도적이고 불공정거래는 형태가 제각각이라, 이상치 탐지에 잘 맞는다.", "dig": "XAI(SHAP·LIME) — AI가 '왜 이 거래를 이상하다고 판단했는지' 사람이 이해하도록 근거를 시각화하는 설명가능 AI 기법. 제재의 법적 정당성을 뒷받침한다.", "bi": "시장감시는 모든 가방을 X-ray로 통과시키는 '공항 보안검색대'다. 수백만 건 주문 속에서 시세조종(허수 주문)·불법 무차입 공매도 같은 위험물을 걸러낸다. 정상 승객이 압도적이라 '수배 전단'을 미리 못 만드니, 평소와 다른 행동을 스스로 찾는 비지도학습이 이 검색대의 눈 역할을 한다.", "flow": "2025년 3월 공매도 재개와 함께 KRX가 공매도 중앙점검시스템(NSDS)을 가동해, 기관 잔고와 매도 주문을 대사해 무차입 의심 거래를 적발하고 금융당국에 통보한다(주문 단계 차단은 각 기관 내부 잔고관리시스템의 몫이며, NSDS는 점검·적발 시스템이다). 점검률 91.3%, 위반 76건이 확인됐다. 핀로그의 결론은 '잡는 능력만큼 설명하는 능력'으로, XAI가 제재의 정당성을 만든다고 보았다.", "em": "수배 전단 없이 스스로 이상을 찾는 눈", "dm": "왜 위험물인지 비춰 보여주는 X-ray 화면"}, {"n": 20, "label": "세대격차", "title": "세대갈등 — 연금·자산·금융포용", "cat": "soc", "eco": "연금의 지속가능성 — '더 내고 덜 받기' 같은 개혁을 어느 세대가 얼마나 감당하느냐의 문제. 세대갈등은 이념 대립이 아니라 연금·자산 등 '자원 배분과 제도 지속가능성'의 문제로 봐야 한다.", "dig": "금융포용(Financial Inclusion) — 고령층의 디지털 금융 소외·보이스피싱 보호와 청년층의 공정한 자산형성 기회를, 금융감독의 시선에서 균형 있게 넓히는 것. 세대갈등의 실질 해법이 금융 이슈로 연결되는 지점이다.", "bi": "세대갈등은 '한 솥의 밥을 여러 세대가 나눠 먹는' 문제다. 윗세대가 먼저 든든히 펐는데 아랫세대 차례엔 밥이 부족하다면(연금 고갈), 감정 다툼처럼 보여도 사실은 '솥을 어떻게 채우고 나눌까'라는 제도 설계의 문제다. 한 세대에만 희생을 몰아주는 개혁은 지속될 수 없다.", "flow": "핀로그는 이 시사 주제를 금융감독의 시선으로 재해석했다 — 연금 개혁의 세대별 수용성, 청년의 금융 접근성·자산형성 지원, 고령층의 디지털 금융 소외·금융사기 노출이 모두 금융 이슈다. 팀의 결론은 '누가 옳은가가 아니라 지속가능성과 형평을 동시에'로, 고령층 보호와 청년 자산형성의 균형이 핵심이라고 보았다.", "em": "아랫세대 차례엔 밥이 모자란 솥", "dm": "노인·청년 모두 밥을 고루 나눠 담기"}, {"n": 21, "label": "반도체·HBM", "title": "반도체·HBM 경쟁", "cat": "soc", "eco": "CAPEX(설비투자) — 반도체 공장·장비에 들어가는 막대한 자본지출. 규모가 워낙 커 신디케이트론(여러 은행이 함께 대주는 대출)·정책자금 같은 대규모 금융 조달이 필요하다.", "dig": "HBM(고대역폭 메모리) — 여러 D램을 수직으로 쌓아 데이터가 오가는 통로(대역폭)를 넓힌 AI 전용 고성능 메모리. AI가 똑똑해질수록 이 메모리가 성능의 병목을 좌우한다.", "bi": "AI 반도체를 '초고속 열차'라 하면, 아무리 엔진(연산장치)이 빨라도 승객(데이터)을 실어 나르는 선로가 좁으면 소용없다. HBM은 그 선로를 여러 층으로 겹쳐 깐 '복층 고속선로'다. AI 시대의 '새로운 석유'로 불리는 이유이자, 이 선로를 누가 먼저 까느냐가 국가 경쟁력을 가른다.", "flow": "SK하이닉스·삼성전자가 HBM 기술·고객 확보 경쟁을 벌이고 TSMC와의 협력도 얽히면서, HBM은 수출·국가 안보가 걸린 거시경제 최전선이 됐다. 미·중 갈등 속 공급망 재편·수출 규제, 대규모 설비투자와 인재 확보가 핵심 과제다. 핀로그는 이를 'AI 병목을 누가 푸느냐'의 문제로 보고, 산업은행 등 국책금융의 여신·투자 역할을 함께 짚었다.", "em": "선로를 여러 층 깔려면 드는 막대한 공사비", "dm": "복층으로 겹쳐 깐 고속선로"}];
let idx = 0;
const $ = id => document.getElementById(id);
const picker = $('picker');
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
D.forEach((t,i)=>{
  const c=document.createElement('div');
  c.className='tch'; c.dataset.cat=t.cat;
  c.innerHTML='<b>'+String(t.n).padStart(2,'0')+'</b>'+esc(t.label);
  c.onclick=()=>load(i);
  picker.appendChild(c);
});
$('cAll').textContent='전체 '+D.length;
$('cFin').textContent='금융 '+D.filter(t=>t.cat==='fin').length;
$('cSoc').textContent='시사 '+D.filter(t=>t.cat==='soc').length;
document.querySelectorAll('.cat').forEach(btn=>{
  btn.onclick=()=>{
    const cat=btn.dataset.cat;
    document.querySelectorAll('.cat').forEach(b=>b.classList.toggle('on',b===btn));
    picker.querySelectorAll('.tch').forEach(c=>c.classList.toggle('hide',cat!=='all'&&c.dataset.cat!==cat));
  };
});
function splitTerm(s){const i=(s||'').indexOf('—'); return i<0?[s,'']:[s.slice(0,i).trim(), s.slice(i+1).trim()];}
function load(i){
  idx=(i+D.length)%D.length; const t=D[idx];
  $('ttl').textContent=t.title;
  const a=splitTerm(t.eco), b=splitTerm(t.dig);
  $('terms').innerHTML=
    '<div class="term"><span class="tk">'+esc(a[0])+'</span><span class="tv">'+esc(a[1])+'</span></div>'+
    '<div class="term"><span class="tk">'+esc(b[0])+'</span><span class="tv">'+esc(b[1])+'</span></div>';
  $('easy').textContent=t.bi;
  const th=s=>splitTerm(s)[0].split('(')[0].trim();
  $('tmap').innerHTML=(t.em||t.dm)?('<div class="tmt">이 비유가 번역한 것</div>'+
    '<div class="tmr"><b>'+esc(th(t.eco))+'</b><span>'+esc(t.em||'')+'</span></div>'+
    '<div class="tmr"><b>'+esc(th(t.dig))+'</b><span>'+esc(t.dm||'')+'</span></div>'):'';
  $('flow').textContent=t.flow;
  $('count').textContent=(idx+1)+' / '+D.length;
  picker.querySelectorAll('.tch').forEach((c,j)=>c.classList.toggle('on',j===idx));
}
$('prev').onclick=()=>load(idx-1);
$('next').onclick=()=>load(idx+1);
load(0);
</script>
