", "files": ["blockchain_01.png", "blockchain_02.png", "blockchain_03.png", "blockchain_04.png", "blockchain_05.png", "blockchain_06.png", "blockchain_07.png"]}, {"slug": "interview", "week": "5주차 특별", "title": "현직자 4인이 설명한 금융 실무 역량", "files": ["interview_01.png", "interview_02.png", "interview_03.png", "interview_04.png", "interview_05.png", "interview_06.png", "interview_07.png"]}, {"slug": "museum", "week": "5주차 특별", "title": "딱따기에서 MTS까지, 시장 인프라의 진화", "files": ["museum_01.png", "museum_02.png", "museum_03.png", "museum_04.png", "museum_05.png", "museum_06.png", "museum_07.png"]}, {"slug": "hbm", "week": "5주차", "title": "AI의 병목을 줄이는 메모리, HBM", "files": ["hbm_01.png", "hbm_02.png", "hbm_03.png", "hbm_04.png", "hbm_05.png", "hbm_06.png", "hbm_07.png"]}, {"slug": "esg", "week": "6주차", "title": "기업의 탄소회계, 스코프 1·2·3", "files": ["esg_01.png", "esg_02.png", "esg_03.png", "esg_04.png", "esg_05.png", "esg_06.png", "esg_07.png"]}, {"slug": "nxt", "week": "6주차", "title": "복수거래소가 투자자에게 미치는 영향", "files": ["nxt_01.png", "nxt_02.png", "nxt_03.png", "nxt_04.png", "nxt_05.png", "nxt_06.png", "nxt_07.png"]}, {"slug": "value-up", "week": "6주차", "title": "현금 보유와 주주가치의 관계", "files": ["value-up_01.png", "value-up_02.png", "value-up_03.png", "value-up_04.png", "value-up_05.png", "value-up_06.png", "value-up_07.png"]}, {"slug": "yellow-envelope", "week": "6주차", "title": "노동권과 경제안정 사이의 제도 설계", "files": ["yellow-envelope_01.png", "yellow-envelope_02.png", "yellow-envelope_03.png", "yellow-envelope_04.png", "yellow-envelope_05.png", "yellow-envelope_06.png", "yellow-envelope_07.png"]}, {"slug": "ai-fairness", "week": "7-8주차", "title": "금융 AI의 공정성과 설명 책임", "files": ["ai-fairness_01.png", "ai-fairness_02.png", "ai-fairness_03.png", "ai-fairness_04.png", "ai-fairness_05.png", "ai-fairness_06.png", "ai-fairness_07.png"]}, {"slug": "ai-surveillance", "week": "7-8주차", "title": "AI를 활용한 시장감시", "files": ["ai-surveillance_01.png", "ai-surveillance_02.png", "ai-surveillance_03.png", "ai-surveillance_04.png", "ai-surveillance_05.png", "ai-surveillance_06.png", "ai-surveillance_07.png"]}, {"slug": "alt-data", "week": "7-8주차", "title": "금융이력 부족과 대안데이터", "files": ["alt-data_01.png", "alt-data_02.png", "alt-data_03.png", "alt-data_04.png", "alt-data_05.png", "alt-data_06.png", "alt-data_07.png"]}, {"slug": "derivatives", "week": "7-8주차", "title": "파생상품의 헤지 기능과 위험", "files": ["derivatives_01.png", "derivatives_02.png", "derivatives_03.png", "derivatives_04.png", "derivatives_05.png", "derivatives_06.png", "derivatives_07.png"]}, {"slug": "financials", "week": "7-8주차", "title": "이익과 현금흐름의 차이", "files": ["financials_01.png", "financials_02.png", "financials_03.png", "financials_04.png", "financials_05.png", "financials_06.png", "financials_07.png"]}, {"slug": "governance", "week": "7-8주차", "title": "기업 의사결정과 주주가치", "files": ["governance_01.png", "governance_02.png", "governance_03.png", "governance_04.png", "governance_05.png", "governance_06.png", "governance_07.png"]}, {"slug": "regtech", "week": "7-8주차", "title": "규정 준수를 지원하는 레그테크", "files": ["regtech_01.png", "regtech_02.png", "regtech_03.png", "regtech_04.png", "regtech_05.png", "regtech_06.png", "regtech_07.png"]}, {"slug": "forum", "week": "7주차 특별", "title": "토큰증권과 조각투자의 구조", "files": ["forum_01.png", "forum_02.png", "forum_03.png", "forum_04.png", "forum_05.png", "forum_06.png", "forum_07.png"]}];
const grid = document.getElementById('grid');
const GROUPS = {
  '정책·사회': ['bigtech','carbon-tax','generation-gap','trade-tariff','education-rights','yellow-envelope'],
  '자본시장': ['short-selling','market-infra','museum','nxt','derivatives'],
  '디지털·AI': ['stablecoin','blockchain','ai-fairness','ai-surveillance','alt-data','regtech','forum'],
  '기업·산업': ['interview','hbm','esg','value-up','financials','governance']
};
const groupOf = slug => Object.keys(GROUPS).find(name => GROUPS[name].includes(slug)) || '기타';
const filters = document.getElementById('filters');
const search = document.getElementById('cardSearch');
const result = document.getElementById('result');
let activeGroup = '전체';
['전체', ...Object.keys(GROUPS)].forEach(name => {
  const button = document.createElement('button');
  button.type = 'button';
  button.className = `filter${name === '전체' ? ' on' : ''}`;
  button.setAttribute('aria-pressed', name === '전체' ? 'true' : 'false');
  button.textContent = name;
  button.addEventListener('click', () => {
    activeGroup = name;
    filters.querySelectorAll('.filter').forEach(item => {
      const selected = item === button;
      item.classList.toggle('on', selected);
      item.setAttribute('aria-pressed', selected ? 'true' : 'false');
    });
    renderGrid();
  });
  filters.appendChild(button);
});
function renderGrid(){
 grid.innerHTML = '';
 const query = search.value.trim().toLocaleLowerCase('ko');
 let count = 0;
 SETS.forEach((s, i) => {
  const group = groupOf(s.slug);
  if(activeGroup !== '전체' && group !== activeGroup) return;
  if(query && !`${s.title} ${s.week}`.toLocaleLowerCase('ko').includes(query)) return;
  const el = document.createElement('div');
  el.className = 'set';
  el.setAttribute('role', 'button');
  el.setAttribute('tabindex', '0');
  el.setAttribute('aria-label', `${s.title} 카드뉴스 ${s.files.length}컷 보기`);
  const cover = s.files[0].replace(/\.png$/, '.webp');
  el.innerHTML = `<div class="cv"><span class="badge">${s.week}</span><img loading="lazy" decoding="async" width="560" height="560" src="cards/thumbs/${cover}" alt="${s.title} 카드뉴스 표지"><span class="cnt">${s.files.length}컷</span></div>`
    + `<div class="meta"><div class="topic">${group}</div><h3>${s.title}</h3><div class="go">카드뉴스 7장 보기 →</div></div>`;
  el.addEventListener('click', () => open(i));
  el.addEventListener('keydown', (event) => {
    if(event.key === 'Enter' || event.key === ' '){ event.preventDefault(); open(i); }
  });
  grid.appendChild(el);
  count += 1;
 });
 if(!count) grid.innerHTML = '<div class="empty">조건에 맞는 카드뉴스가 없습니다. 다른 검색어를 입력해 보세요.</div>';
 result.textContent = `${count}개 세트 · ${count * 7}장`;
}
search.addEventListener('input', renderGrid);
renderGrid();

const lb = document.getElementById('lb'), lbImg = document.getElementById('lbImg'), lbTtl = document.getElementById('lbTtl'),
  lbCnt = document.getElementById('lbCnt'), lbDots = document.getElementById('lbDots'),
  lbPrev = document.getElementById('lbPrev'), lbNext = document.getElementById('lbNext');
let cur = 0, idx = 0, lastFocus = null;
function open(si){ cur = si; idx = 0; lastFocus = document.activeElement; render(); lb.classList.add('open'); document.body.style.overflow='hidden'; document.getElementById('lbClose').focus(); }
function close(){ lb.classList.remove('open'); document.body.style.overflow=''; if(lastFocus) lastFocus.focus(); }
function render(){
  const s = SETS[cur];
  lbImg.src = 'cards/' + s.files[idx];
  lbImg.alt = `${s.title} 카드뉴스 ${idx + 1}번째 컷`;
  lbTtl.textContent = `${s.week} · ${s.title}`;
  lbCnt.textContent = `${idx+1} / ${s.files.length}`;
  lbPrev.disabled = idx===0; lbNext.disabled = idx===s.files.length-1;
  lbDots.innerHTML = s.files.map((_,k)=>`<button type="button" class="dot ${k===idx?'on':''}" data-k="${k}" aria-label="${k+1}번째 카드 보기" ${k===idx?'aria-current="true"':''}></button>`).join('');
  lbDots.querySelectorAll('.dot').forEach(d=>d.addEventListener('click',()=>{idx=+d.dataset.k;render();}));
  // 다음 컷 미리 로드
  if(idx+1<s.files.length){ const p=new Image(); p.decoding='async'; p.src='cards/'+s.files[idx+1]; }
}
function step(d){ const n=SETS[cur].files.length; idx=Math.min(n-1,Math.max(0,idx+d)); render(); }
lbNext.addEventListener('click',()=>step(1)); lbPrev.addEventListener('click',()=>step(-1));
document.getElementById('lbClose').addEventListener('click',close);
lb.addEventListener('click',e=>{ if(e.target===lb) close(); });
document.addEventListener('keydown',e=>{ if(!lb.classList.contains('open'))return;
  if(e.key==='ArrowRight')step(1); else if(e.key==='ArrowLeft')step(-1); else if(e.key==='Escape')close();
  else if(e.key==='Tab'){
    const focusable=[...lb.querySelectorAll('button:not(:disabled)')];
    if(!focusable.length)return;
    const first=focusable[0], last=focusable[focusable.length-1];
    if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
    else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
  }
});
let tx=0; lb.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
lb.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>45) step(dx<0?1:-1); },{passive:true});
document.getElementById('nSet').textContent = SETS.length;
document.getElementById('nCard').textContent = SETS.reduce((a,s)=>a+s.files.length,0);
</script>
